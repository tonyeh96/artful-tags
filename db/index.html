tionInfo": "", "collectionRecord": "", "mainImage": "image328.jpg", "qrImage": "image329.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["马"], "seriesRaw": "马的柔情系列"}, {"serial": 190, "leoNo": "251101", "flag": "", "year": "2025", "series": "柔情系列， 时空", "title": "时空组曲. 美好回忆 Ye20251101", "sizeInfo": "100*80cm\n丙烯布面", "description": "这幅作品以当代数字化背景色彩为载体，将少女的思维意识转译为科技可读的愉悦符号。霓虹渐变、像素光斑与数字光影交织，蓝紫调编码纯粹思绪，暖橙光斑可视化青春悸动，暗合内心灵动。作者以色彩为转译工具，让抽象情绪成为可感知的视觉语言，科技感与少女感碰撞，消解冰冷的同时赋予思绪现代性，使观者在视觉愉悦中触摸到少女内心的柔软鲜活。", "extraInfo": "一、30 秒直播口播词🎙️\n家人们快看这幅！当代少女油画太有冲击力了！细腻写实的人物神态，搭配浓烈撞色的抽象背景，厚涂肌理超有质感，蓝白裙的纯净和斑斓色彩的躁动形成绝美对比，挂在家里瞬间拉满艺术氛围，喜欢的朋友别犹豫，手慢无！\n二、小红书作品推荐词📕\n✨撞色少女｜把青春的热烈与温柔画进画布✨\n细腻写实的少女神态，与奔放浓烈的抽象背景碰撞出强烈视觉张力，厚涂肌理让画面自带呼吸感，蓝白裙的纯净与斑斓色彩的躁动形成绝美反差，挂在客厅 / 卧室都超有格调，小众高级的艺术感直接拉满！\n#当代油画 #少女肖像 #色彩艺术 #家居装饰画 #艺术收藏", "collectionInfo": "", "collectionRecord": "", "mainImage": "image321.jpg", "qrImage": "", "otherImages": [], "category": "柔情系列", "subtags": ["时空"], "seriesRaw": "柔情系列， 时空"}, {"serial": 189, "leoNo": "251003", "flag": "Y", "year": "2025", "series": "山河岁月. 白桦林. 大兴安", "title": "白桦林. 大兴安岭的初秋2", "sizeInfo": "ye20251003\n60*90cm\n丙烯布面", "description": "多次选择在初秋奔赴东北大兴安岭、坝上，那片绚烂就住进心里。离开了，就拥有了乡愁。", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "image318.jpg", "qrImage": "image317.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林. 大兴安"}, {"serial": 188, "leoNo": "251002", "flag": "Y", "year": "2025", "series": "山河岁月. 薰衣草，北疆.", "title": "薰衣草之恋", "sizeInfo": "ye20251002\n60*90cm\n丙烯布面", "description": "那年六月去南法普罗旺斯，首次被向日葵和薰衣草，还有中世纪留存的老房子，在黄昏里的惊艳， 日本北海道也是亚洲最有历史的观光园林。中国也有很多薰衣草园， 特别是新疆。 我希望陆续可以绘出一个系列出来！", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "image319.jpg", "qrImage": "", "otherImages": [], "category": "山河岁月", "subtags": ["北疆", "薰衣草"], "seriesRaw": "山河岁月. 薰衣草，北疆."}, {"serial": 187, "leoNo": "251001", "flag": "y", "year": "2025", "series": "山河岁月. 白桦林. 大兴安", "title": "鎏金白桦林. 光影流转L", "sizeInfo": "ye20251001\n100*100cm\n丙烯布面", "description": "九月鎏金，艺术家用北方大兴安岭的白桦林和南方粤北的稻香，展现大自然的金黄魅力。同样的题材，每年都用不同的视角，不同的笔触，来歌颂秋日的美好。 是叶纪鸿用相似题材，享受不断挑战自己的轨迹。这是同一连续场景的第二幅，左", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "image320.jpg", "qrImage": "image317.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林. 大兴安"}, {"serial": 186, "leoNo": "250903", "flag": "y", "year": "2025", "series": "山河岁月. 白桦林. 大兴安", "title": "鎏金白桦林. 光影流转R", "sizeInfo": "ye20250903\n100*100cm\n丙烯布面", "description": "九月鎏金，艺术家用北方大兴安岭的白桦林和南方粤北的稻香，展现大自然的金黄魅力。同样的题材，每年都用不同的视角，不同的笔触，来歌颂秋日的美好。 是叶纪鸿用相似题材，享受不断挑战自己的轨迹。这是同一连续场景的第一幅，右", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "image314.jpg", "qrImage": "image317.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林. 大兴安"}, {"serial": 185, "leoNo": "250902", "flag": "y", "year": "2025", "series": "山河岁月. 白桦林. 大兴安", "title": "鎏金白桦林. 光影流转2", "sizeInfo": "ye20250902\n60*90cm\n丙烯布面", "description": "用九月温馨送爽的秋意，疗愈从炎热酷暑中走来的焦躁。 延续叶纪鸿的时令体验，和岁月伴游", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "image315.jpg", "qrImage": "image317.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林. 大兴安"}, {"serial": 184, "leoNo": "250901", "flag": "y", "year": "2025", "series": "山河岁月. 白桦林. 大兴安", "title": "鎏金白桦林. 光影流转1", "sizeInfo": "ye20250901\n100*100cm\n丙烯布面", "description": "9月的白桦林似鎏金. 光影透过树梢流转到草地上， 蓝莓已熟欲滴。这美好疗愈的时光，仿佛叶纪鸿对北方山河的恋情，总在初秋梦回", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "image316.jpg", "qrImage": "image317.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林. 大兴安"}, {"serial": 183, "leoNo": "250805", "flag": "y", "year": "2025", "series": "山河岁月. 白桦林. 大兴安", "title": "白桦林. 大兴安岭的初秋", "sizeInfo": "YE20250805\n\n100*80cm\n\n丙烯油彩布面", "description": "每回初秋奔赴东北大兴安岭、坝上，那片绚烂就住进心里。这幅画，是我对那些旅程的深情复刻。白桦树笔直伫立，树皮纹理像岁月刻下的故事，树叶染着初秋的金，是阳光吻过的温度。林下花草，蓝的像天空落的星，紫的似晚霞揉的梦，蓬勃的绿里藏着山林的呼吸。远处朦胧的蓝，是记忆里大兴安岭的雾、坝上的天，轻柔又辽远。每次落笔，都把在山林间漫步的惬意、看阳光穿透树叶的心动，一股脑泼在画布。这画里有我对初秋北国风光的眷恋，每抹色彩，都是我与那片土地相遇时，心跳的痕迹 。", "extraInfo": "", "collectionInfo": "20240901", "collectionRecord": "", "mainImage": "image310.jpg", "qrImage": "image312.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林. 大兴安"}, {"serial": 182, "leoNo": "250704", "flag": "y", "year": "2025", "series": "超现实主义系列#新物种", "title": "劫后星球. 物种归来", "sizeInfo": "ye20250704\n\n50*60cm\n\n丙烯油彩布面", "description": "巨大眼球如荒芜世界的凝视者，带着核战创伤的悲悯与对新希望的探询，突兀生长于龟裂土地，是新物种对往昔的回望、对未知的警觉。枯树扭曲，似核辐射下挣扎的生命残迹，却又在荒芜里守望着新生长的契机。渺小新生物在砾石间爬行，象征核战后星球的生机重启。画面以超现实笔触，将核战后的残酷荒芜与新物种生长的希望交织，让观者直面毁灭与重生的张力，思索人类行为给星球未来埋下的伏笔，及生命在绝境中倔强重启的可能 。", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "", "qrImage": "image313.jpg", "otherImages": ["image311.jpg"], "category": "科幻未来系列", "subtags": ["劫后星球"], "seriesRaw": "超现实主义系列#新物种"}, {"serial": 181, "leoNo": "20250803", "flag": "y", "year": "2020", "series": "柔情系列， 时空", "title": "时空组曲. 缤纷往事", "sizeInfo": "ye20250803\n\n60*90cm\n\n丙烯布面", "description": "这幅作品继续以具象人物为意识锚点，展开对后 AI 时代存在命题的视觉思辨。我运用表现主义油画语言，将脑机接口的数据流转化为狂放的色彩漩涡 。用同样的白衣女子作为人文符号，在数字洪流中保持着古典静观姿态，透明裙裾与背景笔触的碰撞形成肉体与虚拟的边界对话。灰色基底上迸发的色域既是对元宇宙混沌的隐喻，也暗合记忆中「缤纷美好」的情感编码，通过具象与抽象的博弈，我让科技视角，将哲学宗教获得了可触摸的温度与呼吸感。", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "image308.jpg", "qrImage": "image309.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["时空组曲", "柔情"], "seriesRaw": "柔情系列， 时空"}, {"serial": 180, "leoNo": "20250804", "flag": "y", "year": "2020", "series": "柔情系列， 时空", "title": "时空组曲. 重回星际", "sizeInfo": "ye20250804\n\n80cm*100cm\n\n丙烯油彩布面.", "description": "这幅画是借星空与”回复少女身躯”的人儿，诉说对童年仰望星空时奇妙感受的追忆。流动的蓝色笔触如宇宙长河，裹挟着斑斓星点，两轮月亮，表现出另一个”类地球的星空”，是记忆里指引 “家的方向” 的光，带着柔和的温度。重回儿时眼中梦幻又神秘的夜空， 是我想表达的思维脱离躯体的维度\n身着白裙的女子，舒展的姿态是对星空本能的拥抱。白裙上的色彩晕染，与背景宇宙的绚烂呼应，打破现实边界。", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "image306.jpg", "qrImage": "image307.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["星际时空", "时空组曲", "柔情"], "seriesRaw": "柔情系列， 时空"}, {"serial": 179, "leoNo": "250801", "flag": "y", "year": "2025", "series": "柔情系列， 时空", "title": "时空组曲：逐光于彩漩", "sizeInfo": "ye20250801\n\n100cm*80cm\n\n丙烯油彩布面", "description": "逐光于彩漩， 仿佛又开始走进一个生命的轮回起点。\n      创作这幅逐光于彩漩，我想借色彩漩涡构建超现实空间，让身着素白裙装的女子成为生命探索的具象符号。漩涡的斑斓色彩，是岁月沉淀的情绪光谱，女子迈向漩涡，是我对 “轮回起点” 的诠释 —— 褪去繁杂，以纯净姿态踏入未知。每一笔色彩泼洒，都是在叩问生命：当我们穿过情绪与记忆的漩涡，能否在轮回里寻得新的觉醒？借视觉冲击，引观者同赴这场关于生命轮回的心灵漫游 。", "extraInfo": "", "collectionInfo": "2025年广州艺活画廊个展作品，美篇加精推荐", "collectionRecord": "", "mainImage": "image301.jpg", "qrImage": "image302.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["时空"], "seriesRaw": "柔情系列， 时空"}, {"serial": 178, "leoNo": "250802", "flag": "y", "year": "2025", "series": "柔情系列， 时空", "title": "时空组曲：斑斓下的沉思 ye20250802", "sizeInfo": "60*90cm\n丙烯油彩布面", "description": "”我用再度年轻的身躯，穿着那一世和他初遇时的白衣裙，此刻再度置身于斑斓的色彩思维里，周围流动着奇异绚丽的时空绚丽，我恍然融入时间与空间交织的维度中。在这独特的时空里穿梭和等待，记忆如在异时空里的碰撞来回交融，神秘而浪漫。这人生的寻觅，要让我让我经历多少轮回？“\n  当代脑机接口的未来科技，将把思维和意识也就是灵魂，用触摸的温度与呼吸感， 完成女子碳基肉体的转换。", "extraInfo": "", "collectionInfo": "2025年广州艺活画廊个展作品，美篇加精推荐", "collectionRecord": "", "mainImage": "image300.jpg", "qrImage": "image299.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["时空组曲", "柔情"], "seriesRaw": "柔情系列， 时空"}, {"serial": 177, "leoNo": "250702", "flag": "y", "year": "2025", "series": "珠江风华 广州", "title": "ye20250702", "sizeInfo": "90*60cm\n\n广州的苍穹\n\n丙烯油彩布面", "description": "夏秋的广州频繁造访的台风前夕，苍穹下，自然与城市天际线共生的独特气韵，我用酣畅淋漓地深情，继续诠释这座城市夏日独特美学。", "extraInfo": "", "collectionInfo": "2025年广州艺活画廊个展作品，美篇加精推荐", "collectionRecord": "", "mainImage": "image297.jpg", "qrImage": "image298.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州"], "seriesRaw": "珠江风华 广州"}, {"serial": 176, "leoNo": "250602", "flag": "y", "year": "2025", "series": "山河岁月. 白桦林", "title": "白桦林的偶遇", "sizeInfo": "ye20250602\n\n90*60cm\n\n丙烯布面", "description": "这幅《白桦林的偶遇》，以大兴安岭为灵感源泉。我用明亮且富有层次感的黄色铺陈林间，让金秋的热烈与温暖满溢。白桦树干以简洁笔触勾勒，蓝白交织凸显挺拔。小鹿是画面灵动焦点，棕褐皮毛、机警神态，似是我在林区邂逅的自然精灵。每一抹色彩、每一笔勾勒，都藏着对大兴安岭的眷恋，愿这林间偶遇，带观者同入那片魂牵梦绕的金黄世界，重拾对北国山林的怀念 。", "extraInfo": "", "collectionInfo": "2025年广州艺活画廊个展作品，美篇加精推荐", "collectionRecord": "", "mainImage": "image293.jpg", "qrImage": "image296.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林"}, {"serial": 175, "leoNo": "250701", "flag": "y", "year": "2025", "series": "山河岁月. 白桦林", "title": "ye20250701", "sizeInfo": "白桦林的思念\n\n90*60cm\n\n丙烯油彩布面", "description": "画面中，金黄树叶如记忆碎片迸发，泼洒北国独有的热烈。笔直白桦树干，似故乡老友，缄默伫立。蜿蜒溪流，携北国清凉，潺潺淌过心底燥热。远处雪山，以北国脊梁之姿，衬出白桦林的温柔。\n我以厚重笔触凿刻树干，留存岁月皴裂；用灵动色彩晕染秋叶，复刻炽热秋光。岭南暑气黏腻，我却在画布上，借画笔追逐北国干爽秋风、林间沙沙响。\n这幅画，是颜料与乡愁的糅合。愿同恋远方的你，在这北国风光里，触摸 “去过又怀念” 凝成的永恒乡愁 —— 那些遥远的、眷恋的，终在艺术里，成为心底长明的光 。", "extraInfo": "", "collectionInfo": "2025年广州艺活画廊个展作品，美篇加精推荐", "collectionRecord": "", "mainImage": "image292.jpg", "qrImage": "image294.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林"}, {"serial": 174, "leoNo": "250703", "flag": "y", "year": "2025", "series": "山河岁月. 白桦林", "title": "ye20250703", "sizeInfo": "白桦林的斜阳\n\n100*80cm\n\n丙烯油彩布面", "description": "《白桦林里的斜阳》藏着我对漠北大兴安岭的眷恋。白桦干黑白交织，是沧桑与坚韧的絮语；红叶似火，燃尽生命终章的绚烂。斜阳泼洒金辉，暖红浸漫林野，晕染出热烈又静谧的意境——暗蕴“消逝与盛放”的哲思。我以奔放笔触定格光与影的缠绵，愿观者触到斜阳温度，在红与白的交融里，撷取自然关于“存在”的温柔共鸣 。", "extraInfo": "", "collectionInfo": "2025年广州艺活画廊个展作品，美篇加精推荐", "collectionRecord": "", "mainImage": "image291.jpg", "qrImage": "image295.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林"}, {"serial": 173, "leoNo": "250601", "flag": "y", "year": "2025", "series": "山河岁月. 白桦林", "title": "ye20250601", "sizeInfo": "漠北白桦林的秋红\n\n100*80cm\n\n丙烯布面", "description": "这幅画是我对漠北白桦林的思念。借粗细笔触刻画出树皮纹理，呈现自然的斑驳与坚硬。\n秋叶选用橘红、橙黄，以厚涂与点染呈现层次，似在阳光下肆意燃烧。地面落叶以同色系渐变营造堆积感，增强空间纵深感。通过色彩碰撞与笔触变化，将秋的热烈静谧相融，让观者沉浸式触摸白桦林的秋日魂魄，是自然之美在画布的生动定格", "extraInfo": "", "collectionInfo": "2025年广州艺活画廊个展作品，美篇加精推荐", "collectionRecord": "", "mainImage": "image289.jpg", "qrImage": "image290.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["白桦林"], "seriesRaw": "山河岁月. 白桦林"}, {"serial": 172, "leoNo": "250502", "flag": "y", "year": "2025", "series": "柔情系列 人与马,", "title": "初夏物语", "sizeInfo": "ye20250502\n\n100*80cm\n\n丙烯布面", "description": "创作这幅《初夏物语》时，我想捕捉初夏独有的蓬勃与温柔。以明快的绿为主色调，用肆意挥洒的笔触铺染背景，让树叶的层次在色彩交融里自然生长，模拟阳光穿透枝叶的流动感，那是初夏生机的底色。\n\n画白马时，刻意用细腻笔触雕琢轮廓与肌理，让它的纯净成为画面锚点，象征自然里的本真。身着蓝裙的女孩，我以流畅线条勾勒身姿，希望传递出人与生灵、自然对话时的轻盈与共情。", "extraInfo": "场景一：直播带货（亲切有煽动性，适配直播语速）\n家人们看过来！这幅《初夏物语》闭眼冲不亏✨ 明快绿调显生机，阳光穿叶的灵动、白马的纯净、蓝裙女孩的温柔，笔触细腻有质感。适配客厅、茶室装饰，小众不撞款，既是居家点睛之笔，也是节日礼品、轻收藏优选，好看又有价值，入手绝对值！\n场景二：画廊讲解（专业温婉，适配线下讲解语速）\n各位藏家、朋友，这幅《初夏物语》兼具美感与收藏潜力。明快绿调铺就初夏底色，细腻笔触雕琢白马与蓝裙女孩，藏着自然与人文的共情。适配高端家居、茶室装饰，格调雅致，小众稀缺，既是居家陈设佳品，也是极具潜力的轻收藏选择，值得细细品读。", "collectionInfo": "2025年广州艺活画廊个展作品，美篇加精推荐", "collectionRecord": "", "mainImage": "image288.jpg", "qrImage": "image287.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["马"], "seriesRaw": "柔情系列 人与马,"}, {"serial": 171, "leoNo": "250501", "flag": "y", "year": "2025", "series": "柔情系列,超现实主义", "title": "ye20250501", "sizeInfo": "星际时空 回望\n\n100*80cm\n\n丙烯布面", "description": "站在画布前，我把对宇宙的遐想倾注入《星际时空·回望》。用大面积钴蓝铺陈深空，让星云像流动的梦，星星是散落的谜面。画里的她，机械铠甲包裹躯体，却借回望的神态藏人性温度——这是我对“科技时代的自我”的叩问：当人类踏入星际，机械赋能的躯壳下，灵魂如何回望来路、锚定存在？每抹色彩、每道轮廓，都是我与宇宙对话的私语，盼观者透过她的目光，也触摸到星际间关于自我与未知的永恒震颤", "extraInfo": "", "collectionInfo": "2025年广州艺活画廊个展作品，美篇加精推荐", "collectionRecord": "", "mainImage": "image285.jpg", "qrImage": "image286.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["柔情"], "seriesRaw": "柔情系列,超现实主义"}, {"serial": 170, "leoNo": "250401", "flag": "y", "year": "2025", "series": "柔情系列,超现实主义", "title": "星际时空 .穿越", "sizeInfo": "ye20250401\n\n120*90cm\n\n丙烯布面", "description": "我用浓郁且富有表现力的色彩构建超现实的画面。皎洁满月高悬深蓝夜空，残存的落日余晖，营造出梦幻氛围。身着蓝裙的女子与白马伫立湖畔，诉说着当下和期盼。\n\n这是月满西坡之后，尝试用当代时尚元素，和一艘小舟，表达情怀的聚离切换。\n\n主题廓线条流畅和笔触奔放洒脱，增强了画面的动感与艺术感染力，展现出东湖月夜下独特的宁静与诗意。", "extraInfo": "", "collectionInfo": "2025年广州个展作品，美篇加精推荐。", "collectionRecord": "", "mainImage": "image305.jpg", "qrImage": "image283.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["星际时空", "柔情"], "seriesRaw": "柔情系列,超现实主义"}, {"serial": 169, "leoNo": "20250303", "flag": "y", "year": "2020", "series": "柔情系列", "title": "ye250303", "sizeInfo": "光影流年.向阳\n50*40 cm\n丙烯布面", "description": "《光影流年・向阳》以暖色调铺陈，人物姿态暗喻追光信念，传递对生活的热忱。系列融合表现主义色彩与自由笔触，既具视觉冲击力，又深蕴时光哲思，每幅作品都是情感与光影的结晶，愿为藏家收藏注入独特的艺术温度与精神共鸣。", "extraInfo": "", "collectionInfo": "2025年广州个展作品，美篇加精推荐。", "collectionRecord": "", "mainImage": "image277.jpg", "qrImage": "image278.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 168, "leoNo": "20250302", "flag": "y", "year": "2020", "series": "柔情系列", "title": "ye250302", "sizeInfo": "光影流年.如沐\n60*50 cm\n丙烯布面", "description": "《光影流年・如沐》借闭眼神态与蓝、黄、粉的碰撞，营造宁静氛围，仿佛时光清润漫拂身心；", "extraInfo": "", "collectionInfo": "2025年广州个展作品，美篇加精推荐。", "collectionRecord": "", "mainImage": "image276.jpg", "qrImage": "image278.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 167, "leoNo": "20250301", "flag": "y", "year": "2020", "series": "柔情系列", "title": "ye250301", "sizeInfo": "光影流年.回眸\n90*60 cm\n丙烯布面", "description": "“光影流年系列” 是我以光影为媒介，对时光、情感的艺术诠释。《光影流年・回眸》中，人物侧身于蓝黄交织的光影，藏家您好！“光影流年系列” 是我以光影为媒介，对时光、情感的艺术诠释。，流动笔触定格时光眷恋；", "extraInfo": "", "collectionInfo": "2025年广州个展作品，美篇加精推荐。", "collectionRecord": "", "mainImage": "image275.jpg", "qrImage": "image278.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 166, "leoNo": "20250203", "flag": "y", "year": "2020", "series": "柔情系列。 满月，人与马,", "title": "YE20250203", "sizeInfo": "月满东湖.\n\n100*80CM\n\n丙烯布面", "description": "我用浓郁且富有表现力的色彩构建超现实的画面。皎洁满月高悬深蓝夜空，残存的落日余晖，营造出梦幻氛围。身着蓝裙的女子与白马伫立湖畔，诉说着当下和期盼。\n\n主题廓线条流畅和笔触奔放洒脱，增强了画面的动感与艺术感染力，展现出东湖月夜下独特的宁静与诗意。", "extraInfo": "1，家人们速来！《月满东湖. 初遇》梦幻感直接拉满🌙 深蓝夜空配满月余晖，蓝裙女子与白马伫立湖畔，笔触奔放有动感，氛围感拉满。适配茶室、卧室装饰，小众有格调，送礼、轻收藏两相宜，颜值与质感双在线！\n2。\n《月满东湖. 初遇》\n各位藏家、朋友，这幅作品以超现实风格营造梦幻意境。深蓝夜空悬皎洁满月，落日余晖点缀，蓝裙女子与白马伫立湖畔，线条流畅、笔触奔放，尽显东湖月夜的宁静诗意。适配茶室、卧室陈设，小众而雅致，值得细细品味。", "collectionInfo": "2025年广州个展作品，美篇加精推荐。", "collectionRecord": "", "mainImage": "image270.jpg", "qrImage": "image271.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["马", "满月"], "seriesRaw": "柔情系列。 满月，人与马,"}, {"serial": 165, "leoNo": "20250202", "flag": "y", "year": "2020", "series": "柔情系列。 满月人与马,", "title": "月满西坡. 擦肩", "sizeInfo": "YE20250202\n\n90*60CM\n\n丙烯布面", "description": "这幅《月满西坡》继续用我喜欢的笔触和色彩，构建出了一个充满诗意与遗憾的场景。画面中，金黄的草地与深蓝的夜空形成鲜明对比，满月高悬，洒下清冷光辉。身着飘逸蓝裙的女子与白马并肩，却似即将错过。\n从创作角度，我运用厚重的油彩堆叠，凸显质感，让观者仿佛能触摸到风中飘动的发丝与鬃毛。色彩的碰撞不仅增强了视觉冲击力，也暗示了相遇瞬间的复杂情绪。这不仅是一幅画，更是对人生中那些错过与邂逅的深刻表叙。", "extraInfo": "4. 《月满西坡. 擦肩》\n宝子们别错过！这幅《月满西坡. 擦肩》自带诗意氛围感🌕 金黄草地撞深蓝夜空，满月洒辉，蓝裙女子与白马并肩却似错过，油彩堆叠质感绝了。适配高端家居、书房，小众稀缺，收藏、陈设都合适，懂的都懂！\n2。《月满西坡. 擦肩》\n各位藏家、朋友，《月满西坡. 擦肩》以色彩碰撞诠释相遇与错过。金黄草地与深蓝夜空形成鲜明对比，厚重油彩堆叠凸显质感，满月清辉下的人物与白马，藏着复杂细腻的情绪。适配书房、高端客厅，艺术表达深刻，收藏价值突出。", "collectionInfo": "2025年广州个展作品，美篇加精推荐。", "collectionRecord": "", "mainImage": "image272.jpg", "qrImage": "image273.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["马", "满月"], "seriesRaw": "柔情系列。 满月人与马,"}, {"serial": 164, "leoNo": "20250201", "flag": "y", "year": "2020", "series": "梅花情怀系列", "title": "Ye 20250201", "sizeInfo": "夕陽梅嬢，\n#2025梅花情懷系列\n60*90CM\n亚克力油画布面", "description": "同样的系列，用粉色背景，表达我的梅花，梅嬢情怀。希望供藏家多一个选择", "extraInfo": "", "collectionInfo": "2025年广州个展作品，美篇加精推荐。", "collectionRecord": "", "mainImage": "image274.jpg", "qrImage": "image269.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "梅花情怀系列"}, {"serial": 163, "leoNo": "20250102", "flag": "y", "year": "2020", "series": "梅花情怀系列", "title": "Ye 20250102", "sizeInfo": "夕陽梅嬢，\n#2025梅花情懷系列\n60*90CM\n丙烯布面", "description": "这幅画描绘了梅花的美丽及其短暂的特性。使用了轻柔的颜色和柔和的笔触，给人一种宁静优雅的感觉。枝条与柔软的花瓣形成对比，增 添了画面的深度和结构。粉彩背景更增强了整体温和平静的效果。.通过结合传统题材与现代印象派风格，使这幅画在古典与现代艺术爱好者中都显得十分应景。", "extraInfo": "", "collectionInfo": "2025年广州个展作品，美篇加精推荐。", "collectionRecord": "", "mainImage": "image268.jpg", "qrImage": "image269.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "梅花情怀系列"}, {"serial": 162, "leoNo": "20250101", "flag": "y", "year": "2020", "series": "梅花情怀系列", "title": "ye20250101", "sizeInfo": "2025的香雪梅花\n\n60*50CM\n\n#梅花情懷系列#葉紀鴻原創作品", "description": "一月二日下午廣州夕陽的天空很粉黛，適合我的2025開年香雪梅花情懷。\n\n我用宛如春日的轻歌，粉色的背景如梦幻般柔和，仿佛是清晨初升的暖阳洒下的温柔光晕。黑色若隱若現的枝干遒劲有力，纵横交错间勾勒出生命的脉络，似在诉说岁月的故事。那朵朵绽放的梅花，带着淡淡的蓝韵，如精灵般点缀其间，花蕊的一抹黄，恰似生命的灵动之光。", "extraInfo": "", "collectionInfo": "2025年广州个展作品，美篇加精推荐。", "collectionRecord": "", "mainImage": "image266.jpg", "qrImage": "image267.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "梅花情怀系列"}, {"serial": 161, "leoNo": "20241102", "flag": "y", "year": "2020", "series": "超现实主义系列#柔情系列", "title": "ye20241102", "sizeInfo": "时空旅者. 探索\n100*80cm\n布面油彩丙烯", "description": "我用缤纷的色彩和旋转流动的构图来描绘时空旅行的意象。深邃幽蓝的夜空与绚丽的橙黄光芒交织,营造出梦幻而神秘的时空感。神秘的硅基人物造型隐喻着探索与洞悉自我的内在历程，思维和讯息流来表现强烈,充满想象力与哲学深度。作为一件富有个人特色的超现实作品,希望能引发您对即将来临的时空与自我，可以深入思考。", "extraInfo": "", "collectionInfo": "29届广州艺博会2025台湾台南东门美术馆。", "collectionRecord": "台南画廊", "mainImage": "image259.jpg", "qrImage": "image261.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["柔情"], "seriesRaw": "超现实主义系列#柔情系列"}, {"serial": 160, "leoNo": "20241101", "flag": "y", "year": "2020", "series": "#柔情系列#马主题，人与马,", "title": "ye20241101", "sizeInfo": "春风得意马蹄疾\n\n100*80cm\n\n丙烯布面\n\n#柔情系列", "description": "春风得意马蹄疾，人生得意须尽欢。\n春风得意马蹄疾”，我试图通过色彩和笔触捕捉那种在春风中自由驰骋的快感。选择了鲜明的蓝色和白色作为背景，以表现春风的清新与活力，同时与骑手和白马的白色形成对比，突出主体的动态美。我运用了粗犷而有力的笔触，以增强画面的动感和速度感，让观者能够感受到马蹄疾驰的力量。骑手的姿态和白马的奔腾，共同传达了一种积极向上、勇往直前的精神。这幅画不仅是对动态美的追求，也是对人生积极态度的一种艺术表达，我希望它能够激励人们在面对挑战时，保持乐观和自信。", "extraInfo": "5. 《春风得意马蹄疾》\n家人们闭眼冲！《春风得意马蹄疾》太有精气神💨 鲜明蓝白背景显清新，粗犷有力笔触藏着马蹄疾驰的力量，骑手与白马尽显动态美。适配办公室、客厅，寓意积极向上，马年送礼、自藏都可，性价比拉满！\n2。各位线上藏家、艺术爱好者，《春风得意马蹄疾》以艺术笔触传递积极力量。鲜明蓝白背景彰显春风活力，粗犷笔触强化马蹄疾驰的动态美，骑手与白马呼应“勇往直前”的寓意，技法娴熟，是兼具寓意与美感的佳作。", "collectionInfo": "29届广州艺博会2025台南东门美术馆，2025个展作品", "collectionRecord": "台南画廊", "mainImage": "image260.jpg", "qrImage": "image262.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["马"], "seriesRaw": "#柔情系列#马主题，人与马,"}, {"serial": 159, "leoNo": "202410.2", "flag": "", "year": "2020", "series": "风景/山河岁月。漠河金秋", "title": "漠北白桦林", "sizeInfo": "Ye20241002\n100*80cm\n丙烯油画布面\n#山河岁月", "description": "这幅作品展现了艺术家对自然光影的敏锐把握和独特诠释。画面中的白桦树群以垂直线条统领全局，营造出强烈的空间纵深感。艺术家采用了印象派式的笔触技法，通过明亮的色彩对比——银白色的桦树、金黄的草地、紫红的灌木，以及翠绿渐变的树冠，精准捕捉了深秋时节的光线变化。\n作品最动人之处在于色彩的诗意表达。画家没有刻意追求写实，而是用跳跃的色块重构自然景观，让观众能感受到画面蕴含的情感张力。整体构图富有韵律感，是一幅难得的优秀风景佳作。", "extraInfo": "", "collectionInfo": "原画已被深圳机构收藏，多次参展,\n网红打卡作品。\n荣获美篇加精推荐", "collectionRecord": "原画已被深圳机构收藏，多次参展,\n网红打卡作品。\n荣获美篇加精推荐", "mainImage": "image257.jpg", "qrImage": "image258.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠河"], "seriesRaw": "风景/山河岁月。漠河金秋"}, {"serial": 158, "leoNo": "20241001", "flag": "y", "year": "2020", "series": "超现实主义系列#柔情系列人与马,", "title": "职启", "sizeInfo": "ye20241001\n100*80cm\n丙烯布面\n#叶纪鸿作品#超现实主义系列#柔情系列", "description": "几经波折，年轻人终于稳健的踏上了适合的平台白马，可以开始驰骋。\n多年自如的阅历，我喜欢用社会观察者的当代视角，解析和记录当下和探索未来。\n这幅画作《职启》以超现实主义手法，展现一位整装待发的年轻人踏上职业征程。西装笔挺的骑手象征新锐职场人，白马代表优质的职业平台，背景白色塔楼暗示职业目标与阶梯。蓝色基调营造沉稳专业氛围，水中倒影寓意自我审视。画作通过独特视角诠释了职场新人的雄心壮志与深刻思考，是一幅理想与现实交织的career启航图。", "extraInfo": "6. 《职启》\nA。职场人必入！《职启》精准戳中职场审美💼 超现实主义手法，西装骑手配白马，白色塔楼显职业格调，蓝色基调沉稳专业。适配办公室装饰，送职场新人、伙伴超合适，既有寓意又有质感，小众不撞款！\nB.各位线上藏家、艺术爱好者，《职启》以超现实主义手法诠释职场初心。西装骑手象征新锐职场人，白马寓意优质平台，白色塔楼暗示职业阶梯，蓝色基调沉稳大气。创作理念深刻，适配高端办公室、书房，收藏实用双价值。", "collectionInfo": "原画已被台北私人收藏2024年多次群展，一次个展。", "collectionRecord": "台北藏家", "mainImage": "image251.jpg", "qrImage": "image253.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情", "马"], "seriesRaw": "超现实主义系列#柔情系列人与马,"}, {"serial": 157, "leoNo": "20240902", "flag": "", "year": "2020", "series": "超现实主义系列#柔情系列", "title": "ye20240902", "sizeInfo": "香港鲤鱼门灯塔的回忆\n100*80CM\n布面丙烯\n#叶纪鸿作品#超现实主义# 香港往事#叶纪鸿的柔情系列", "description": "再一次，我落寂的坐在海边，独自一人饮酒。望着远方，仿佛当年的小女孩想念父亲一般。香港鲤鱼门的海边，那时候的沙滩很漂亮，可以捡贝壳，是我成长的地方。幼年时候，父亲在家时，总喜欢抱着我，当做掌上明珠，尽管他总是忙碌，很少回家。\n是他给了我诗和远方，可是真正的歲月还有油米柴盐酱醋茶。\n而现在，我回到幼时的海边，仿佛又看到父亲伟岸稳健的步伐走过海滨。支撑着我继续前行。\n\n这是一个关于我的2姐回到香港鲤鱼门的往事。那时我们都很小，香港维多利亚港东侧入口的鲤鱼门灯塔基座，还是黑白格子的。非常漂亮醒目。海滨的海水和沙滩依旧清澈洁净，我们度过短暂依稀有儿时记忆的时光。长大以后，青春芳华的姐姐从台湾回到香港，呆了几年。然后再度离开了香港。", "extraInfo": "", "collectionInfo": "原画已被台北私人收藏2024年多次群展，一次个展。", "collectionRecord": "台北藏家", "mainImage": "image252.jpg", "qrImage": "image254.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情"], "seriesRaw": "超现实主义系列#柔情系列"}, {"serial": 156, "leoNo": "202409.1", "flag": "y", "year": "2020", "series": "人物/柔情系列。 满月，马主题", "title": "ye20240901", "sizeInfo": "月满西坡. 初遇\n60*90㎝\n丙烯布面\n\n#叶纪鸿的柔情系列", "description": "《月满西坡。 初遇》\n\n那晚，我是一匹白马，静静地站立在西坡的麦田里。皎洁的满月高悬天际，就在那一刻，她出现了，身着飘逸蓝裙的美丽女子迎面而来，她的身影与夜空融为一体，却又因月光的照耀而清晰可见。我们之间的距离恰到好处，既充满期待，又带着一丝若即若离的神秘感。\n\n突然想起前世， 我是李清照， 她是赵明诚。 在京城的父家，露浓花瘦，薄汗轻衣透，见客入来，袜刬金钗溜。和羞走，倚门回首，却把青梅嗅。", "extraInfo": "《月满西坡. 相随》\n宝子们看过来！《月满西坡. 相随》温柔又有诗意🌙 延续专属笔触与色彩，满月高悬，蓝裙女子与白马相伴，氛围感拉满。适配卧室、茶室，格调雅致，是柔情系列稀缺款，收藏、居家陈设都合适，颜值在线！", "collectionInfo": "原画已被深圳机构收藏，台北，广州多次参展记录，网红打卡作品。", "collectionRecord": "深圳藏家", "mainImage": "image280.jpg", "qrImage": "image255.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["马", "满月"], "seriesRaw": "人物/柔情系列。 满月，马主题"}, {"serial": 155, "leoNo": "20240803", "flag": "y", "year": "2020", "series": "超现实主义系列#柔情系列", "title": "时空旅者. 思凡", "sizeInfo": "ye0240803\n80*100cm \n丙烯布面\n\n\n#叶纪鸿的超现实作品#时空旅者", "description": "终于，我再度修复和拥有我初代一样的碳基生命载体，虽然神经网路遍布了我的皮肤。也打通了我原来几经轮回的记忆思维。曾经发生过的经历，时间像一个个可以随时抽取的抽屉，地球不再是我唯一的空间，只是我的一段段修炼的场所。在星际里穿梭，原应该像硅基人一般无情无欲。\n这情系九生，原来是碳基物种的原罪。\n此刻， 我再度妆化成我最喜欢的装扮，只是因为是那人最爱。\n我，竟然思凡！", "extraInfo": "", "collectionInfo": "原画已被台北私人收藏2024年多次群展，一次个展。美国CAAA协会2025 年推荐", "collectionRecord": "台北藏家", "mainImage": "image249.jpg", "qrImage": "image250.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["时空旅者", "柔情"], "seriesRaw": "超现实主义系列#柔情系列"}, {"serial": 154, "leoNo": "20240802", "flag": "y", "year": "2020", "series": "超现实主义系列#柔情系列", "title": "时空旅者. 蝶恋", "sizeInfo": "YE20240802\n80*100cm\n丙烯布面\n\n#叶纪鸿的超现实作品#时空旅者", "description": "两个人工智能后的躯体，脑机互动后被各种旋涡状的图案和鲜艳的色彩包围，营造出一种梦幻而富有活力的时空氛围。\n在下方的一只紫色的蝴蝶，象征着中国文学里山伯与英台的爱情、变幻与自由。暗示了人工智能与记忆里的情感之间联系。\n整幅画的风格我采用充满活力和动感，色彩丰富而大胆，在探讨科技与人性、理性与感性之间的关系，展现了一个脑机接口技术成熟后的世界。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展", "collectionRecord": "", "mainImage": "image247.jpg", "qrImage": "image248.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["时空旅者", "柔情"], "seriesRaw": "超现实主义系列#柔情系列"}, {"serial": 153, "leoNo": "20240801", "flag": "y", "year": "2020", "series": "柔情系列。 满月人与马,", "title": "月满西坡. 相随", "sizeInfo": "60*90㎝\n\nye20240801\n\n#叶纪鸿的柔情系列\n\n丙烯布面", "description": "月满时候，我赤足在秋黄的草原上，随着我钟爱的白驹，走向西坡。立秋后的凉风，抚着我的长发。云中谁寄锦书来？ 此刻，月满西坡。是一种相思，两处闲愁。这情怀无计可消除，才下眉头，却上心头。", "extraInfo": "7. 《月满西坡. 相随》\n宝子们看过来！《月满西坡. 相随》温柔又有诗意🌙 延续专属笔触与色彩，满月高悬，蓝裙女子与白马相伴，氛围感拉满。适配卧室、茶室，格调雅致，是柔情系列稀缺款，收藏、居家陈设都合适，颜值在线！\n各位线上藏家、艺术爱好者，《月满西坡. 相随》延续柔情系列的诗意表达。满月西坡下，秋黄草原上的女子与白驹相随，立秋凉风与相思情怀融入笔触，色彩柔和却极具感染力，格调温婉，是小众收藏优选。", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image238.jpg", "qrImage": "image239.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["马", "满月"], "seriesRaw": "柔情系列。 满月人与马,"}, {"serial": 152, "leoNo": "20240703", "flag": "y", "year": "2020", "series": "荷花系列", "title": "荷塘夏韵", "sizeInfo": "ye20240703\n80*100cm\n丙烯布面", "description": "荷塘岁月\n世界各地赏荷的地方很多。广州会展公园，烈士陵园，白云山脚都是荷塘景色宜人的好地方，往往会有绿竹环挠。\n我最怀念的，是在气候凉爽的大理。那里有收费的巨型观赏荷塘，园内有公园椅桌，适合带着茶点，徜徉期间，可以拥有沁人心脾荷风时光。", "extraInfo": "", "collectionInfo": "https://www.artmajeur.com/leo-keihung-yip", "collectionRecord": "", "mainImage": "image237.jpg", "qrImage": "image240.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["荷花"], "seriesRaw": "荷花系列"}, {"serial": 151, "leoNo": "20240704", "flag": "", "year": "2020", "series": "超现实系列。星际旅人", "title": "星际旅人 思念", "sizeInfo": "ye20240704\n90*120cm\n丙烯布面", "description": "作为一个当代艺术家，表现出正在实现的科技进化。将陆续是我探讨的主题。\n作为碳基生物，时间依旧是我总要的维度，我的身体会成长，会老化，直到我选择用硅基躯体，迈向永生。可我永远会“思念”过去的时光，远去的亲友·。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐，美国CAAA协会2025 年推荐", "collectionRecord": "", "mainImage": "image303.jpg", "qrImage": "image241.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["星际旅人", "星际时空"], "seriesRaw": "超现实系列。星际旅人"}, {"serial": 150, "leoNo": "20240702", "flag": "", "year": "2020", "series": "荷花系列", "title": "映日荷塘", "sizeInfo": "ye20240702\n80*100cm\n丙烯布面\nRmb:48000\n#风景系列#荷花", "description": "墨绿的荷塘里，总是充满清凉。我喜欢捕捉太阳映在水里的倒影，将光感渲染着我的墨绿画面。当然还有倒影的荷花和莲叶。\n\n这样的荷塘适合用写意笔触。成为我2024年的荷花印象。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image304.jpg", "qrImage": "image263.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["荷花"], "seriesRaw": "荷花系列"}, {"serial": 149, "leoNo": "20240701", "flag": "y", "year": "2020", "series": "超现实系列\n#星际旅人", "title": "星际旅人 启航", "sizeInfo": "ye20240701\n60*50㎝\n丙烯油画综合布面", "description": "公元2048年，我已经拥有了新的躯体，是碳基和硅基结合的新生物。此去经年，时间已经开始模糊。\n那曾经的尘世牵挂也已经化为虚幻模糊，不复连贯，不复有情。\n宇宙无涯，在地球科技依旧束缚在光速的局限下探索，我成了普罗星际移民的一员。\n此去经年，我的坐标和对应时间，将不断更改，一如星际尘埃。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2026广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image235.jpg", "qrImage": "image242.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["星际旅人", "星际时空"], "seriesRaw": "超现实系列\n#星际旅人"}, {"serial": 148, "leoNo": "20240603", "flag": "", "year": "2020", "series": "柔情系列， 超现实系列，\n马主题", "title": "跃马娘子 ye20240603", "sizeInfo": "80*100cm\n丙烯布面", "description": "跃马娘子 \n远方，终于有消息了。\n这幅画捕捉了自由与力量的瞬间。我选用充满活力的蓝色为主调，描绘勇敢女骑手驾驭白马奔腾于水面。流动的笔触呈现水花飞溅和云彩飘动，增添动感。白马与骑手通过色彩对比突出，象征纯洁与勇气。对角构图强调向上力量，女子飘逸姿态与马的矫健融为一体。作品融合神话与现实，唤起对自由的渴望。每一笔都赞颂生命活力，邀您沉浸在这充满可能性的瞬间", "extraInfo": "8.\na家人们手速准备！马年个性款《跃马娘子》压轴登场✨ 高饱和蓝调撞水花肌理，流动笔触定格女骑手驭白马踏水奔腾，对角构图张力拉满！适配客厅、书房撑场面，融合神话意境，小众稀缺不撞款，收藏装饰双在线，喜欢的直接冲！\nB各位线上藏家、艺术爱好者，《跃马娘子》融合神话与现实之美。活力蓝调为主色，流动笔触呈现水花飞溅与云彩飘动，对角构图强化向上力量，女骑手与白马彰显自由勇气。艺术辨识度高，适配客厅、书房，收藏潜力可观。", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image236.jpg", "qrImage": "image244.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情", "马"], "seriesRaw": "柔情系列， 超现实系列，\n马主题"}, {"serial": 147, "leoNo": "20240602", "flag": "y", "year": "2020", "series": "柔情系列， 超现实系列，\n人与马,", "title": "春风少年兄", "sizeInfo": "ye20240602\n50*60cm\n丙烯布面\n\n#柔情系列", "description": "这幅画展现了一位勇敢的骑士在马上奔跑，充满活力和自由。马的形象动态，仿佛在空中飞翔，而骑士则紧握着马的鬃毛，表达出对生命力的向往和对自由的渴望。背景的大笔画，用蓝白色的调色板创造出天空和水面的错觉，增强了画面的深度和运动感。这幅作品不仅是对骑术艺术的赞美，也是对人与自然和谐共存的一种追求。它适合那些喜欢探索、追求自由和欣赏美感的人。", "extraInfo": "9. 《春风少年兄》\nA宝子们必入款！《春风少年兄》元气感拉满☀️ 笔触粗犷有力，骑手与白马奔腾尽显活力，蓝白配色清新亮眼，藏着少年意气。尺寸小巧适配各种空间，性价比超高，自藏、送晚辈都合适，好看不踩雷！\nB  各位线上藏家、艺术爱好者，《春风少年兄》尽显生命力与自由感。蓝白调色板构建天空与水面的错觉，动态十足的白马与骑士，传递对生命力的向往。笔触奔放、层次丰富，适配现代家居，是高性价比入门收藏款。", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image234.jpg", "qrImage": "image243.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情", "马"], "seriesRaw": "柔情系列， 超现实系列，\n人与马,"}, {"serial": 146, "leoNo": "20240601", "flag": "y", "year": "2020", "series": "柔情系列， 超现实系列，\n人与马,", "title": "骄阳正蓝下的新娘", "sizeInfo": "ye240601\n80*100cm\n丙烯布面", "description": "”骄阳正蓝时候，我心满意足的跨着我的白马，宛如梦幻的时光，终于实现。此去经年，应是良辰美景携手共享，人生不再孤独。”\n问世间情为何物？\n我喜欢用写实的笔触，描绘美丽的女子的脸，和她的白马王子。其他的部分是比较写意的笔触铺陈。", "extraInfo": "10. 《踏浪的新娘》\nA备婚姐妹看过来！《踏浪的新娘》太浪漫啦💍 写实笔触勾勒新娘与白马，三亚海边意境拉满，藏着海誓山盟的美好祝福。适配婚房、卧室，送新人、自藏都可，有参展背书，颜值与寓意双在线，闭眼冲！\nB.各位线上藏家、艺术爱好者，《踏浪的新娘》以写实与写意结合，描绘三亚海边的浪漫愿景。新娘与白马踏浪而行，写实勾勒面容、写意铺陈背景，藏着对年轻时光的美好祝福，适配婚房、客厅，浪漫不失格调。", "collectionInfo": "原画已被台北私人收藏2024年多次群展，一次个展。", "collectionRecord": "", "mainImage": "image233.jpg", "qrImage": "image245.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情", "马"], "seriesRaw": "柔情系列， 超现实系列，\n人与马,"}, {"serial": 145, "leoNo": "20240502", "flag": "y", "year": "2020", "series": "柔情系列， 超现实系列，\n人与马,", "title": "YE20240502", "sizeInfo": "踏浪的新娘\n\n90*60㎝\n\n丙烯布面\n\n骄阳正蓝的柔情系列", "description": "三亚海边的沙滩最适合拍海誓山盟的婚纱照。我喜欢看着不同的摄影师，摆弄着新人摆出各种姿势和背景。\n而我，会喜欢把新郎幻化成气宇轩昂的骏马。然后，带着他的新娘，踏浪在人生海面上。\nWHAT IS A YOUTH?\n我总是带着美好的祝福，歌颂诠释这样的年轻时光。这是我创作的灵感。", "extraInfo": "11. 《踏花归去》\n家人们捡漏啦！《踏花归去》获奖作品不一般🏆 纽约国际华人展获奖，机构收藏款，白马与少女踏花而行，温柔又有质感。适配茶室、书房，稀缺度拉满，收藏潜力大，送长辈、自藏都超有面儿！\nB. 各位线上藏家、艺术爱好者，这幅纽约国际华人展获奖作品《踏花归去》极具收藏价值。温柔笔触勾勒白马与少女踏花而归的场景，夕阳、雏菊与人物相融，藏着跨越时空的思念，曾获机构收藏，艺术与稀缺性兼备。", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image227.jpg", "qrImage": "image228.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情", "马"], "seriesRaw": "柔情系列， 超现实系列，\n人与马,"}, {"serial": 144, "leoNo": "20240501", "flag": "", "year": "2020", "series": "柔情系列", "title": "ye20240501", "sizeInfo": "人面桃花相映红\n80*80㎝\n丙烯布面", "description": "去年今日此门中，人面桃花相映红。\n人面不知何处去，桃花依旧笑春风。\n中国诗词之美，都是画面，更是不断轮回重复的情怀，让我们从中可以对号入座，相遇之缘，相思之苦，相失之憾。\n千年之后，春天的花事里，依然让我们触景生情。\n当代才子歌手李健唱的好，只是因为在人群里多看了你一眼。\n那感觉，就是对上了。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image232.jpg", "qrImage": "image226.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 143, "leoNo": "20240401", "flag": "", "year": "2020", "series": "柔情系列", "title": "四月陽春照佳人", "sizeInfo": "ye20240401\n80*100cm\n布面丙烯", "description": "四月阳春，阳光斜斜从窗外照入,她宁静温婉的面容,散发着独特迷人的气质。周围绽放的鹅黄色花朵，将她的身姿渲染得娇艳动人。她闭目沉思，仿佛在感受着日子里的恬静祥和,充满生机。多年后的4月，我用一幅画，来记忆那年的相遇。生活中的流金瞬间。这是我的台北四月往事。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image279.jpg", "qrImage": "image221.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 142, "leoNo": "20240302", "flag": "", "year": "2020", "series": "柔情系列", "title": "ye20240302", "sizeInfo": "繁华似梦\n80*80cm\n丙烯布面", "description": "这幅画的构思是在王家卫的“”繁花“热播之后，女神依旧伫立灯影里回眸人世。\n\n我用半抽象的红橘色英雄花和黄花风铃木，夜空蓝为背景，不知道这样的灵感以后是否再现。\n\n繁花落尽恍如梦。\n这世间男女啊！", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐，美国CAAA协会2025 年推荐", "collectionRecord": "", "mainImage": "image224.jpg", "qrImage": "image229.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 141, "leoNo": "20240301", "flag": "y", "year": "2020", "series": "花卉系列-梅花情怀", "title": "ye20240301", "sizeInfo": "梅花斑斓如梦令\n80*60㎝\n丙烯布面", "description": "那天，当代书法大家黄一汉老师，翩翩然而至，参观春展之后，特地当场挥毫写了一个“梦”字的甲骨文。接下来由我接力，用梅花布局，完成一幅”梅花与梦”，立即加入2024春展，成为最新的梅花有夢作品。\n\n结合了书法之美的梅花如梦令，希望可以扩大书法作品的表现方式", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐，美国CAAA协会2025 年推荐", "collectionRecord": "", "mainImage": "image222.jpg", "qrImage": "image231.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "花卉系列-梅花情怀"}, {"serial": 140, "leoNo": "20240202", "flag": "y", "year": "2020", "series": "花卉系列-梅花情怀", "title": "ye20240202", "sizeInfo": "2024年的梅花斑斓组曲5\n90*60㎝\n丙烯布面", "description": "这是二月底完成的梅花系列，我用橘色将斑斓的阳光明媚融入画面。\n\n连续几年年初，都会画梅。隔了一年，观察的角度和表现的手法就会不同。这个2024年的梅花系列共画了六幅，我希望每年都可以有新视角的作品发表", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image223.jpg", "qrImage": "image230.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "花卉系列-梅花情怀"}, {"serial": 139, "leoNo": "20240201", "flag": "", "year": "2020", "series": "花卉系列-梅花情怀", "title": "ye20240201", "sizeInfo": "2024年的萝岗梅花组曲4\n100*80㎝\n丙烯布面", "description": "農曆年前回到廣州，決定繼續畫一幅80*100cm的作品， 參加Areful 藝活畫廊的2024 春季梅花之魅春展。我喜歡的藍天雪梅情懷，終於開開懷釋放。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image225.jpg", "qrImage": "image246.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "花卉系列-梅花情怀"}, {"serial": 138, "leoNo": "20240104", "flag": "y", "year": "2020", "series": "# 柔情系列", "title": "南海观音脚下的仰望", "sizeInfo": "ye20240104\n\n60*50㎝\n丙烯帆布", "description": "日出时的南海观音，是信徒膜拜的最佳时刻，晨起，从迎宾馆出来，人少，近水楼台先拜佛。\n有电梯直达庞大的佛脚\n从渺小众生的视野，仰望观音大士的衣角，仿佛随风飞扬，化为那丝缕般的浮云，仿佛带着凡间苦恼悲伤，化作轻缕，淡入青云。\n\n我用半写意带些超现实主义的笔法，将多日来的惆怅提升到豁达开悟。这人世间来回，其实就是一段灵魂修炼，回归五蕴皆空。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image214.jpg", "qrImage": "image215.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "# 柔情系列"}, {"serial": 137, "leoNo": "20240103", "flag": "", "year": "2020", "series": "花卉系列-梅花情怀", "title": "ye20240103", "sizeInfo": "2024年的萝岗梅花组曲1-3\n60*50㎝\n丙烯布面\nRmb：15000", "description": "在全国笼罩在低温的天气下，幸运可以来三亚创作，觉得非常珍惜，这是第三幅。被海口藏家收藏", "extraInfo": "", "collectionInfo": "海南私人收藏，可提供微喷布面版画定制", "collectionRecord": "海南私人收藏，可提供微喷布面版画定制", "mainImage": "image216.jpg", "qrImage": "image219.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "花卉系列-梅花情怀"}, {"serial": 136, "leoNo": "20240102", "flag": "y", "year": "2020", "series": "花卉系列-梅花情怀", "title": "ye20240102", "sizeInfo": "2024年的萝岗梅花组曲1-3，60*50㎝\n\n\n\n丙烯布面", "description": "这次，晴空为幕蓝，梅花玉洁白，摇曳在广州难得的岁寒时候。迎接新年，适合为我的油画再添一个描绘视角。在全国笼罩在低温的天气下，幸运可以来三亚创作，觉得非常珍惜", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2026广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image217.jpg", "qrImage": "image219.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "花卉系列-梅花情怀"}, {"serial": 135, "leoNo": "20240101", "flag": "", "year": "2020", "series": "花卉系列-梅花情怀", "title": "ye20240101", "sizeInfo": "2024年的萝岗梅花组曲1-3\n\n60*50㎝\n\n丙烯布面", "description": "2024年的一月，寒风乍起，广州终于入冬。冻了好几天，那天，难得阳光重现。惦着“寒梅着花否？”特地拜访萝岗香雪公园，一年一度的梅花时节，是宋词书画，延续千年的中国文人情怀。也是我无论何处，每年一月都要在当地咏梅一番，然后挖掘出喜欢的梅花展现方式，用油画展现出来。", "extraInfo": "", "collectionInfo": "60*50", "collectionRecord": "", "mainImage": "image218.jpg", "qrImage": "image220.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "花卉系列-梅花情怀"}, {"serial": 133, "leoNo": "20231102", "flag": "y", "year": "2020", "series": "超现实系列,", "title": "ye20231102", "sizeInfo": "60*50CM\n\n重返核爆劫后的星球\n\n布面丙烯", "description": "重返星球记\n地球核爆后，不知过了多少年。碳基生物又可以在这星球行走。用明亮巨大的眼睛好奇的探测这个劫后余生的世界。一如过去的7\n次文明重启。这一次，轮到我来当上帝，选出合适的生物，再灌注我的DNA.，再给这新物种10000年的进化时间吧!", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image213.jpg", "qrImage": "image210.jpg", "otherImages": [], "category": "科幻未来系列", "subtags": ["劫后星球"], "seriesRaw": "超现实系列,"}, {"serial": 132, "leoNo": "20231101", "flag": "y", "year": "2020", "series": "柔情系列", "title": "三亚的海滩女郎", "sizeInfo": "100*80CM\n\nye20231101\n\n布面亚克力综合色彩", "description": "这幅阳光女郎挂在画室里很久了，一直觉得没有完成。可是访客总喜欢和她合照。工作室里无数个日落，这个属于三亚海滩的丽人，透过窗帘从夏天一直到冬天，終於修改到自己可以接受的地步。于是发表了出来。我在广州的冬天，怀念我的夏日。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image208.jpg", "qrImage": "image209.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 131, "leoNo": "202310.2", "flag": "y", "year": "2020", "series": "柔情系列， 超现实系列，\n马主题", "title": "走出窄门", "sizeInfo": "100*80㎝\n丙烯布面\nyE202310.2\n#SURREALISM 超现实表现系列,多次获奖", "description": "走出窄门\n终于，年轻的他走出校园的窄门。\n才发现仍然要小心走下台阶，才能迈进人间历练。不远处的千里马平台，正等着他驾驭，一起奔驰当下和未来的人生。\n\n倒影中的他，已经开始发出变化的光芒，等着变成色彩艳丽的人生。\n\n给我们的年轻人", "extraInfo": "12. 《走出窄门》\n年轻人家人们必入！《走出窄门》太有共鸣💪 超现实风格，年轻人走出校园，千里马相伴，寓意前程似锦，蓝色基调沉稳大气。适配办公室、书房，送毕业生、职场新人首选，有寓意又有艺术感！\nB.各位线上藏家、艺术爱好者，《走出窄门》以超现实手法传递成长寓意。年轻人走出校园窄门，千里马静候相伴，倒影光芒象征人生蜕变，技法精湛且曾获奖，创作理念深刻，适配办公室、书房，收藏潜力突出。", "collectionInfo": "原画已被机构收藏。多次参展,\n 纽约国际华人展获奖", "collectionRecord": "原画已被机构收藏。多次参展,\n 纽约国际华人展获奖", "mainImage": "image199.jpg", "qrImage": "image200.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情", "马"], "seriesRaw": "柔情系列， 超现实系列，\n马主题"}, {"serial": 130, "leoNo": "202309.3", "flag": "", "year": "2020", "series": "超现实系列， #柔情系列", "title": "背影", "sizeInfo": "90x60cm\n丙烯布面\nye202309.3\n作品于参选美国lightspace time gallery 第十三届艺术OPEN比赛获奖", "description": "背影\n幼时，有记忆以来，要到处为生活奔波的父亲很少在家。\n稍微长大后，便会刻意仰望着父亲离去的背影，伟岸而孤独，像大象一般。\n多年以后，两鬓也渐渐斑白的我。在阳台上往下凝望的，是大学毕业后，偶尔回家的儿子和不复年少的背影。", "extraInfo": "", "collectionInfo": "1.作品于2023年11月参选美国lightspace time 国际展获奖\n2023年后多次参加广州， 台北群展和个展。 原画已被台北私人收藏", "collectionRecord": "1.作品于2023年11月参选美国lightspace time 国际展获奖\n2024年后多次参加广州， 台北群展和个展。 原画已被台北私人收藏", "mainImage": "image201.jpg", "qrImage": "image207.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情"], "seriesRaw": "超现实系列， #柔情系列"}, {"serial": 129, "leoNo": "202309.2", "flag": "", "year": "2020", "series": "珠江风情", "title": "珠江的郁金香", "sizeInfo": "60x50cm\nye202309.2\n丙烯布面", "description": "郁金香飞舞的广州海心沙桥畔的花城广州，是老广最喜欢的公园之一。\n这里的园艺大师，会按季节花期不断更换花圃的花。那天，终于轮到我喜欢的荷兰郁金香做为主场。\n我用漂浮在广州天际线的超现实主义表现方式，来记录表达珠江畔的郁金香浪漫风情。\n\n同样的珠江风华题材，可以用不同风格表达出来，是作为没有包袱的自由画家最大的乐趣之一。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image202.jpg", "qrImage": "image203.jpg", "otherImages": [], "category": "珠江风华", "subtags": [], "seriesRaw": "珠江风情"}, {"serial": 128, "leoNo": "202309.1", "flag": "y", "year": "2020", "series": "超现实主义，柔情系列马主题，人与马,", "title": "奔腾在蓝天的新娘", "sizeInfo": "80x100cm,\n丙烯布面\nye202309.1", "description": "奔驰的新娘\n我紧张的拉住缰绳，闭着不敢张开的眼睛，白色的新娘礼服，和我的头发，在风声里凌乱的飘逸着。终于，我的白马王子越水腾飞而起。此后经年，便是一生一世的相守。\n老人家说，嫁鸡随鸡嫁狗随狗。\n那婚礼时候离开父家，随新郎腾飞的一刹那，居然多年之后。依然如此清晰。\n此刻突然顿悟，这是延续哪一个前世今生的姻缘？", "extraInfo": "13《奔腾在蓝天的新娘》\nA备婚党速来！《奔腾在蓝天的新娘》浪漫感拉满✨ 新娘与白马越水腾飞，笔触灵动，白色礼服与马鬃飘逸，藏着一生相守的祝福。适配婚房、客厅，有参展背书，小众不撞款，送礼、自藏都合适！\nB.各位线上藏家、艺术爱好者，《奔腾在蓝天的新娘》藏着姻缘相守的美好愿景。新娘与白马越水腾飞，白礼服与马鬃随风飘逸，笔触灵动，延续前世今生的浪漫叙事，有参展背书，原作被私人收藏，提供定制油彩材料版画，适合收藏艺术感与寓意兼具。", "collectionInfo": "2023年后多次参加广州， 台北群展和个展。 原画已被台北私人收藏", "collectionRecord": "", "mainImage": "image204.jpg", "qrImage": "image206.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情", "马"], "seriesRaw": "超现实主义，柔情系列马主题，人与马,"}, {"serial": 127, "leoNo": "202308.2", "flag": "", "year": "2020", "series": "柔情系列，邻家女子", "title": "沙滩上的少女", "sizeInfo": "40X50㎝\n丙烯布面\nye2308.2", "description": "阳光女子\n那一天，我重复用了几个不同的指令和几种不同的风格要求，终于完成了几幅合格的初稿。我再用笔画了两个星期，不断调整优化，才将阳光下的女孩。在海风飞扬的沙滩上不断的修改好。成了我的邻家女孩系列之一。", "extraInfo": "", "collectionInfo": "2024年后两次个展", "collectionRecord": "", "mainImage": "image185.jpg", "qrImage": "image186.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列，邻家女子"}, {"serial": 126, "leoNo": "202308.1", "flag": "", "year": "2020", "series": "人物/柔情系列", "title": "ye202308.1", "sizeInfo": "忧郁的夏娃\n\n80*100㎝\n\n丙烯布面", "description": "忧郁的夏娃\n又是一个面临抉择的夏娃，小青蛇温柔的爬上她的手，递送出象征爱欲的红苹果。\n\n从此女孩成为女人，开始体验从父母亲的羽翼下脱离后的日子。开始的时候，日子都像初到口的苹果一般滋润甜蜜，然后才是真正的岁月。失乐园的男孩女孩都在重复一个生命轮回的历炼\n\n这油米酱醋的平常日子和往后的生离死别，必然在岁月流转的枷锁中一一走过人生。\n原来，我们都在失乐园的轮回中。", "extraInfo": "", "collectionInfo": "原画已被机构收藏。多次参展，网红打卡作品。", "collectionRecord": "原画已被机构收藏。多次参展，网红打卡作品。", "mainImage": "image183.jpg", "qrImage": "image187.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "人物/柔情系列"}, {"serial": 125, "leoNo": "202307.2", "flag": "", "year": "2020", "series": "山诃岁月，荷花系列", "title": "晨曦的莲花女", "sizeInfo": "ye:202307.2\n\n90x60cm\n\n丙烯布面", "description": "晨曦的莲花女\n晨曦时候，阳光从地平线斜入长满莲花的湿地。采莲女正为采花🌸忙。为了及时赶上水上花市，节拍韵快而充满美感。绿意盎然的水面洋溢着清晨的凉爽。中间裸露着木板的小船，正在等候水中女子整理的新摘莲花。一束束莲花，在采莲女子如艺术家的手中，又变成一朵大型的环状花卉。在空中视角下，散发着湄公河畔独特的情怀。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image189.jpg", "qrImage": "image190.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["荷花"], "seriesRaw": "山诃岁月，荷花系列"}, {"serial": 124, "leoNo": "202307.1", "flag": "y", "year": "2020", "series": "柔情系列", "title": "仲夏夜的花精灵", "sizeInfo": "80*100CM\n油画丙烯综合颜料布面\nye202307.1", "description": "仲夏夜之梦\n一直记得中学读过莎士比亚的仲夏夜之梦，森林里的精灵在一朵朵花丛之间闪现，夏日的恋情，就从夕阳西下开始，在精灵王几经折腾的将迷魂花汁错点鸳鸯。果然，当女孩睁开湛蓝色的眼睛，立即爱上了眼前的人儿，于是，一场充满喜感的仲夏夜之梦就在森林里展开了。\n这童话真好，睁开眼睛，就可以遇到自己喜欢的的人!", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐，艺博会组推荐", "collectionRecord": "", "mainImage": "image284.jpg", "qrImage": "image205.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 123, "leoNo": "202306.2", "flag": "y", "year": "2020", "series": "柔情系列", "title": "夏日草原的笑靥", "sizeInfo": "ye:202306.2\n\n100x80cm\n\n布面丙烯", "description": "夏日草原的笑靥\n那天我轻舞着翅膀，俯瞰美丽的大地。风轻轻拂过，一袭浅紫色的她，突然出现在视野内，我极速升空盘旋。朵朵红色的花儿，就像男孩遇到的玫瑰花一般，我也着迷着她浅浅的笑靥。在仲夏美好的草原上。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐, 签名版画被多个私人收藏", "collectionRecord": "", "mainImage": "image182.jpg", "qrImage": "image188.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 122, "leoNo": "202306.1", "flag": "", "year": "2020", "series": "山诃岁月，荷花系列", "title": "湄公河畔的睡莲", "sizeInfo": "90*60cm\nye202306.1\n丙烯布面\nRmb:32800\n#荷花系列", "description": "湄公河畔的睡莲\n风光绮丽的湄公河畔，有无数的睡莲湿地。无人飞机的视角下，木船轻轻划过成片睡莲铺满的水面。船上的夫妻正在协力采着水莲花，整齐的铺满整艘小船上。便成一幅绿意盎然 ，飘满夏日莲香的美好画面。\n蓝色的遮阳帽，红色上衣。白色和娟红色的莲花连着长长的花梗。\n六月的炎热的广州夏日，将这画面，挥就下来。亦感清凉\n这是我的荷花和睡莲系列。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image177.jpg", "qrImage": "image178.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["荷花"], "seriesRaw": "山诃岁月，荷花系列"}, {"serial": 121, "leoNo": "202305.2", "flag": "", "year": "2020", "series": "珠江风华，梅花情怀", "title": "斑斓的梅花3", "sizeInfo": "ye 202305.2\n60x40cm\n丙烯布面", "description": "斑斓的梅花3\n总是用广州萝岗香雪公园里的梅花背景，继续享受我的梅花系列的不同展现。\n我试着在画面里改变表现点点梅花，在树干上的比例，和斑斓的色彩。\n依旧是下午斜阳时候，我用无数张摄影照片，记录我的临在感觉。然后在宁静的南沙画室里，用回忆再度唤出当时美好的感觉和即时涌现的灵感愉快创作，不亦快哉。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image175.jpg", "qrImage": "image176.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "珠江风华，梅花情怀"}, {"serial": 120, "leoNo": "202305.1", "flag": "y", "year": "2020", "series": "珠江风华，南沙系列", "title": "日落明珠湾", "sizeInfo": "90*60CM\n\n丙烯布面\n\nye: 202305.1", "description": "日落南沙明珠湾\n风淡云轻的三月，太阳忽隐忽现。属于一个温暖舒适的下午，我们从凫洲大桥下的濱海绿地一路往西走。\n沿海边的绿地上，充满欢愉的帐篷，和家人，孩子，情侣的温馨互动画面。然后，我们静静的坐在岸边防波石堆前发呆，望着出海渔船悠闲交汇在湾区。远处鲜红宏伟的明珠大桥，正汇演着日落大戏。\n这是大广州的悠闲自得歲月。我用一幅画记录了下来。", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image179.jpg", "qrImage": "image174.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["南沙"], "seriesRaw": "珠江风华，南沙系列"}, {"serial": 119, "leoNo": "202304.1", "flag": "", "year": "2020", "series": "山河岁月，", "title": "金海雪花的女子", "sizeInfo": "ye 202304.1\n\n90*60cm\n\n丙烯布面", "description": "金海雪花的女子\n三月，多才的朋友，用自拍桿，在貴州音寨坝子上，分享了這樣的畫面。\n\n成百上千亩油菜花怒放，宛若一片黄金花海。美好的初春，附近丘陵上的李树也花開正艷，宛若片片白雪落在林子裡，浪漫交匯。還有一個帶著相機的女子在林間，於是形成一幅绚烂多姿的故事畫面。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐, 签名版画被多个私人收藏", "collectionRecord": "", "mainImage": "image195.jpg", "qrImage": "image196.jpg", "otherImages": [], "category": "山河岁月", "subtags": [], "seriesRaw": "山河岁月，"}, {"serial": 118, "leoNo": "202303.2", "flag": "", "year": "2020", "series": "珠江风华，广州", "title": "二沙島的暮色花海", "sizeInfo": "ye: 202303.2\n\n80*100cm\n\n丙烯布面", "description": "二沙島的暮色花海\n只要得闲，我喜欢从南端跨过广州大桥，进入花语多变的二沙岛广场。这里有个紫色的花球图腾，将四季不断变换的花海点亮登场，让走在桥上的人儿，会不经意的被吸引过来。\n黄昏时候我，从西侧的亚运会馆走回大桥。姹紫千红的花坛怒放，人们悠闲的漫步其中。于是我又定格了一幅喜欢的画面，收录成广州风华系列。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐, 签名版画被私人收藏", "collectionRecord": "", "mainImage": "image193.jpg", "qrImage": "image194.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州"], "seriesRaw": "珠江风华，广州"}, {"serial": 117, "leoNo": "202303.1", "flag": "", "year": "2020", "series": "花卉/梅花情怀系列", "title": "却把青梅嗅2", "sizeInfo": "ye202303.1\n\n100*80㎝\n\n丙烯布面\n\n2023年3月", "description": "却把青梅嗅2\n当年少女时代的李清照，写自己遇见情人来访时的娇羞。这幅用李清照的宋词背景，”倚门回首，却把青梅嗅”，构图采取了元代王冕的名画梅竹双青里的“青梅”图。\n于是我的创作情怀，可以继续延续宋元意境，融合到当代作品里。\n\n这是我的梅花系列，希望您也喜欢。", "extraInfo": "", "collectionInfo": "原画已被机构收藏。多次参展，网红打卡作品。荣获美篇加精推荐", "collectionRecord": "原画已被机构收藏。多次参展，网红打卡作品。荣获美篇加精推荐", "mainImage": "image191.jpg", "qrImage": "image192.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "花卉/梅花情怀系列"}, {"serial": 116, "leoNo": "202302.1", "flag": "", "year": "2020", "series": "柔情系列马主题", "title": "踏花归去", "sizeInfo": "ye202302.1\n\n60*50cm\n\n丙烯布面", "description": "踏花归去\n那一世，我是马，一匹白马。\n一匹总忘了自己是马的马。\n依稀记得在夕阳下，踏过那片长满雏菊的山谷里，拥着你纤纤的腰，一起踏花归去。\n\n这一世，我在静静的黄昏里。又突然想起。\n可是，为什么，除了笑靥，我依旧记不清楚妳深邃的眸和低垂的脸？", "extraInfo": "14.\n家人们捡漏啦！《踏花归去》获奖作品不一般🏆 纽约国际华人展获奖，机构收藏款，白马与少女踏花而行，温柔又有质感。适配茶室、书房，稀缺度拉满，收藏潜力大，送长辈、自藏都超有面儿！\nB.,各位线上藏家、艺术爱好者，大家好～ 这幅柔情系列马主题佳作《踏花归去》超有韵味！以温柔笔触勾勒夕阳下的白马与少女，踏过雏菊山谷的浪漫场景，藏着跨越时空的思念。作为纽约国际华人展获奖作品，曾获机构收藏，艺术稀缺性拉满～ 适配茶室、书房陈设，轻收藏与装饰价值双在线，值得纳入藏品清单！\n\n\n\n\n\n\n\n润色一下《踏花归去》的线上画廊解说稿，精简到20秒左右\n推荐一些线上画廊作品解说稿的优秀范本\n如何进一步突出《踏花归去》的艺术价值和收藏卖点？", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐, 签名版画被多个私人收藏", "collectionRecord": "", "mainImage": "image184.jpg", "qrImage": "image256.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["马"], "seriesRaw": "柔情系列马主题"}, {"serial": 115, "leoNo": "202301.2", "flag": "", "year": "2020", "series": "珠江风华，梅花情怀", "title": "萝岗的向晚香雪", "sizeInfo": "ye:202301.2\n\n60*50cm\n\n丙烯布面", "description": "萝岗的向晚香雪\n夕阳下山，是罗岗香雪最美的时候。可以拥有突破传统的色彩，让你用来诠释梅花意境。一丛丛一树树的白色梅花，点缀在向晚黄色的天空和墨绿的背景里。岭南的屋檐下，桥上还有拿着相机拍照的人儿。\n\n于是虎年岁暮的向晚梅花，我在兔年春节画了下来。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image197.jpg", "qrImage": "image198.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "珠江风华，梅花情怀"}, {"serial": 114, "leoNo": "202301.1", "flag": "", "year": "2020", "series": "珠江风华，麓湖", "title": "冬日暖阳下的麓湖", "sizeInfo": "60*50㎝\n丙烯布面\nye:202301.1\n#珠江风华，麓湖", "description": "冬日暖阳下的麓湖\n白云山脚下的麓湖，是广州市中心的结庐在人境。林相优美，一年四季焕发着不同的色彩。冬季的暖阳，红色水杉和倒影，成了视觉的主色。\n从大流行病情中逐步复原的人儿，立即成了风景里的活力。\n我用温柔的黄色作为天空，迈入2023的第一幅画，于是完成", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image165.jpg", "qrImage": "image159.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["麓湖"], "seriesRaw": "珠江风华，麓湖"}, {"serial": 113, "leoNo": "202212.3", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "眼泪滴落赛里木湖畔", "sizeInfo": "ye202212.3\n\n90*60㎝\n\n丙烯布面", "description": "眼泪滴落赛里木湖\n畔远处的天山雪脊和山脚的草坡，将塞里木湖像珍珠一样围绕起来。我在湖这边，共享着同行伙伴们抒怀的美好心情。\n紫色花海从我站立的视角，一直延伸到环湖的木质步道边。六月的湖水依旧寒冷清冽。\n\n拿着长焦镜头的红帽白衫女子，不经意的进入我的画面。\n\n这是每年六月的伊梨花海故事。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image158.jpg", "qrImage": "image160.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 112, "leoNo": "202212.2", "flag": "", "year": "2020", "series": "超现实，斗牛士系列", "title": "悲悯的眼睛", "sizeInfo": "202212.2 \n80X80", "description": "悲悯的眼睛\n背上已经插了六根翎镖的蛮牛，再一次衝过悲伤的红色斗篷。贴身而过的斗牛士用流畅优雅的背后手势，将斗篷扬起。一发之隙，华丽的裤子上，沾满黑牛背上汨汨涌下的鲜血。人与兽的脚蹄下，依旧飞扬着速度引起的沙尘。\n\n于是，悲伤的斗篷哭了。", "extraInfo": "", "collectionInfo": "2023,2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image157.jpg", "qrImage": "image163.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["斗牛士"], "seriesRaw": "超现实，斗牛士系列"}, {"serial": 111, "leoNo": "202212.1", "flag": "", "year": "2020", "series": "珠江风华系列", "title": "海珠湖的斑斓", "sizeInfo": "YE202212.1\n\n90*60㎝\n\n丙烯布面", "description": "海珠湖的斑斓\n广州10月的下午. 海珠湖公园，两个年轻女孩，拎着饮料和一大袋食物，悠然走过新植的榕树下。午后阳光，透过树梢，用充满欢愉的绿意，点缀成明媚姣好的时光。\n       这河道，也是浆板运动的基地。树干上的橘色救生圈，也成为画面的亮点。\n       然后，11月，海珠区就因为疫情政策封控了27天。", "extraInfo": "", "collectionInfo": "2023,2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image156.jpg", "qrImage": "image164.jpg", "otherImages": [], "category": "珠江风华", "subtags": [], "seriesRaw": "珠江风华系列"}, {"serial": 110, "leoNo": "202211.4", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "伊犁草原上的杏花", "sizeInfo": "YE202211.4\n\n90*60CM\n\n布面丙烯", "description": "伊犁草原上的杏花\n草原上的杏花，随着我的移动，在变幻的光影下，显得如此多娇迷人。六月的天山，曲线婉约的伊犁草原坡地，最适合用画笔，展现出上帝对她的钟爱。", "extraInfo": "", "collectionInfo": "2023,2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image155.jpg", "qrImage": "image161.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 109, "leoNo": "202211.3", "flag": "", "year": "2020", "series": "珠江风华系列", "title": "海心桥上的夕阳", "sizeInfo": "ye202211.3\n\n80x100cm\n\n丙烯油彩", "description": "海心桥上的夕阳\n10月底，广州的黄昏，落日余晖在背后。将金粉撒落了望江情侣的衣服上。江轮在他们的注目下，轻轻划过海心桥。\n\n创作时，桥被清零封控了，即使夕阳依旧，不再有人儿的城市，缩在楼宇内，累积了多少压抑的心情？\n\n而我，喜欢描绘有温度的场景，那是寻常百姓恬适的故事。", "extraInfo": "", "collectionInfo": "2023,2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image154.jpg", "qrImage": "image162.jpg", "otherImages": [], "category": "珠江风华", "subtags": [], "seriesRaw": "珠江风华系列"}, {"serial": 108, "leoNo": "202211.2", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "ye202211.2", "sizeInfo": "伊犁的杏花沟\n\n100*80cm\n\n丙烯布面", "description": "伊犁的杏花沟\n伊犁喀拉峻的草原绵延起伏，如巨型的优美人体，草原起伏的绿茵，随着光影角度的变化而更加妩媚。初夏绽放的粉白色杏花，更像是佩戴在巨大丽人身上的翡链。悠然的牧马，在如熏的阳光下恬然伫立。", "extraInfo": "", "collectionInfo": "2023,2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐，艺博会组推荐", "collectionRecord": "", "mainImage": "image153.jpg", "qrImage": "image166.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 107, "leoNo": "202211.1", "flag": "", "year": "2020", "series": "风景/山河岁月，漠北", "title": "白桦林里的蓝莓丛", "sizeInfo": "60*90㎝\n\n丙烯布面原创\n\nye202211.1", "description": "那天，9月初的大兴安岭，往漠河北极村的路上。我们停在白桦林的路边，走进斑斓的野生蓝莓园里。刚过午的阳光，直直的从白桦树和落羽杉的树梢泄到灌木丛的叶梢上。立刻让人感觉到这又是一幅上帝视角的大作。漫步在这半原始的森林里，低矮的灌木丛和倒下的木干和谐共处。呼吸芬芳的空气，偶尔感受到直射眼帘的斑点阳光，还有伙伴摘蓝莓的喜悦呼叫，这欢愉的时光就这样烙印在记里。", "extraInfo": "", "collectionInfo": "原画已被机构收藏，多次参展, 国际获奖荣获美篇加精推荐", "collectionRecord": "原画已被机构收藏，多次参展, 国际获奖荣获美篇加精推荐", "mainImage": "image151.jpg", "qrImage": "image152.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠北"], "seriesRaw": "风景/山河岁月，漠北"}, {"serial": 106, "leoNo": "202210.5", "flag": "", "year": "2020", "series": "珠江风华，海珠湖", "title": "海珠湖畔的榕树", "sizeInfo": "60*50㎝\n丙烯布面\nye202210.5", "description": "十月初秋的海珠湖畔，榕树下，芳草萋萋，繁花似锦。这样的时光，会让人心情一下子明亮起来。\n\n长达三年的疫情，被反复困住的心情，适合酝酿一幅自己喜欢的疗愈系列。", "extraInfo": "", "collectionInfo": "荣获美篇加精推荐  2023年3月雅昌拍卖", "collectionRecord": "", "mainImage": "image172.jpg", "qrImage": "image150.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["海珠湖", "海珠"], "seriesRaw": "珠江风华，海珠湖"}, {"serial": 105, "leoNo": "202210.4", "flag": "", "year": "2020", "series": "山河岁月，花卉风景", "title": "美好的夏日", "sizeInfo": "80*80cm\n\n丙烯布面\n\nye202210.4", "description": "美好的夏日\n蛰伏了一整个长冬的南坡，终于恣意绽放。\n\n北疆现代农庄的窗子和户外的花儿，完美打开。当地人都特别珍惜这绿意盎然的夏日时光，如此短暂而美好。", "extraInfo": "", "collectionInfo": "2023,2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image137.jpg", "qrImage": "image138.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["山河岁月"], "seriesRaw": "山河岁月，花卉风景"}, {"serial": 104, "leoNo": "202210.3", "flag": "", "year": "2020", "series": "珠江风华，英西，", "title": "英西峰林的狐尾草", "sizeInfo": "60*50㎝\n\nye202210.3\n\n丙烯布面", "description": "英西峰林的狐尾\n草英西的峰林以俊秀为特色。\n那天，逛完了大半个景区。我们选择了坐在平台上望着太阳渐渐落下峰林。狗尾草在微风里摇曳如浪波，迷人的粉色渐渐加深。在暮色中，没有人舍得离开。除了相机，还有和一群好友，一起临在的风华时光，一直在记忆里。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image140.jpg", "qrImage": "image141.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["英西"], "seriesRaw": "珠江风华，英西，"}, {"serial": 103, "leoNo": "202210.2", "flag": "", "year": "2020", "series": "山河岁月，新疆，花卉风景", "title": "赛里木湖的夏日花儿", "sizeInfo": "60*50cm\n丙烯油彩\nye202210.2", "description": "赛里木湖的夏日花儿\n为了感受清晨的湖光，我们特地在伊犁过夜。那晚，雨淅沥淅沥的下着。\n\n赛里木湖的美丽是因为承接了大西洋季风送过来的最后一滴”眼泪”。\n\n凝聚而成的美丽湖面，蓝花亚麻，白菊，鸢尾花，五色菊都长得特别好。\n\n心情放飞时候的风景，原来最美。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image173.jpg", "qrImage": "image142.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["新疆", "山河岁月"], "seriesRaw": "山河岁月，新疆，花卉风景"}, {"serial": 102, "leoNo": "202210.1", "flag": "", "year": "2020", "series": "山河岁月，新疆，花卉风景", "title": "北方夏日的花海", "sizeInfo": "60*50㎝\n\n丙烯布面\n\nye202210.1", "description": "北方夏日的花海\n进入六月初夏，新疆的花儿一下子绽放开了，从大西洋高原送来的凉风风轻轻拂过赛里木湖。让我的心情一下子宁静下来，夹杂着一种浪漫的情怀。\n\n然后，人走了。\n心儿还留着。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image139.jpg", "qrImage": "image143.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["新疆", "山河岁月"], "seriesRaw": "山河岁月，新疆，花卉风景"}, {"serial": 101, "leoNo": "202209.3", "flag": "y", "year": "2020", "series": "风景/山河岁月，新疆", "title": "瑰丽树在阳光里", "sizeInfo": "90*60㎝\n丙烯布面原创\nYE202209·3", "description": "阳光从西南方向斜斜照着向东北的山坡，山凹处，刚好营造出一截山阴的效果。我的瑰丽独立树，正好脱颖而出，沐浴在阳光里灿烂。\n\n草原的秋叶在夕阳下如金，随风微动摇曳。\n\n于是我将这时刻，深情的定格在画布上。", "extraInfo": "", "collectionInfo": "多次参展网红打卡作品，原画已被机构收藏，可提供限量微喷版画", "collectionRecord": "多次参展网红打卡作品，原画已被机构收藏，可提供限量微喷版画", "mainImage": "image144.jpg", "qrImage": "image145.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "风景/山河岁月，新疆"}, {"serial": 100, "leoNo": "202209.2", "flag": "", "year": "2020", "series": "珠江风华，广州夜景", "title": "雨后的榕树梢头", "sizeInfo": "90*60㎝\n\n丙烯布面\n\n202209.2", "description": "雨后的珠江夜晚，云朵初现，隐身的月华，呼之欲出，漂亮极了。\n\n微风吹拂，带着点入秋的凉意，在榕树下的江边路漫步，何等惬意！\n\n再用画笔写下这美好", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image148.jpg", "qrImage": "image149.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州", "广州夜景"], "seriesRaw": "珠江风华，广州夜景"}, {"serial": 99, "leoNo": "202209.1", "flag": "", "year": "2020", "series": "山河岁月，新疆，风景系列", "title": "北方苍穹的初秋", "sizeInfo": "90*60㎝\n\n丙烯布面\n\nye202209.1", "description": "北方苍穹的初秋\n将近日落时候，草原的曲线起伏如体。几棵白桦丛，正在夕阳下灿烂如金，仿佛可以久久延绵。\n\n多年以后，那种临在感觉依旧。可以让人抛去广州的暑热，静静的画了下来。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image146.jpg", "qrImage": "image147.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆，风景系列"}, {"serial": 98, "leoNo": "202208.5", "flag": "y", "year": "2020", "series": "柔情系列马主题", "title": "ye20220805", "sizeInfo": "如沐时光\n40*50\n丙烯布面", "description": "如沐时光\n孤独的夜空下， 我总感受到你和我相伴。仿佛我继续在人生里，想起那年青相依而行的岁月。", "extraInfo": "15. 《如沐时光》\n宝子们看过来！《如沐时光》治愈感拉满🌙 孤独夜空下，白马与人物相伴，笔触细腻温柔，藏着青春相依的美好回忆。适配卧室、茶室，格调雅致，轻收藏、居家装饰都可，氛围感直接拉满！\nB各位线上藏家、艺术爱好者，《如沐时光》以温柔笔触勾勒相伴之情。孤独夜空下，白马与人物的互动藏着青春回忆，笔触细腻、色彩柔和，治愈感拉满，曾是网红打卡作品，适配卧室、茶室，轻收藏与装饰双在线。\n15. 《湖滨漫步》", "collectionInfo": "多次参展，红打卡作品。原画已被机构收藏，可以提供限量微喷版画。", "collectionRecord": "多次参展，红打卡作品。原画已被机构收藏，可以提供限量微喷版画。", "mainImage": "image212.jpg", "qrImage": "", "otherImages": [], "category": "柔情系列", "subtags": ["马"], "seriesRaw": "柔情系列马主题"}, {"serial": 97, "leoNo": "202208.4", "flag": "", "year": "2020", "series": "山河岁月，花卉风景，漠北，荷花", "title": "北极村的睡莲", "sizeInfo": "40*60㎝\n\n油彩布面\n\n202208.4", "description": "北极村的小叶睡莲\n漠北北极村的景区湖里，栽种了一些袖珍版的小叶睡莲，在初秋的水面上浮现着迷人的色差。正在转为黄叶的水草在北国的秋意里轻轻摇曳着，池面倒映着湛蓝的天空，这湖光色彩让我想到莫奈的睡莲名画。\n在中国的最北的边疆，隔着黑龙江和俄罗斯的小村对望着。熟读近代史的我， 会不自觉有着种山河情怀，会依然有着历史伤感。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image133.jpg", "qrImage": "image134.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["荷花", "山河岁月"], "seriesRaw": "山河岁月，花卉风景，漠北，荷花"}, {"serial": 96, "leoNo": "202208.3", "flag": "", "year": "2020", "series": "珠江风华", "title": "海心沙的幽兰", "sizeInfo": "60*40㎝\n\n丙烯布面\n\n202208.3", "description": "海心沙的幽兰\n广州的夏日，还是可以有夜凉如水的舒畅时刻，适合有一个游走珠江两岸的从容漫步。\n我喜欢看着悠闲的人儿来往，于是在海心沙的码头边上，匆匆用手机定格下这美好的夜晚。\n而我的美好画面诠释，就是风景里面，有着合适的人儿，似幽兰，于是悠然的画了下来。\n觉得像妳吗？", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image131.jpg", "qrImage": "image136.jpg", "otherImages": [], "category": "珠江风华", "subtags": [], "seriesRaw": "珠江风华"}, {"serial": 95, "leoNo": "202208.2", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "可可西里的情人山", "sizeInfo": "90X60cm\n\n丙烯布面\n\n202208.2", "description": "可可西里的情人山\n可可西里峡谷有两座挨得不远的白色山峰。人们尊称为大小钟神山\n。\n我倒是也喜欢采用文人的浪漫， 用一个爱情故事，来称乎这可能已伫立亿万年的大自然奇景。\n初夏翠绿挺拔的杉树，将白色俊俏的女神山， 装扮的分外妍丽。淙淙的河水流过，发出激悦的音符。\n于是，我的女神山，成了我挂在起居室的画作。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image132.jpg", "qrImage": "image135.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 94, "leoNo": "202208.1", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "可可托里钟神山100X80cm", "sizeInfo": "丙烯布面\n202208.1", "description": "可可托里钟神山\n六月，漫步在可可西海的格尔基斯河峡谷时候，水声沛然，凉意舒畅。\n如大钟般镇守在峡谷中陡立而起的石山，让人仰望。我不断移动脚步，才能找到合适的位置，拍到这样的全景。\n七月，在广州的画室，气定神闲的将这美好画下来！", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image122.jpg", "qrImage": "image123.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 93, "leoNo": "202207.6", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "可可托海等你", "sizeInfo": "90*60cm\n丙烯布面\n202207.6\n\n#山河岁月，新疆", "description": "可可托海等你\n6月那天，随着耳畔的歌声，我们用王琪可可托海等待的恋歌，沿着格尔齐斯河的清凉，慢慢进入北疆的额尔齐斯大峡谷的【可可托海国家地质公园】景区。还在车上就忍不住用长焦开拍起来，为往后的写生收集素材。当然，车上抢拍，也是个技术活， 在近百张照片里，整理出连贯的记忆。\n然后在炽热7月的广州，将这幅画作描绘出来！", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image110.jpg", "qrImage": "image111.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 91, "leoNo": "202207.5", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "雀跃的人儿（局部）", "sizeInfo": "丙烯纸本\n\nA4\n\n202207.5", "description": "那穿红裙子的女子忘情的在湖边舞动着，两只牦牛温顺的一左一后的走绕着。大家都被这可以温柔映射阳光的白沙山和湖所震撼到了。\n\n画小人儿不容易，我先在纸板试稿，再正式画到布面上。", "extraInfo": "", "collectionInfo": "荣获美篇加精推荐，丽景湾私人收藏", "collectionRecord": "", "mainImage": "image109.jpg", "qrImage": "image169.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 92, "leoNo": "202207.5", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "雀跃的人儿", "sizeInfo": "丙烯纸本\n\nA4\n\n202207.5", "description": "雀跃的人儿\n那穿红裙子的女子忘情的在湖边舞动着，两只牦牛温顺的一左一后的走绕着。大家都被这可以温柔映射阳光的白沙山和湖所震撼到了。\n\n画小人儿不容易，我先在纸板试稿，再正式画到布面上。", "extraInfo": "", "collectionInfo": "荣获美篇加精推荐", "collectionRecord": "丽景湾", "mainImage": "image130.jpg", "qrImage": "image168.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 90, "leoNo": "202207.4", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "白沙山的湖光", "sizeInfo": "50*60㎝\n\n丙烯布面\n\n202207.4", "description": "白沙山的湖光\n蓝天白云下的高原湖岸边的白色烁砾滩显得宽阔。有热情的游客和驯服的牦牛。我继续站在画面的正前方看大景，用一张张长焦头的照片，记录我的视觉。\n\n归来，7月炎热的广州空调房里，终于挥笔神游定稿。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n广州私人收藏", "collectionRecord": "丽景湾", "mainImage": "image108.jpg", "qrImage": "image171.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 89, "leoNo": "202207.3", "flag": "", "year": "2020", "series": "珠江风华， 南沙系列", "title": "夏日南沙镜湖", "sizeInfo": "80*100㎝\n\n丙烯布面\n\n202207.3", "description": "那天朋友来南沙镜湖轩，记录我画画的样子。\n于是在向湖的大阳台上，开始对着熟悉的眼前风景首次写生。\n我将繁复线条的建筑物，用几笔粗寬的线条，直落而下，从上午画到下午。有风有云有阳光，光影一直在变。早上如镜子般的倒影，终于变成画面里朦胧感的轻柔。\n于是，定格!", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n广州私人收藏", "collectionRecord": "", "mainImage": "image125.jpg", "qrImage": "image112.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["南沙"], "seriesRaw": "珠江风华， 南沙系列"}, {"serial": 88, "leoNo": "202207.2", "flag": "", "year": "2020", "series": "山河岁月，新疆", "title": "帕米尔高原的白沙山", "sizeInfo": "50*60㎝\n\n丙烯布面\n\n202207.2", "description": "白沙山的湖光\n每年的春季，新疆的314国道，沿着帕米尔高原的边缘，海拔3200公尺的地方。积雪融化之后，大风会将寒雪侵蚀过后的白色细沙砾。吹到下风的山坡上。像是为深色的山坡，涂上一层层细细的白粉，宛如红颜施粉。\n\n山坡的下面，是一个人工湖。成为每年夏天超圣者络绎过来的景点。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n广州私人收藏", "collectionRecord": "丽景湾", "mainImage": "image118.jpg", "qrImage": "image117.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["新疆"], "seriesRaw": "山河岁月，新疆"}, {"serial": 87, "leoNo": "202207.1", "flag": "", "year": "2020", "series": "山河岁月，柔情系列，台湾", "title": "水源与二娇", "sizeInfo": "60*40㎝\n\n丙烯布面\n\n202207.1", "description": "灯塔的回忆，台北富贵角\n这幅小小的画，前前后后花了我两个月的时间才完成。\n边画边想着不断涌现的青春往事，这过程才真是享受。\n那天一大早，水源开着他车来接我，二娇自己开车到水源家汇合，一起出发到台湾最北端的富贵角。      二娇是班花，大学上课时候，水源总喜欢坐在她旁边。还有一个嘉揚，居然在国文课堂上，拿起铅笔就对着二娇照片画起来。\n多年后回台北，我们4个人倒是常常见面同游。", "extraInfo": "", "collectionInfo": "2023年台北藏家查二娇收藏", "collectionRecord": "台北查小姐", "mainImage": "image105.jpg", "qrImage": "image107.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["台湾", "柔情"], "seriesRaw": "山河岁月，柔情系列，台湾"}, {"serial": 86, "leoNo": "202206.2", "flag": "", "year": "2020", "series": "山河岁月，百色风光", "title": "柔情百色", "sizeInfo": "100*80cm\n\n丙烯布面\n\n202206.2", "description": "柔情百色\n无人机的视野，从小船上空投向远方，这样的视野不仅开阔，仿佛多了个维度。\n小船双桨奋力的在湖面上滑行。码头上的游船挂满红色的灯笼。湖水碧绿，倒映着白云如絮的天色，远山如黛。\n\n你也会喜欢这样的动静视角吗？", "extraInfo": "", "collectionInfo": "", "collectionRecord": "", "mainImage": "image120.jpg", "qrImage": "image121.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["百色"], "seriesRaw": "山河岁月，百色风光"}, {"serial": 85, "leoNo": "202206.1", "flag": "", "year": "2020", "series": "柔情系列", "title": "玫瑰花前的女子", "sizeInfo": "50*60cm\n\n丙烯布面\n\n202206.1", "description": "玫瑰花前的女子\n我喜欢隐在暗绿色块里的红色玫瑰，有特别的美感。\n鬓发如丝扬的精致女子，点缀在画面的一角。\n她其实还穿着了一袭落肩的蕾丝白色裙子，我就只画出了手臂上一小部分衣袖。\n\n这样甚好！\n成为我六月份的第一幅作品。按： 人物部分准备再修改优化260516前完成", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image104.jpg", "qrImage": "image106.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 84, "leoNo": "202205.4", "flag": "", "year": "2020", "series": "柔情系列", "title": "漂浮的浅笑", "sizeInfo": "90*60cm\n\n丙烯布面\n\n202205.4", "description": "漂浮的浅笑\n带着凄凉微笑的女孩，飘浮在花瓣河里。为了色彩对称，我将乌黑的头发化为橘红色。不再用“奥菲利亚”的悲伤。仿佛在微风轻抚的上，在自己的青春美好众半梦半醒", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image115.jpg", "qrImage": "image114.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列"}, {"serial": 83, "leoNo": "202205.3", "flag": "", "year": "2020", "series": "山河岁月，漠北", "title": "202205.3", "sizeInfo": "冬季的牧场 50X40cm\n 丙烯布面", "description": "深秋的牧场\n深秋的牧场， 棕红色的树叶和初雪浅浅的雪原上，斜斜的午后一米阳光，将白色的雪原，变化成迷人温暖的太阳白，跳出阴冷的蓝色雪地。 牧人依旧在忙碌。这天苍苍野漫漫的一隅，透露着温馨的空寂。", "extraInfo": "", "collectionInfo": "2023年台北企业家陈鸿仪收藏", "collectionRecord": "台北陈总", "mainImage": "image124.jpg", "qrImage": "", "otherImages": [], "category": "山河岁月", "subtags": ["漠北"], "seriesRaw": "山河岁月，漠北"}, {"serial": 82, "leoNo": "202205.2", "flag": "", "year": "2020", "series": "山河岁月，#柔情系列", "title": "202205.2", "sizeInfo": "鲁冰花的蓝天\n90x60cm\n丙烯布面", "description": "鲁冰花上的蓝天\n旧金山湾区初夏的小丘，可以看到盛开的黄色鲁冰花。大片大片的花束，在蓝天下随微风摇曳。然后，漂亮的女孩，成为画面里的亮点。\n\n这样的画面里，应该会有海鸥飞翔才好。", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image127.jpg", "qrImage": "image103.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["柔情"], "seriesRaw": "山河岁月，#柔情系列"}, {"serial": 81, "leoNo": "202205.1", "flag": "", "year": "2020", "series": "山河岁月，台湾", "title": "台湾最北端的灯塔", "sizeInfo": "60X80cm\n\n丙烯布面\n\nye:202205.1", "description": "台湾最北端的灯塔\n疫情前， 经常回台北。\n那天，久违的大学同学相约，我们起个大早从台北的北郊区，淡水出发，探访台湾最北端的富贵角灯塔公园。\n而现在， 我在广州想念那个时光，蓝天白云和海陆交汇的浪花，还有陪着的朋友。", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image113.jpg", "qrImage": "image167.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["台湾"], "seriesRaw": "山河岁月，台湾"}, {"serial": 80, "leoNo": "202204.4", "flag": "", "year": "2020", "series": "珠江风华，南沙，", "title": "蛹之生，蜕变，蝶舞效应", "sizeInfo": "90*60cm\n\n丙烯布面\n\n202204.4", "description": "蛹之生\n如蛹之生，蜕变，振翅，蝴蝶效应\n  一百五十 年来的中国，在充满荆刺的风雨路上，代代年轻人，一直前仆后继。\n        如今，伶仃洋畔的御敌炮台依旧，虎门大桥已经在这里跨越22年。改革开放之后的大潮，在这里向全中国回荡，现代中国已然腾飞。\n        一如蛹之生，不仅仅是生命传承，更重要的是”蜕变”后的飞舞，期待你们接棒，然后奔跑，启动改变世界的蝴蝶效应！", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image56.jpg", "qrImage": "image57.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["南沙"], "seriesRaw": "珠江风华，南沙，"}, {"serial": 79, "leoNo": "202204.3", "flag": "", "year": "2020", "series": "珠江风华，江畔的广州", "title": "月上榕梢头", "sizeInfo": "60x40cm\n\n丙烯布面\n\nye202204.3", "description": "4月5日，清明时候月如钩。一缕清香，正是人间无限思念时节。岸边人看江上游轮，依旧轻轻滑过。仿佛旧日时光，尚有当年亲友团聚的轻笑细语。东亚几个大城市的疫情防控紧绷，上海市民的生活几乎停摆。新月初上榕树梢头，刻意记录这个2022年清明，江轮依旧灿烂的珠江。", "extraInfo": "", "collectionInfo": "2023台北藏家谭康乐收藏", "collectionRecord": "台北周小姐", "mainImage": "image58.jpg", "qrImage": "image180.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州"], "seriesRaw": "珠江风华，江畔的广州"}, {"serial": 78, "leoNo": "202204.2", "flag": "", "year": "2020", "series": "山河岁月--历史印痕", "title": "大航海时代的印痕", "sizeInfo": "40*50CM\n\n丙烯布面。\n\nYE202204.2", "description": "这个极具历史感的古朴砌石纪念碑，是罗卡角角的标志建筑。有历史修养的各国观光客来到这里，在此俯仰眺望之间，会有天地之悠悠感。当年南欧的父老乡亲在这里眺望着渡海的帆船，盼望着远去的亲人，能够早日平安归来。", "extraInfo": "", "collectionInfo": "2024台北藏家庐英才收藏", "collectionRecord": "2023台北藏家卢英才收藏", "mainImage": "image59.jpg", "qrImage": "image60.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["历史印痕"], "seriesRaw": "山河岁月--历史印痕"}, {"serial": 77, "leoNo": "202204.1", "flag": "", "year": "2020", "series": "山河岁月--历史印痕", "title": "欧洲的天涯海角：罗卡角的山海恋", "sizeInfo": "葡萄牙里斯本        \n80x100cm\n丙烯布面\nye202204.1", "description": "罗卡角的山海恋\n葡萄牙罗卡角是欧洲的最西边的“天涯海角”那天上午的阳光斜斜切入，海上的雾时散时聚。特别迷人。海浪轻拍着高耸的岩岸。我用镜头捕抓着她好奇大胆，走下缓坡的视角。那美好画面就这样定格了。罗卡角是欧洲大陆的最西边，廣邈的大西洋，就从这里开始，成就了欧洲人在15.16世纪的航海大时代。", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image61.jpg", "qrImage": "image62.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["历史印痕"], "seriesRaw": "山河岁月--历史印痕"}, {"serial": 76, "leoNo": "202203.6", "flag": "", "year": "2020", "series": "柔情系列，", "title": "人面樱花相映红", "sizeInfo": "50*40cm\n\n丙烯布面\n202203.6", "description": "人面樱花相映红\n3月广州人间，樱花处处的海珠湿地公园。\n人面樱花依旧红，不见去年人。\n且行且顾盼，蓦然回首，那人却在花丛里，用黑邃的大眼睛，欲语还休。人面樱花相映红，\n原来我的油画里，依旧是宋词情怀\n\n似曾相识，似曾相识！…", "extraInfo": "", "collectionInfo": "入选美国CIIT协会", "collectionRecord": "", "mainImage": "image63.jpg", "qrImage": "image64.jpg", "otherImages": [], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列，"}, {"serial": 75, "leoNo": "202203.5", "flag": "", "year": "2020", "series": "山河岁月，漠北金秋", "title": "日照青山生紫烟", "sizeInfo": "60x90cm\n丙烯布面\nye:202203.5\n#山河岁月漠北", "description": "日照青山生紫烟\n太阳慢慢的从后山爬上来，将原本背光深邃的山坡树丛，从轻轻的雾霭中陆续点亮。\n唐代李白在也是深邃的宫苑里，留下体验出日照青炉生紫烟的淡淡画面写景好词。 我在黑龙江边溜达时， 上午十点不到的时间正好，也用镜头捕捉了类似“阳光倾泻在轻轻的山间晨雾，如青烟现象”的感觉。", "extraInfo": "", "collectionInfo": "荣获美篇加精推荐", "collectionRecord": "", "mainImage": "image65.jpg", "qrImage": "image66.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠北"], "seriesRaw": "山河岁月，漠北金秋"}, {"serial": 74, "leoNo": "202203.4", "flag": "", "year": "2020", "series": "山河岁月, 漠北", "title": "大地的眼睛", "sizeInfo": "60x90 cm\n丙烯布面\n20220304", "description": "大地的眼睛\n秋日的漠北，在最美丽的9月时候，在小坡的眺望台上。北方的河蜿蜒流过，绕成一个大弯，在视觉上像个小湖。湛蓝的天空，倒映在水面上。她说, 像是大地的眼睛\n他记下来了，然后回到广州，画了一副小幅草图之后，三月，终于用90×60的画面，再正式的画了下来。\n于是两个人都喜欢的那个漠北下午，就定格下来了，可以挂在客厅的墙上。", "extraInfo": "", "collectionInfo": "荣获美篇加精推荐，2023年雅昌拍卖，私人收藏， 加精版画多人收藏", "collectionRecord": "", "mainImage": "image67.jpg", "qrImage": "image68.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠北"], "seriesRaw": "山河岁月, 漠北"}, {"serial": 73, "leoNo": "202203.3", "flag": "", "year": "2020", "series": "山河岁月，历史印痕", "title": "向日葵的蓝天", "sizeInfo": "40x40cm， 丙烯布面\n\nye20220303", "description": "向日葵的蓝天\n第5波疫情，继续疯狂肆掠。人民还在惊恐。\n俄乌战争迈入了第24天。\n我继续画了关注这战争的第3幅画。特地画了一株向日葵矗立在蓝天里，仿佛听到向蓝天里路过的云朵呼唤，人类一定要珍惜和平\n乌克兰的土地上，继续着尸骨和废墟遍野。欧洲的美丽苍穹下，为何有着人类最频繁的战争？", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image69.jpg", "qrImage": "image70.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["历史印痕"], "seriesRaw": "山河岁月，历史印痕"}, {"serial": 72, "leoNo": "202203.2", "flag": "", "year": "2020", "series": "山河岁月，历史印痕", "title": "芬兰岛的战争印痕", "sizeInfo": "60x80cm, 丙烯布面\n202203.2", "description": "芬兰岛的战争印痕\n年的五月天，特地探访赫尔辛基不远的芬兰岛。\n我们沿着掩体的外围小径漫步，看着港湾不远处的波罗的海。想象着跨海而来船舰上的敌人，正用着望远镜，寻找被伪装良好的掩体。\n巨炮隐藏在人工构筑的掩体里面，这里曾经有人数居于绝对劣势的芬兰人成功抵抗俄罗我那斯的往事。挣脱俄罗斯人统治的芬兰人，如今生活富裕美好.", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image37.jpg", "qrImage": "image38.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["历史印痕"], "seriesRaw": "山河岁月，历史印痕"}, {"serial": 71, "leoNo": "202203.1", "flag": "", "year": "2020", "series": "山河岁月，历史印痕", "title": "芬兰的战地天空", "sizeInfo": "60x80cm \n 丙烯布面\n202203.1", "description": "芬兰的战地天空2019年5月的北欧，我们坐小渡轮离开赫尔辛基造访30公里外，芬兰从俄罗斯手中夺回的战略小岛上。初夏的天气依旧如春，我和来自世界各地的游客，悠然的走在改变为观光胜地的营区里。偶尔还有穿着军服的职业军人列队走过，或围着教官在不同的要寨上聆听讲解。\n天空湛蓝，几门巨炮，矗立在小坡上。依旧对准着俄罗斯方向，\n满地黄花堆积，我立刻联想到这里曾经尸骨遍野，攻守双方经过无数的争夺。", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "324伍先生", "mainImage": "image33.jpg", "qrImage": "image34.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["历史印痕"], "seriesRaw": "山河岁月，历史印痕"}, {"serial": 70, "leoNo": "202202.3", "flag": "y", "year": "2020", "series": "柔情系列，人与马,，", "title": "湖畔漫步", "sizeInfo": "40*60㎝，丙烯布面，\n202202.3", "description": "湖滨漫步\n那个一身中国红的女子，牵着高大的白马，静静的沿着湖边，在我面前走过。\n仿佛，这里会有一个属于感情的故事。这画面是否足够你去联想？我用初晨反射金色阳光的小船，突出还在等待黎明的大地。希望表达出希望和远方的诗。", "extraInfo": "15. 《湖滨漫步》\n家人们闭眼冲！《湖滨漫步》自带故事感✨ 中国红女子牵白马沿湖漫步，晨雾小船点缀，寓意希望与诗和远方。适配客厅、茶室，小众有格调，收藏、装饰两相宜，每一笔都藏着美好期许！\nB.各位线上藏家、艺术爱好者，《湖滨漫步》以诗意笔触构建情感空间。中国红女子牵白马沿湖漫步，初晨金光映照小船，传递希望与远方的意境，技法简约却韵味十足，适配客厅、休闲空间，小众有格调。", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐， 微喷刻印版画多人收藏", "collectionRecord": "30*40，", "mainImage": "image41.jpg", "qrImage": "image42.jpg", "otherImages": [], "category": "柔情系列", "subtags": ["马"], "seriesRaw": "柔情系列，人与马,，"}, {"serial": 69, "leoNo": "202202.2", "flag": "y", "year": "2020", "series": "柔情系列， 超现实系列，\n人与马,", "title": "踏着彩云的白马", "sizeInfo": "80x60cm, \n丙烯布面\nye202202.2", "description": "踏着彩云的白马\n80x60cm, 丙烯布面\n编号:ye202202.4\n属于少女的期望，在梦里总是虔诚的捧着水晶球，期待自己的未来。\n那人儿是否会像白马踏着彩云而来，\n然后跨越大海，\n带我扬帆而去，只为诗和远方。", "extraInfo": "16. 《踏着彩云的白马》\n少女心必入！《踏着彩云的白马》梦幻感拉满🌈 少女捧水晶球，白马踏彩云而来，笔触细腻，藏着对未来的美好期许。适配卧室、化妆间，尺寸适中，送闺蜜、自藏都可，颜值直接戳中审美！\nB. 各位线上藏家、艺术爱好者，《踏着彩云的白马》圆了少女的美好憧憬。白马踏彩云而来，水晶球与人物藏着对未来的期许，色彩斑斓、笔触梦幻，适配卧室、化妆间，少女感与艺术感兼具，是小众收藏别致之选。", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐， 微喷刻印版画多人收藏", "collectionRecord": "", "mainImage": "image35.jpg", "qrImage": "image36.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情", "马"], "seriesRaw": "柔情系列， 超现实系列，\n人与马,"}, {"serial": 68, "leoNo": "202202.1", "flag": "y", "year": "2020", "series": "山河岁月，漠北金秋，马", "title": "漠北的月夜", "sizeInfo": "60x50cm 丙烯布面\n创作时间编号：20220201", "description": "漠北的月夜\n夜晚的落羽杉林里，溪水静静流淌。我用马儿饮水的倒影，为初秋的北疆，添加一些美好的遐想。白天遇见的小船， 依旧停在溪畔，组合成我的诗和远方。\n溪畔的白马，在月光下反射金色的落羽杉前漫步。\n我喜欢用满月衬托整个深蓝色的夜空和雾霭交叠出的层次画面。\n疫情限制了旅行远方的行动力，寒冷的广州初春，适合在南沙宽阔的狮子洋畔，延伸思维里的远方美好。", "extraInfo": "17《漠北的月夜》\n家人们速抢！《漠北的月夜》氛围感绝了🌌 落羽杉林、溪水潺潺，白马饮水倒影，满月衬深蓝夜空，层次丰富。适配书房、客厅，山河岁月系列稀缺款，收藏潜力大，尽显北疆诗意之美！\nB.各位线上藏家、艺术爱好者，《漠北的月夜》尽显北疆诗意之美。落羽杉林、潺潺溪水、饮水白马，满月衬深蓝夜空，雾霭交织出丰富层次，以笔触延伸远方想象，山河岁月系列稀缺款，收藏价值可观。", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐， 微喷刻印版画多人收藏", "collectionRecord": "", "mainImage": "image126.jpg", "qrImage": "image20.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠北", "马"], "seriesRaw": "山河岁月，漠北金秋，马"}, {"serial": 67, "leoNo": "202201.4", "flag": "", "year": "2020", "series": "花卉系列，梅花情怀", "title": "艳阳天的斑斓梅花（2）", "sizeInfo": "60*90㎝\n 丙烯布面。\n20220104", "description": "艳阳天的斑斓梅花（2）：\n90*60㎝ 丙烯布面。2022年一月\n意犹未尽，再续画一幅写实写意混搭的梅花，在艳阳天里的视觉盛宴，适合挂在起居间或书房，我归属于“疗愈”风格，可以散发正能量的作品。", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐， 微喷刻印版画多人收藏，美国CAAA协会2025 年推荐", "collectionRecord": "", "mainImage": "image23.jpg", "qrImage": "image24.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "花卉系列，梅花情怀"}, {"serial": 66, "leoNo": "202201.2", "flag": "", "year": "2020", "series": "珠江风华，广州植物园", "title": "鎏金时光", "sizeInfo": "50*60㎝\nye20200102\n丙烯油彩布面", "description": "鎏金时光\n广州植物园也是个好地方，有树林，有小湖 。\n那天的阳光，斜斜的照落了下来。整个林梢充满了层层的色彩感。湖畔边，将近两米高的浅金黄色芦苇和倒影，更是突出画面的色块。悠闲的人儿，或独行或带着孩子，陆续走过，留下了动态和鲜明的倒影。我坐在对岸发呆，沉浸在这流金般的岁月里。\n其实在想着，如何用画笔将这一幕画下来，留住时光。", "extraInfo": "", "collectionInfo": "本画版权已于2022年2月签约授权给佛山某著名陶瓷公集团，制作限量岩板画， 2022年雅昌拍卖", "collectionRecord": "", "mainImage": "image30.jpg", "qrImage": "image31.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州", "广州植物园"], "seriesRaw": "珠江风华，广州植物园"}, {"serial": 65, "leoNo": "202201.1", "flag": "", "year": "2020", "series": "花卉系列，梅花情怀", "title": "艳阳下的斑斓梅花", "sizeInfo": "60*90㎝ \n丙烯布面 \nye20220101", "description": "艳阳下的斑斓梅花\n90*60㎝ 丙烯布面 2022年一月\n\n这幅梅花的色彩和构图走得比较远，背景用了大量原色系，来彰显阳光下的斑斓感觉，尝试着改变一下传统梅花给人的刻板印象。", "extraInfo": "", "collectionInfo": "本画版权已于2022年3月签约授权给佛山某著名陶瓷公集团，制作限量岩板画，美国CAAA协会2025 年推荐", "collectionRecord": "艺博会组委", "mainImage": "image22.jpg", "qrImage": "", "otherImages": ["image24.jpg"], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "花卉系列，梅花情怀"}, {"serial": 64, "leoNo": "202112.5", "flag": "", "year": "2020", "series": "珠江风华--粤北金秋", "title": "秋获的稻香喜悦", "sizeInfo": "60*90 ㎝， 丙烯布面。\n\n2021125", "description": "秋获的稻香喜悦\n摄影记录稿于2021年10月广东连南地区的梯田。\n我在山下仰望着一层层逐级而上的梯田。这个角度只看到一条条露出田埂的稻穗，和埂上的绿草交错。\n蓝天白云和站在岭上眺望俯瞰梯田美景的人儿。向东的山脉午后变成逆光的黑色。这鲜明艳丽对称的色彩感。让秋收的金黄美好，成为一幅我喜欢的治愈系画面。", "extraInfo": "", "collectionInfo": "本画版权已于2022年3月签约授权给某著名陶瓷集团，制作限量岩板画。2022年雅昌拍卖\n荣获美篇加精推荐", "collectionRecord": "", "mainImage": "image19.jpg", "qrImage": "image181.jpg", "otherImages": ["image1.jpg"], "category": "珠江风华", "subtags": ["粤北"], "seriesRaw": "珠江风华--粤北金秋"}, {"serial": 63, "leoNo": "202112.4", "flag": "", "year": "2020", "series": "梅花情怀", "title": "却把青梅嗅", "sizeInfo": "60*50㎝\n丙烯布面 2021年12月", "description": "却把青梅嗅\n60*50㎝\n丙烯布面 2021年12月\n\n冬天的夕阳5点多就快天黑了，这时候。游人开始少了，最适合在光影变化的树梢下流连。点点梅花，其实也适合近看。依然空旷的枝桠上，摇曳着点点梅花，伴着夕阳余晖中的光感，真是美好的感觉", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐， 微喷刻印版画多人收藏", "collectionRecord": "", "mainImage": "image21.jpg", "qrImage": "image24.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["梅花"], "seriesRaw": "梅花情怀"}, {"serial": 62, "leoNo": "202112.3", "flag": "", "year": "2020", "series": "超现实系列#天鹅轮回", "title": "天鹅飞去", "sizeInfo": "90*60㎝\n丙烯布面 \nye20211203", "description": "天鹅飞去\n(二维码更多内容）。\n那天，目击者说，长大锐变成英姿勃发的黑天鹅们，集体绕了几圈小区里的镜湖后，牠们终于决定迎着晨曦，掠过了虎门大桥的上空，向远方飞去。\n这从孵化到出生到远离的过程，仿佛都在一一刹那间发生。\n岸边，一直呵护小天鹅，从孵化到成长的天鹅妈妈，又继续孵化着下一窝新生命。新一轮的生命，又将启动。仿佛轮回。", "extraInfo": "", "collectionInfo": "广州方总私人收藏", "collectionRecord": "广州方总收藏202011", "mainImage": "image54.jpg", "qrImage": "image55.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["天鹅轮回"], "seriesRaw": "超现实系列#天鹅轮回"}, {"serial": 61, "leoNo": "202112.2", "flag": "", "year": "2020", "series": "超现实系列#天鹅轮回", "title": "飞天蝶恋", "sizeInfo": "90*60 ㎝ \n布面丙烯\n ye0211202", "description": "飞天蝶恋\n不知是庄周梦蝶，还是蝶梦庄周。生命轮回，将人生如梦，梦如人生，最言简意赅的解释。\n人生里 ，最美的是初生之喜悦，也有昂首飞跃的激昂时候，这其中其实要付出多少努力历练如滴血心锥？", "extraInfo": "", "collectionInfo": "第26届广州国际艺博会", "collectionRecord": "", "mainImage": "image6.jpg", "qrImage": "image7.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["天鹅轮回"], "seriesRaw": "超现实系列#天鹅轮回"}, {"serial": 60, "leoNo": "202112.1", "flag": "", "year": "2020", "series": "超现实系列#天鹅轮回", "title": "渴望 新生", "sizeInfo": "60 *50㎝\n布面丙烯 \nye20211201", "description": "渴望 新生\n 我喜欢用黄色和蓝色混搭 。\n丹麦童话里丑小鸭变成天鹅，才发现自己的不凡。\n晨曦时候，金闪闪的初升太阳，一下子把世界变得黄金灿烂，耀眼。\n我的感知还留在刚刚退出的星空里，用朵朵祥云，迎接新的一天，这刹那，又有多少让人翘首以望的新生命诞生？\n这必然是一个美好的时刻。", "extraInfo": "", "collectionInfo": "第27届广州国际艺博会", "collectionRecord": "", "mainImage": "image53.jpg", "qrImage": "image55.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["天鹅轮回"], "seriesRaw": "超现实系列#天鹅轮回"}, {"serial": 59, "leoNo": "202111.3", "flag": "", "year": "2020", "series": "珠江风华，稻香", "title": "连南黑山稻穗之美", "sizeInfo": "60X80㎝ \n布面丙烯。\nYe20211103", "description": "连南黑山的黄金稻穗\n10月中旬。岭南大地依旧非常炎热。\n整个岭南大地的秋天，正是稻米成熟的时候。广东省的北边，连南，有个向东的黑山，山当然是绿的，只是在下午的时候，太阳渐渐移动到西面，这逆光的感觉山就变成黑了。山下有依然用人工种植操作的梯田。", "extraInfo": "", "collectionInfo": "第26届广州国际艺博会荣获美篇加精推荐", "collectionRecord": "丽景湾", "mainImage": "image9.jpg", "qrImage": "image170.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["稻香"], "seriesRaw": "珠江风华，稻香"}, {"serial": 58, "leoNo": "202111.2", "flag": "", "year": "2020", "series": "珠江风华，广州植物园", "title": "风起云涌的广州", "sizeInfo": "110*70㎝ \n布面丙烯\n 20211102", "description": "风起云涌的广州\n110*70㎝ 布面丙烯 2021年 11月\n\n珠江上的云，经常演出变幻莫测的大戏。那天，在琶洲大桥上伫立回望 ，就是这样的时刻，不断变换的云。才从桥的两南侧到北侧，仿佛延时摄影的眼睛努力补抓这风起云涌的勃发，再用画笔，记录这美好。", "extraInfo": "", "collectionInfo": "2021年广州国际艺博会荣获美篇加精推荐", "collectionRecord": "", "mainImage": "image25.jpg", "qrImage": "image29.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州", "广州植物园"], "seriesRaw": "珠江风华，广州植物园"}, {"serial": 57, "leoNo": "202111.1", "flag": "", "year": "2020", "series": "超现实，满月。天鹅轮回", "title": "跳舞的云朵", "sizeInfo": "60*50㎝\n 丙烯布面\n ye20211101", "description": "跳舞的云朵\n清晨，日出东方，正好也是月落西方的时候。我用跨时空的大法将两者叠加在虎门大桥的上空。\n\n那天，目击者说，绕了几圈小区里的镜湖，牠们终于决定迎着晨曦，掠过了虎门大桥的上空，向远方飞去。\n朵朵跳舞的云，在微笑， 目送她们飞向远方。", "extraInfo": "", "collectionInfo": "1. 2021年12月参加第26届广州国际艺博会\n2.美篇加精推荐", "collectionRecord": "", "mainImage": "image4.jpg", "qrImage": "image5.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["天鹅轮回", "满月"], "seriesRaw": "超现实，满月。天鹅轮回"}, {"serial": 56, "leoNo": "202110.2", "flag": "", "year": "2020", "series": "", "title": "自画像", "sizeInfo": "60*40 cm\n丙烯布面\n202110.2", "description": "自画像", "extraInfo": "", "collectionInfo": "非卖品、", "collectionRecord": "丽景湾", "mainImage": "image93.jpg", "qrImage": "", "otherImages": [], "category": "肖像人体", "subtags": [], "seriesRaw": ""}, {"serial": 55, "leoNo": "202110.1", "flag": "", "year": "2020", "series": "风景系列，漠河金秋", "title": "漠北的秋情", "sizeInfo": "40*40㎝， \n丙烯布面。\nye202110.1 \n#山河岁月", "description": "漠北的秋黄\n将近中午时候，经过北极村附近白桦林的牧场，阳光正蓝，微风轻拂。\n黄叶依旧挂在树上，白色的树干，反射着阳光。初秋最好的时后，最适合在漠北边境流连。\n\n即使多日之后，在炽热的广州，还可以感受那一片金黄，似鎏金岁月。", "extraInfo": "", "collectionInfo": "版权使用权已和国内佛上陶瓷公司签约，制作岩板画。 广州藏家", "collectionRecord": "", "mainImage": "image39.jpg", "qrImage": "image40.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠河"], "seriesRaw": "风景系列，漠河金秋"}, {"serial": 54, "leoNo": "202109.2", "flag": "", "year": "2020", "series": "山河岁月--大兴安岭金秋", "title": "大兴安岭的婉约", "sizeInfo": "Ye20210902\n120*90㎝ \n丙烯布面", "description": "大兴安岭的婉约 \n2020年九月，车行大兴安岭，发现海拔并不高九月的初秋，已经逐渐褪去盛夏的碧绿， 呈现出北国特有的金黄色。 我在观景处眺望。格尔斯河在这里蜿蜒流淌。河中的小岛，还有另一个小泻湖，迷人极了。用长焦在各角度反复取景， 作为回广州的草稿。\n一年后，终于下笔完成。仿佛又去了一趟漠北。历历入目的感觉油然而生。", "extraInfo": "", "collectionInfo": "荣获美篇加精推荐。私人收藏", "collectionRecord": "", "mainImage": "image13.jpg", "qrImage": "image18.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["大兴安岭"], "seriesRaw": "山河岁月--大兴安岭金秋"}, {"serial": 53, "leoNo": "202109.1", "flag": "", "year": "2020", "series": "山河岁月--大兴安岭金秋", "title": "ye20210901", "sizeInfo": "漠北的彩色水草 \n 60*80㎝ \n丙烯布面", "description": "九月 漠河\n这夕阳下灿烂飘逸的湿地，像彩色的梦，从湿地的上游，穿过水生树林，溢出到河流，向远处延伸。是我见过最漂亮的彩色水草。\n这是我的山河金秋正当时系列之一", "extraInfo": "", "collectionInfo": "1. 2021年12月参加第26届广州国际艺博会", "collectionRecord": "", "mainImage": "image32.jpg", "qrImage": "image8.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["大兴安岭"], "seriesRaw": "山河岁月--大兴安岭金秋"}, {"serial": 52, "leoNo": "202108.1", "flag": "", "year": "2020", "series": "珠江风华，广州", "title": "日出东方的广州", "sizeInfo": "120*90㎝ \n布面丙烯 \nye20210801", "description": "日出东方的广州\n广州游艇会码头，远眺二沙岛和日出东方的云彩。\n滨江东路的两岸。清晨的第一艘客轮，正飞快划过。不远处的城市天际线可以很清楚的看到了东塔，西塔和小蛮腰，隐约的海心桥 。\n晨曦在多云的天空蓝中闪闪躲躲，难以捕抓，却充满魅力。我用自己的印象，将流动的光影留下。\n\n这是充满活力和不断焕发新颜的广州！", "extraInfo": "", "collectionInfo": "荣获美篇加精推荐\n2022年7月入选当代百家画展，广州 私人收藏", "collectionRecord": "丽景湾", "mainImage": "image26.jpg", "qrImage": "image29.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州"], "seriesRaw": "珠江风华，广州"}, {"serial": 51, "leoNo": "202108.2", "flag": "", "year": "2020", "series": "珠江风华--珠江畔的广州", "title": "海心桥畔的情人", "sizeInfo": "60*40㎝ \n丙烯布面。\n 202108.2", "description": "海心桥畔的情人\n刚开放的海心桥是红色为主题。走在桥上有这种神秘莫测的红色感觉。\n2021年六月底，跨越珠江两岸的海心桥正式开放, 我特地拍了视频记录。也用画笔描绘出来。见证这美好 。\n现代都会多光源的夜景，和溜达的人物，在取舍上多了好多选择。", "extraInfo": "", "collectionInfo": "荣获美篇加精推荐\n2022年7月入选当代百家画展", "collectionRecord": "", "mainImage": "image28.jpg", "qrImage": "image29.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州"], "seriesRaw": "珠江风华--珠江畔的广州"}, {"serial": 50, "leoNo": "202107.6", "flag": "", "year": "2020", "series": "山河岁月，绩溪写生", "title": "绩溪听泉亭", "sizeInfo": "40*30cm\n丙烯布面\nye202207.6", "description": "古村里最著名的路标，听泉亭，由于是第2幅类似的题材，基本上一气呵成，可以不需要改动了。40×30公分的画框里，仔细的画，还是可以把无限江山装进来。\n\n私人收藏", "extraInfo": "", "collectionInfo": "私人收藏", "collectionRecord": "广州私人收藏 张建华", "mainImage": "image91.jpg", "qrImage": "", "otherImages": [], "category": "山河岁月", "subtags": ["绩溪"], "seriesRaw": "山河岁月，绩溪写生"}, {"serial": 49, "leoNo": "202107.5", "flag": "", "year": "2020", "series": "山河岁月，绩溪写生", "title": "绩溪古村的老桥", "sizeInfo": "40*30cm\n丙烯布面\n202207.5\n\n私人收藏", "descrip
