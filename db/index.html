<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>叶纪鸿作品数据库</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg-card: #1a1a1a;
    --bg-hover: #242424;
    --text: #e0e0e0;
    --text-secondary: #999;
    --accent: #c9a96e;
    --accent-dim: #8b7355;
    --accent-glow: rgba(201,169,110,.15);
    --border: #333;
    --shadow: 0 2px 12px rgba(0,0,0,.4);
    /* 大类颜色 */
    --cat-art: #c084fc;      /* 艺术流派 紫 */
    --cat-emotion: #fbbf24;  /* 情感&人物 金 */
    --cat-nature: #60a5fa;   /* 地域&自然 蓝 */
    --cat-theme: #4ade80;    /* 题材 绿 */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    line-height: 1.6;
  }

  /* ── Nav ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,15,.95); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  nav .logo { font-size: 18px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  nav .count { font-size: 13px; color: var(--text-secondary); }
  .search-box { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .search-box input {
    background: var(--bg-card); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 14px; width: 200px; outline: none;
    transition: border-color .2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box select {
    background: var(--bg-card); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 8px; font-size: 14px; cursor: pointer; outline: none;
  }
  .btn-all {
    background: var(--accent); color: #000; border: none;
    border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background .2s; white-space: nowrap;
  }
  .btn-all:hover { background: #d4b87a; }

  /* ── Container ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* ── Section title ── */
  .section-title {
    font-size: 20px; font-weight: 700; color: var(--accent);
    margin-bottom: 20px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 10px;
  }
  .section-title .sub { font-size: 13px; color: var(--text-secondary); font-weight: 400; }

  /* ════════════════════════════════════════════
     Featured Awards Carousel
     ════════════════════════════════════════════ */
  .featured-section {
    margin-bottom: 40px;
  }
  .featured-title {
    font-size: 20px; font-weight: 700; color: #f59e0b;
    margin-bottom: 18px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(245,158,11,.25);
    display: flex; align-items: center; gap: 10px;
  }
  .featured-title .feat-emoji { font-size: 24px; }
  .featured-title .feat-sub { font-size: 13px; color: var(--text-secondary); font-weight: 400; }
  .featured-carousel {
    display: flex; gap: 16px; overflow-x: auto;
    padding-bottom: 12px; scroll-snap-type: x mandatory;
    scrollbar-width: thin; scrollbar-color: var(--accent-dim) transparent;
  }
  .featured-carousel::-webkit-scrollbar { height: 6px; }
  .featured-carousel::-webkit-scrollbar-track { background: transparent; }
  .featured-carousel::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 3px; }
  .feat-card {
    flex: 0 0 280px; scroll-snap-align: start;
    background: linear-gradient(135deg, #1a1a14 0%, #1a1a1a 100%);
    border: 1px solid rgba(245,158,11,.15); border-radius: 10px;
    overflow: hidden; cursor: pointer;
    transition: border-color .25s, transform .25s, box-shadow .25s;
  }
  .feat-card:hover {
    border-color: rgba(245,158,11,.4);
    transform: translateY(-3px);
    box-shadow: 0 4px 20px rgba(245,158,11,.12);
  }
  .feat-card-img {
    width: 100%; height: 190px; object-fit: cover; display: block;
    background: #111;
  }
  .feat-card-body { padding: 12px 14px; }
  .feat-card-award {
    display: inline-block; font-size: 10px; color: #f59e0b; font-weight: 600;
    background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.25);
    border-radius: 3px; padding: 2px 7px; margin-bottom: 6px;
    letter-spacing: .5px; text-transform: uppercase;
  }
  .feat-card-title {
    font-size: 15px; font-weight: 600; color: #fff;
    margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .feat-card-series {
    font-size: 11px; color: var(--accent); margin-bottom: 6px;
  }
  .feat-card-highlight {
    font-size: 11px; color: var(--text-secondary);
    line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  @media (max-width: 600px) {
    .feat-card { flex: 0 0 220px; }
    .feat-card-img { height: 150px; }
  }

  /* ════════════════════════════════════════════
     Series-Subtag Relationship Map
     ════════════════════════════════════════════ */
  .rel-map {
    margin-bottom: 48px;
  }
  .rel-row {
    display: flex; align-items: flex-start; gap: 0;
    padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,.04);
    transition: background .2s;
  }
  .rel-row:hover { background: rgba(255,255,255,.015); }
  .rel-series {
    min-width: 160px; max-width: 180px;
    padding: 8px 16px 8px 0;
    border-right: 1px solid var(--accent-dim);
    margin-right: 16px;
    text-align: right;
    cursor: pointer; transition: opacity .15s;
  }
  .rel-series:hover { opacity: .8; }
  .rel-series-name {
    font-size: 15px; font-weight: 600; color: var(--accent);
    letter-spacing: .5px; white-space: nowrap;
    text-decoration: underline; text-decoration-color: transparent;
    transition: text-decoration-color .15s;
  }
  .rel-series:hover .rel-series-name { text-decoration-color: var(--accent); }
  .rel-series-count {
    font-size: 11px; color: var(--text-secondary); margin-top: 2px;
  }
  .rel-tags {
    flex: 1; display: flex; flex-wrap: wrap; gap: 6px; padding-top: 6px;
  }
  .rel-tag {
    font-size: 12px; color: #e0c87a;
    background: rgba(224,200,122,.08); border: 1px solid rgba(224,200,122,.2);
    border-radius: 12px; padding: 3px 10px;
    transition: all .2s; cursor: pointer;
  }
  .rel-tag:hover {
    background: rgba(224,200,122,.25); border-color: rgba(224,200,122,.55);
    transform: translateY(-1px);
  }
  .rel-tag .tag-count { font-size: 10px; opacity: .6; margin-left: 3px; }

  /* ════════════════════════════════════════════
     Flow visualization (SVG connector lines)
     ════════════════════════════════════════════ */
  .flow-section { margin-bottom: 48px; }
  .flow-svg { width: 100%; height: auto; display: block; }

  /* ════════════════════════════════════════════
     Category Groups (大类)
     ════════════════════════════════════════════ */
  .cat-group { margin-bottom: 36px; }
  .cat-group-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px; padding: 10px 0;
    border-bottom: 2px solid;
  }
  .cat-group-header .cat-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-group-header .cat-label {
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .cat-group-header .cat-count {
    font-size: 12px; opacity: .7; margin-left: auto;
  }
  .cat-art .cat-group-header { border-color: rgba(192,132,252,.35); }
  .cat-art .cat-dot { background: #c084fc; }
  .cat-art .cat-label { color: #c084fc; }
  .cat-emotion .cat-group-header { border-color: rgba(251,191,36,.35); }
  .cat-emotion .cat-dot { background: #fbbf24; }
  .cat-emotion .cat-label { color: #fbbf24; }
  .cat-nature .cat-group-header { border-color: rgba(96,165,250,.35); }
  .cat-nature .cat-dot { background: #60a5fa; }
  .cat-nature .cat-label { color: #60a5fa; }
  .cat-theme .cat-group-header { border-color: rgba(74,222,128,.35); }
  .cat-theme .cat-dot { background: #4ade80; }
  .cat-theme .cat-label { color: #4ade80; }

  /* Grouped rel-map rows inside a cat-group */
  .cat-group .rel-row { padding-left: 12px; border-left: 2px solid transparent; }
  .cat-art .rel-row { border-left-color: rgba(192,132,252,.2); }
  .cat-emotion .rel-row { border-left-color: rgba(251,191,36,.2); }
  .cat-nature .rel-row { border-left-color: rgba(96,165,250,.2); }
  .cat-theme .rel-row { border-left-color: rgba(74,222,128,.2); }

  /* ════════════════════════════════════════════
     Series Cards with Artwork Previews
     ════════════════════════════════════════════ */
  .series-grid {
    display: flex; flex-direction: column; gap: 0;
  }
  .series-cards-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
  }
  .series-card {
    background: var(--bg-card); border-radius: 12px;
    border: 1px solid var(--border); overflow: hidden;
    transition: border-color .2s;
  }
  .series-card:hover { border-color: var(--accent-dim); }

  .sc-header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 18px 20px 10px;
  }
  .sc-name {
    font-size: 18px; font-weight: 700; color: var(--accent);
    letter-spacing: .5px; cursor: pointer; transition: opacity .15s;
  }
  .sc-name:hover { opacity: .8; text-decoration: underline; }
  .sc-count { font-size: 13px; color: var(--text-secondary); }
  .sc-preview-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
    padding: 0 20px 12px;
  }
  .sc-preview-item {
    aspect-ratio: 4/3; overflow: hidden; border-radius: 6px;
    background: #111; cursor: pointer;
    position: relative; transition: transform .15s;
  }
  .sc-preview-item:hover { transform: scale(1.03); z-index: 1; }
  .sc-preview-item img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .sc-preview-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: #444; font-size: 12px; background: #111;
  }
  .sc-preview-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,.85));
    padding: 6px 8px; font-size: 11px; color: #ddd;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sc-tags {
    padding: 6px 20px 16px;
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .sc-tag {
    font-size: 11px; color: #e0c87a;
    background: rgba(224,200,122,.1); border: 1px solid rgba(224,200,122,.22);
    border-radius: 10px; padding: 2px 8px;
    cursor: pointer; transition: all .15s;
  }
  .sc-tag:hover {
    background: rgba(224,200,122,.25); border-color: rgba(224,200,122,.5);
  }
  .sc-tag-more { opacity: .5; cursor: default; }
  .sc-action {
    padding: 0 20px 16px;
  }
  .sc-action a {
    display: inline-block; color: var(--accent); font-size: 13px;
    text-decoration: none; border-bottom: 1px dashed var(--accent-dim);
    cursor: pointer; transition: color .2s;
  }
  .sc-action a:hover { color: #d4b87a; }

  /* ════════════════════════════════════════════
     Full Grid (search / filter mode)
     ════════════════════════════════════════════ */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--bg-card); border-radius: 10px;
    overflow: hidden; cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    border: 1px solid var(--border);
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--accent-dim); }
  .card-img {
    width: 100%; height: 220px; object-fit: cover;
    background: #111; display: block;
  }
  .card-img-wrap .card-img { height: 100%; }
  .card-no-img {
    aspect-ratio: 4/3; background: #111;
    display: flex; align-items: center; justify-content: center;
    color: #444; font-size: 13px;
  }
  .card-body { padding: 12px 14px; }
  .card-series { font-size: 11px; color: var(--accent); margin-bottom: 3px; font-weight: 600; letter-spacing: .5px; }
  .card-group { font-size: 10px; margin-bottom: 2px; letter-spacing: 1px; }
  .card-subtags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 5px; }
  .card-subtag {
    font-size: 10px; color: #e0c87a;
    background: rgba(224,200,122,.12); border: 1px solid rgba(224,200,122,.25);
    border-radius: 3px; padding: 1px 6px;
  }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; line-height: 1.3; }
  .card-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 10px; flex-wrap: wrap; }
  .card-no-img {
    width: 100%; height: 220px; display: flex; align-items: center; justify-content: center;
    background: #111; color: #555; font-size: 13px;
  }
  .no-results {
    text-align: center; padding: 60px 20px; color: var(--text-secondary); grid-column: 1/-1;
  }

  /* Card badges */
  .card-img-wrap {
    position: relative; overflow: hidden; aspect-ratio: 4/3; background: #111;
  }
  .card-img-wrap .badge-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; gap: 4px; padding: 4px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,.6));
    opacity: 0; transition: opacity .2s;
  }
  .card:hover .badge-bar, 
  .card:focus-within .badge-bar { opacity: 1; }
  .badge-icon {
    font-size: 11px; padding: 2px 7px; border-radius: 4px;
    display: flex; align-items: center; gap: 3px; white-space: nowrap;
  }
  .badge-award { background: rgba(251,191,36,.15); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
  .badge-qr   { background: rgba(96,165,250,.15); color: #60a5fa; border: 1px solid rgba(96,165,250,.3); }
  .badge-desc { background: rgba(201,169,110,.12); color: var(--accent); border: 1px solid rgba(201,169,110,.25); }

  /* ════════════════════════════════════════════
     Lightbox
     ════════════════════════════════════════════ */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.92); align-items: center; justify-content: center; padding: 20px;
  }
  .lightbox.active { display: flex; }
  .lightbox-panel {
    display: flex; gap: 0; max-width: 1100px; max-height: 88vh;
    width: 100%; background: var(--bg-card); border-radius: 12px;
    overflow: hidden; box-shadow: var(--shadow);
  }
  .lightbox-img {
    flex: 0 0 60%; background: #000;
    display: flex; align-items: center; justify-content: center;
    position: relative; min-height: 300px;
  }
  .lightbox-img img {
    width: 100%; height: 100%; object-fit: contain; max-height: 88vh;
  }
  .lightbox-side {
    flex: 1; min-width: 280px; max-width: 420px;
    overflow-y: auto; padding: 28px 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .lightbox-close {
    position: absolute; top: 16px; right: 20px; z-index: 210;
    color: #fff; font-size: 28px; cursor: pointer;
    background: rgba(0,0,0,.4); border: none; border-radius: 50%;
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    opacity: .8; transition: opacity .2s;
  }
  .lightbox-close:hover { opacity: 1; }

  .lb-section { }
  .lb-section+.lb-section { border-top: 1px solid var(--border); padding-top: 14px; }
  .lb-title { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.35; }
  .lb-meta-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .lb-meta-row .lb-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--accent-dim); color: var(--accent); white-space: nowrap;
  }
  .lb-meta-row .lb-tag.lb-group { background: rgba(192,132,252,.12); color: #c084fc; }
  .lb-desc { font-size: 14px; color: #ccc; line-height: 1.7; }
  .lb-award {
    font-size: 12px; color: var(--accent);
    background: rgba(201,169,110,.08); border-left: 3px solid var(--accent);
    padding: 8px 12px; border-radius: 0 6px 6px 0; line-height: 1.6;
  }
  .lb-award .lb-award-icon { font-size: 15px; margin-right: 6px; }
  .lb-collection {
    font-size: 12px; color: var(--text-secondary); line-height: 1.6;
    padding: 6px 0;
  }
  .lb-collection .lb-coll-label { color: #60a5fa; font-weight: 600; margin-right: 4px; }
  .lb-qr {
    text-align: center; padding: 8px 0;
  }
  .lb-qr img {
    width: 130px; height: 130px; border-radius: 8px; border: 1px solid var(--border);
    object-fit: contain; background: #fff; padding: 4px;
  }
  .lb-qr .lb-qr-label {
    font-size: 11px; color: var(--text-secondary); margin-top: 6px;
  }
  .lb-size { font-size: 12px; color: var(--text-secondary); line-height: 1.5; white-space: pre-line; }

  /* Mobile lightbox: stack */
  @media (max-width: 768px) {
    .lightbox-panel { flex-direction: column; max-height: 95vh; border-radius: 10px; }
    .lightbox-img { flex: none; height: 40vh; min-height: 200px; }
    .lightbox-side { padding: 18px 14px; max-width: none; }
    .lb-title { font-size: 17px; }
  }
  /* Footer */
  footer {
    text-align: center; padding: 32px; color: var(--text-secondary);
    font-size: 12px; border-top: 1px solid var(--border); margin-top: 40px;
  }

  /* ── Mobile ── */
  @media (max-width: 900px) {
    .series-grid { display: flex; flex-direction: column; gap: 0; }
    .series-cards-row { grid-template-columns: 1fr; }
    .rel-series { min-width: 100px; max-width: 120px; }
    .rel-series-name { font-size: 13px; }
  }
  @media (max-width: 640px) {
    nav { padding: 10px 16px; }
    .search-box { margin-left: 0; width: 100%; flex-wrap: wrap; }
    .search-box input { flex: 1; width: auto; }
    .series-grid { gap: 16px; }
    .sc-preview-grid { padding: 0 12px 8px; }
    .sc-header { padding: 14px 12px 8px; }
    .sc-name { font-size: 16px; }
    .sc-tags, .sc-action { padding-left: 12px; padding-right: 12px; }
    .rel-row { flex-direction: column; }
    .rel-series {
      min-width: 0; max-width: none; border-right: none; border-bottom: 1px solid rgba(255,255,255,.06);
      margin-right: 0; text-align: left; padding: 8px 16px;
    }
    .rel-tags { padding: 8px 16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .card-img { height: 160px; }
    .card-body { padding: 10px 12px; }
    .card-title { font-size: 13px; }
  }
</style>
</head>
<body>

<nav>
  <span class="logo">叶纪鸿作品数据库</span>
  <span class="count" id="countLabel"></span>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索作品名/编号..." />
    <select id="seriesFilter"><option value="">全部系列</option></select>
    <button class="btn-all" id="btnOverview">系列总览</button>
  </div>
</nav>

<div class="container">

  <!-- ═══════════════ SERIES OVERVIEW ═══════════════ -->
  <div id="overviewSection">
    <!-- Featured Award-Winning Works -->
    <div class="featured-section" id="featuredSection">
      <div class="featured-title">
        <span class="feat-emoji">🏆</span> 获奖精选
        <span class="feat-sub">国际奖项 · 雅昌拍卖 · 机构收藏 · 个展群展</span>
      </div>
      <div class="featured-carousel" id="featuredCarousel"></div>
    </div>

    <!-- Subtags Relationship Map -->
    <div class="rel-map">
      <div class="section-title">系列与子标签关系 <span class="sub">共 8 个独立系列，子标签可多选</span></div>
      <div id="relMapContainer"></div>
    </div>

    <!-- Series Cards with Previews -->
    <div class="section-title">系列作品预览 <span class="sub">每个系列展示部分代表作</span></div>
    <div class="series-grid" id="seriesGrid"></div>
  </div>

  <!-- ═══════════════ FULL GRID (hidden initially) ═══════════════ -->
  <div id="fullGridSection" style="display:none;">
    <div class="grid" id="grid"></div>
  </div>

</div>

<footer>Gallery generated from Excel database · 图片版权归原作者所有</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <div class="lightbox-panel">
    <div class="lightbox-img">
      <img id="lightboxImg" src="" alt="" />
    </div>
    <div class="lightbox-side" id="lightboxSide"></div>
  </div>
</div>

<script>
// ═══════════════ Embedded Data ═══════════════
const SERIES_DATA = {

// ═══════════════ Artworks data (loaded async) ═══════════════
let artworks = [];
let currentFiltered = [];

async function loadArtworks() {
  try {
    const resp = await fetch('data/artworks.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    artworks = await resp.json();
  } catch (e) {
    console.error('[gallery] 作品数据加载失败:', e);
    const g = document.getElementById('grid');
    if (g) g.innerHTML = '<div class="no-results">作品数据加载失败，请刷新页面重试</div>';
    return;
  }
  currentFiltered = artworks;
  updateCount(artworks.length);
  populateFilter();
}

function updateCount(n) {
  document.getElementById('countLabel').textContent = `共 ${n} 件作品`;
}

function populateFilter() {
  const sel = document.getElementById('seriesFilter');
  // Add category groups as optgroups
  CATEGORY_GROUPS.forEach(g => {
    const visibleSeries = g.series.filter(s => SERIES_DATA[s] && SERIES_DATA[s].count >= 2);
    if (visibleSeries.length === 0) return;
    const groupEl = document.createElement('optgroup');
    groupEl.label = g.name;
    visibleSeries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = `${c} (${SERIES_DATA[c].count})`;
      groupEl.appendChild(opt);
    });
    sel.appendChild(groupEl);
  });
}

// ═══════════════ Build Featured Awards Carousel ═══════════════
function buildFeatured() {
  if (!FEATURED_ARTWORKS || FEATURED_ARTWORKS.length === 0) return;
  const carousel = document.getElementById('featuredCarousel');
  let html = '';
  FEATURED_ARTWORKS.forEach(a => {
    const imgHTML = a.mainImage
      ? `<img class="feat-card-img" src="images/${a.mainImage}" alt="${a.title}" loading="lazy" onerror="this.parentElement.querySelector('.feat-card-img').style.display='none'" />`
      : '';
    const awardBadges = [];
    const h = a.highlight || '';
    if (h.includes('国际') || h.includes('美国') || h.includes('纽约') || h.includes('CAAA')) awardBadges.push('国际奖项');
    if (h.includes('雅昌') || h.includes('拍卖')) awardBadges.push('雅昌拍卖');
    if (h.includes('收藏') || h.includes('收藏')) awardBadges.push('机构收藏');
    if (h.includes('个展')) awardBadges.push('个展');
    if (!awardBadges.length) awardBadges.push('获奖/参展');
    const badge = awardBadges[0];
    html += `
      <div class="feat-card" onclick="openLightboxBySerial(${a.serial})">
        ${imgHTML}
        <div class="feat-card-body">
          <span class="feat-card-award">🏆 ${badge}</span>
          <div class="feat-card-title">${a.title || ('作品 #' + a.serial)}</div>
          <div class="feat-card-series">${a.category}</div>
          <div class="feat-card-highlight">${h}</div>
        </div>
      </div>`;
  });
  carousel.innerHTML = html;
}

// ═══════════════ Build Relationship Map ═══════════════
function buildRelMap() {
  const container = document.getElementById('relMapContainer');
  let html = '';
  CATEGORY_GROUPS.forEach(g => {
    const totalCount = g.series.reduce((sum, s) => sum + (SERIES_DATA[s] ? SERIES_DATA[s].count : 0), 0);
    html += `<div class="cat-group ${g.class}">
      <div class="cat-group-header">
        <span class="cat-dot"></span>
        <span class="cat-label">${g.name}</span>
        <span class="cat-count">${totalCount} 件</span>
      </div>`;
    g.series.forEach(name => {
      const info = SERIES_DATA[name];
      if (!info || info.count < 2) return;
      const tags = Object.entries(info.subtags).sort((a,b) => b[1]-a[1]);
      const tagHTML = tags.map(([t,n]) =>
        `<span class="rel-tag" onclick="filterBySubtag('${t.replace(/'/g,"\\'")}');event.stopPropagation();">${t}<span class="tag-count">${n}</span></span>`
      ).join('');
      html += `
        <div class="rel-row">
          <div class="rel-series" onclick="scrollToSeriesCard('${name.replace(/'/g,"\\'")}')">
            <div class="rel-series-name">${name}</div>
            <div class="rel-series-count">${info.count} 件作品</div>
          </div>
          <div class="rel-tags">${tagHTML || '<span style="color:#555;font-size:12px;">暂无子标签</span>'}</div>
        </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

// ═══════════════ Build Series Preview Cards ═══════════════
function buildSeriesCards() {
  const grid = document.getElementById('seriesGrid');
  let html = '';
  // The series-grid container will hold cat-group divs
  // We need to wrap the whole thing differently
  html = buildSeriesCardsHTML();
  grid.innerHTML = html;
}

function buildSeriesCardsHTML() {
  let html = '';
  CATEGORY_GROUPS.forEach(g => {
    const visibleSeries = g.series.filter(s => SERIES_DATA[s] && SERIES_DATA[s].count >= 2);
    if (visibleSeries.length === 0) return;
    const totalCount = visibleSeries.reduce((sum, s) => sum + SERIES_DATA[s].count, 0);
    html += `<div class="cat-group ${g.class}">
      <div class="cat-group-header">
        <span class="cat-dot"></span>
        <span class="cat-label">${g.name}</span>
        <span class="cat-count">${totalCount} 件</span>
      </div>
      <div class="series-cards-row">`;
    visibleSeries.forEach(name => {
      const info = SERIES_DATA[name];
      const previews = info.previews;
      const previewHTML = previews.map((p, i) => {
        const label = p.title || (p.leoNo ? `No.${p.leoNo}` : `#${p.serial}`);
        if (p.mainImage) {
          return `<div class="sc-preview-item" onclick="event.stopPropagation();openLightboxBySerial(${p.serial})">
            <img src="images/${p.mainImage}" alt="${label}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=sc-preview-placeholder>暂无图片</div>'" />
            <div class="sc-preview-label">${label}</div>
          </div>`;
        } else {
          return `<div class="sc-preview-item"><div class="sc-preview-placeholder">暂无图片</div></div>`;
        }
      }).join('');

      const tags = Object.keys(info.subtags).sort((a,b) => info.subtags[b]-info.subtags[a]);
      const tagHTML = tags.slice(0, 8).map(t => `<span class="sc-tag" onclick="event.stopPropagation();filterBySubtag('${t.replace(/'/g,"\\'")}')">${t}</span>`).join('');
      const more = tags.length > 8 ? `<span class="sc-tag sc-tag-more">+${tags.length-8}</span>` : '';

      const safeId = name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_');
      html += `
        <div class="series-card" id="sc-${safeId}">
          <div class="sc-header">
            <span class="sc-name" onclick="filterBySeries('${name.replace(/'/g,"\\'")}')">${name}</span>
            <span class="sc-count">${info.count} 件</span>
          </div>
          <div class="sc-preview-grid">${previewHTML}</div>
          <div class="sc-tags">${tagHTML}${more}</div>
          <div class="sc-action">
            <a onclick="filterBySeries('${name.replace(/'/g,"\\'")}')">查看全部 ${info.count} 件 →</a>
          </div>
        </div>`;
    });
    html += '</div></div>';
  });
  return html;
}

// ═══════════════ View switching ═══════════════
function showOverview() {
  document.getElementById('overviewSection').style.display = 'block';
  document.getElementById('fullGridSection').style.display = 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('seriesFilter').value = '';
  updateCount(TOTAL_ARTWORKS);
}

function filterBySeries(seriesName) {
  document.getElementById('overviewSection').style.display = 'none';
  document.getElementById('fullGridSection').style.display = 'block';
  document.getElementById('seriesFilter').value = seriesName;
  document.getElementById('searchInput').value = '';
  applyFilter();
  // Scroll to grid
  document.getElementById('fullGridSection').scrollIntoView({ behavior: 'smooth' });
}

function filterBySubtag(subtag) {
  document.getElementById('overviewSection').style.display = 'none';
  document.getElementById('fullGridSection').style.display = 'block';
  document.getElementById('seriesFilter').value = '';
  document.getElementById('searchInput').value = subtag;
  applyFilter();
  document.getElementById('fullGridSection').scrollIntoView({ behavior: 'smooth' });
}

function scrollToSeriesCard(seriesName) {
  const safeId = seriesName.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_');
  const card = document.getElementById('sc-' + safeId);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Brief highlight
    card.style.boxShadow = '0 0 20px rgba(201,169,110,.4)';
    setTimeout(() => { card.style.boxShadow = ''; }, 1500);
  }
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const s = document.getElementById('seriesFilter').value;

  let filtered = artworks.filter(a => {
    if (s && a.category !== s) return false;
    if (q) {
      const haystack = [
        a.title, a.leoNo, a.category, (a.subtags||[]).join(' '),
        a.seriesRaw, a.description, a.sizeInfo, a.extraInfo, String(a.serial||'')
      ].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  currentFiltered = filtered;
  updateCount(filtered.length);
  renderGrid(filtered);

  // If no filter active, go back to overview
  if (!s && !q) {
    showOverview();
  }
}

function renderGrid(filtered) {
  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">没有找到匹配的作品</div>';
    return;
  }
  grid.innerHTML = filtered.map((a, i) => {
    // Badge indicators
    const badges = [];
    if (a.collectionInfo && a.collectionInfo.trim()) badges.push(`<span class="badge-icon badge-award">🏆 获奖/展览</span>`);
    if (a.qrImage && a.qrImage.trim()) badges.push(`<span class="badge-icon badge-qr">📱 二维码</span>`);
    if (a.description && a.description.trim()) badges.push(`<span class="badge-icon badge-desc">📝 详情</span>`);
    const badgesHTML = badges.length ? `<div class="badge-bar">${badges.join('')}</div>` : '';

    const imgHTML = a.mainImage
      ? `<div class="card-img-wrap"><img class="card-img" src="images/${a.mainImage}" alt="${a.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-no-img>暂无图片</div>'" />${badgesHTML}</div>`
      : '<div class="card-no-img">暂无图片</div>';

    const title = a.title || a.leoNo || `作品 #${a.serial}`;
    const meta = [];
    if (a.leoNo) meta.push(`<span>No.${a.leoNo}</span>`);
    if (a.year) meta.push(`<span>${a.year}</span>`);
    if (a.sizeInfo) {
      const firstLine = a.sizeInfo.split('\n')[0];
      if (firstLine) meta.push(`<span>${firstLine}</span>`);
    }

    let seriesHTML = '';
    if (a.category && a.category !== '未分类') {
      const group = SERIES_TO_GROUP[a.category];
      if (group) {
        seriesHTML += `<div class="card-group" style="color:${group.color}">${group.name}</div>`;
      }
      seriesHTML += `<div class="card-series">${a.category}</div>`;
      if (a.subtags && a.subtags.length > 0) {
        const chips = a.subtags.slice(0, 4).map(t => `<span class="card-subtag">${t}</span>`).join('');
        seriesHTML += `<div class="card-subtags">${chips}</div>`;
      }
    }

    return `
      <div class="card" onclick="openLightboxBySerial(${a.serial})" data-serial="${a.serial}">
        ${imgHTML}
        <div class="card-body">
          ${seriesHTML}
          <div class="card-title">${title}</div>
          <div class="card-meta">${meta.join('')}</div>
        </div>
      </div>`;
  }).join('');
}

// ═══════════════ Lightbox ═══════════════
window.openLightboxBySerial = function(serial) {
  let a = artworks.find(x => x.serial === serial);
  if (!a) {
    // 兜底：数据尚未就绪时从 SERIES_DATA 预览图匹配，避免点击无反应
    for (const k in SERIES_DATA) {
      const p = (SERIES_DATA[k].previews || []).find(pp => pp.serial === serial);
      if (p) { a = p; break; }
    }
  }
  if (!a) { console.warn('[gallery] 未找到作品 serial=', serial); return; }
  const lb = document.getElementById('lightbox');

  // Image
  document.getElementById('lightboxImg').src = a.mainImage ? `images/${a.mainImage}` : '';

  // Side panel
  let sideHTML = '';

  // Title & category
  sideHTML += `<div class="lb-section"><div class="lb-title">${a.title || '无标题'}</div>`;
  if (a.category || a.year || a.leoNo) {
    sideHTML += `<div class="lb-meta-row" style="margin-top:8px;">`;
    if (a.year) sideHTML += `<span class="lb-tag">${a.year}</span>`;
    if (a.leoNo) sideHTML += `<span class="lb-tag">No.${a.leoNo}</span>`;
    if (a.category) {
      const group = SERIES_TO_GROUP[a.category];
      if (group) sideHTML += `<span class="lb-tag lb-group">${group.name}</span>`;
      sideHTML += `<span class="lb-tag">${a.category}</span>`;
    }
    if (a.subtags && a.subtags.length) {
      a.subtags.forEach(t => { sideHTML += `<span class="lb-tag">${t}</span>`; });
    }
    sideHTML += `</div>`;
  }
  if (a.sizeInfo) {
    sideHTML += `<div class="lb-size" style="margin-top:8px;">${a.sizeInfo}</div>`;
  }
  sideHTML += `</div>`;

  // Description
  if (a.description && a.description.trim()) {
    const desc = a.description.length > 300
      ? a.description.substring(0, 300) + '...' : a.description;
    sideHTML += `<div class="lb-section"><div class="lb-desc">${desc}</div></div>`;
  }

  // Collection / Award
  if (a.collectionInfo && a.collectionInfo.trim()) {
    sideHTML += `<div class="lb-section"><div class="lb-award"><span class="lb-award-icon">🏆</span>${a.collectionInfo}</div></div>`;
  }
  if (a.collectionRecord && a.collectionRecord.trim()) {
    sideHTML += `<div class="lb-section"><div class="lb-collection"><span class="lb-coll-label">📍 收藏记录</span>${a.collectionRecord}</div></div>`;
  }

  // QR Code
  if (a.qrImage && a.qrImage.trim()) {
    const qrDesc = a.extraInfo && a.extraInfo.trim()
      ? a.extraInfo.split('\n')[0].substring(0, 40)
      : (a.collectionInfo && a.collectionInfo.includes('美篇') ? '美篇详情' : '扫码查看详情');
    sideHTML += `<div class="lb-section"><div class="lb-qr">
      <img src="images/${a.qrImage}" alt="二维码" loading="lazy" onerror="this.parentElement.style.display='none'" />
      <div class="lb-qr-label">${qrDesc}</div>
    </div></div>`;
  }

  document.getElementById('lightboxSide').innerHTML = sideHTML;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
};

window.openLightbox = function(idx) {
  const a = currentFiltered[idx];
  if (!a) return;
  openLightboxBySerial(a.serial);
};

window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
};

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});

// ═══════════════ Event bindings ═══════════════
document.getElementById('searchInput').addEventListener('input', function() {
  if (this.value.trim()) {
    document.getElementById('overviewSection').style.display = 'none';
    document.getElementById('fullGridSection').style.display = 'block';
  }
  applyFilter();
});

document.getElementById('seriesFilter').addEventListener('change', function() {
  if (this.value) {
    document.getElementById('overviewSection').style.display = 'none';
    document.getElementById('fullGridSection').style.display = 'block';
  }
  applyFilter();
});

document.getElementById('btnOverview').addEventListener('click', showOverview);

// ═══════════════ Init ═══════════════
(async function init() {
  buildFeatured();
  buildRelMap();
  buildSeriesCards();
  await loadArtworks();
  // 扫码直达单作品: ?art=<serial>
  const params = new URLSearchParams(window.location.search);
  const artParam = params.get('art');
  if (artParam) {
    openLightboxBySerial(Number(artParam));
  }
  // If URL hash matches a series, filter directly
  const hash = window.location.hash.replace('#', '');
  if (hash && SERIES_DATA[hash]) {
    filterBySeries(hash);
  }
})();
</script>
