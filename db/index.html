  document.getElementById('detail').style.display = 'none';
  grid.innerHTML = '';
  DATA.filter(d => !q || norm(d.name).includes(q) || norm(d.code).includes(q))
    .forEach(d => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = '<div class="swatch" style="background:'+d.color+'">'+esc(d.code)+'</div>'+
        '<div class="body"><div class="nm">'+esc(d.name||'(未命名)')+'</div>'+
        '<div class="meta">'+esc(d.author||'')+' · '+(d.year||'')+' · '+(d.material||'')+'</div>'+
        '<div class="code">'+esc(d.code)+'</div></div>';
      el.onclick = () => open(+d.artid);
      grid.appendChild(el);
    });
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function open(artid){
  const item = DATA.find(d => String(d.artid) === String(artid));
  if (!item) { history.replaceState(null, '', '?'); doFilter(); return; }
  const grid = document.getElementById('grid'); grid.style.display = 'none';
  const det = document.getElementById('detail');
  det.style.display = 'block';
  det.innerHTML = '<span class="back" onclick="history.replaceState(null,\'\',\'?\');doFilter()">← 返回全部作品</span>'+
    '<div class="hero" style="background:'+item.color+'"><div><div style="font-size:13px;opacity:.85">'+esc(item.code)+'</div>'+
    '<div style="font-size:13px;opacity:.85">'+esc(item.author||'')+' · '+(item.year||'')+'</div></div></div>'+
    '<h2>'+esc(item.name||'(未命名)')+'</h2>'+
    (item.material?'<div class="row"><b>材质</b>'+esc(item.material)+'</div>':'')+
    (item.dim?'<div class="row"><b>尺寸</b>'+esc(item.dim)+'</div>':'')+
    (item.size?'<div class="row"><b>编号</b>'+esc(item.code)+'</div>':'')+
    (item.note?'<div class="note">'+esc(item.note)+'</div>':'')+
    '<div class="code">作品编号 '+esc(item.code)+' · 数字身份由 Artful 提供</div>';
  window.scrollTo(0, 0);
}
// 单作品精准路由 ?art=数字
(function(){
  const art = new URLSearchParams(location.search).get('art');
  if (art) { open(art); }
  else { doFilter(); }
})();
</script>
