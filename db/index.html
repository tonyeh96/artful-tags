tion": "绩溪古村的老桥\n这是古村里最受欢迎的写生景色，老桥下，小溪旁，流水击拍石头的悦耳声，即使盛夏时候，也清凉宜人。\n私人收藏（乔治）", "extraInfo": "", "collectionInfo": "私人收藏", "collectionRecord": "广州私人收藏 乔总", "mainImage": "image92.jpg", "qrImage": "", "otherImages": [], "category": "山河岁月", "subtags": ["绩溪"], "seriesRaw": "山河岁月，绩溪写生"}, {"serial": 48, "leoNo": "202107.4", "flag": "", "year": "2020", "series": "山河岁月，绩溪写生", "title": "平顶山初晨", "sizeInfo": "30*40cm\n丙烯布面\n202107.4", "description": "平顶山初晨\n下雨时候， 我们选择了在民宿的楼顶上眺望平顶山。晨雾时聚时散，于是山顶的小亭也是遮遮掩掩的。山下的房屋也是我的风景，写意的风格在逐步融入画面里\n\n。", "extraInfo": "", "collectionInfo": "私人收藏", "collectionRecord": "", "mainImage": "image96.jpg", "qrImage": "", "otherImages": [], "category": "山河岁月", "subtags": ["绩溪"], "seriesRaw": "山河岁月，绩溪写生"}, {"serial": 47, "leoNo": "202107.3", "flag": "", "year": "2020", "series": "山河岁月，绩溪写生", "title": "梅干岭的梯田", "sizeInfo": "30*40cm\n布面丙烯\n202107.3", "description": "梅干岭的梯田\n那天依旧5点多起来， 我们沿溪而上，到4公里外的梅干岭写生。天气多云，透着清凉，最适合写生。", "extraInfo": "", "collectionInfo": "私人收藏", "collectionRecord": "", "mainImage": "image95.jpg", "qrImage": "", "otherImages": [], "category": "山河岁月", "subtags": ["绩溪"], "seriesRaw": "山河岁月，绩溪写生"}, {"serial": 46, "leoNo": "202107.2", "flag": "", "year": "2020", "series": "肖像人体系列，临摹习作", "title": "吻（临摹）", "sizeInfo": "40*40cm \n丙烯布面\n202107.2", "description": "克里姆特著名的“吻”， 向大师致敬的方式之一，就是临摹他的作品。\nGUSTAV KLIMT 的 kiss\n临摹奥地利大师克里姆特在1907年的作品。", "extraInfo": "", "collectionInfo": "艺活画廊藏品习作", "collectionRecord": "", "mainImage": "image76.jpg", "qrImage": "", "otherImages": ["image3.jpg"], "category": "肖像人体", "subtags": ["临摹"], "seriesRaw": "肖像人体系列，临摹习作"}, {"serial": 45, "leoNo": "202107.1", "flag": "", "year": "2020", "series": "肖像人体系列，临摹习作", "title": "习作202107B", "sizeInfo": "60*40 ㎝\n 丙烯布面\nye20210701", "description": "习作202107B\n\nGUSTAV KLIMT 的 “一位女士的肖像”\n临摹奥地利大师克里姆特在1917年的作品。作为对大师的致敬。\n2021年7月", "extraInfo": "", "collectionInfo": "艺活画廊藏品习作", "collectionRecord": "", "mainImage": "image94.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "肖像人体", "subtags": ["临摹"], "seriesRaw": "肖像人体系列，临摹习作"}, {"serial": 44, "leoNo": "202106.4", "flag": "", "year": "2020", "series": "珠江风华--珠江畔的广州", "title": "珠江的黄昏", "sizeInfo": "40*50㎝\n 丙烯布面\nye20210604", "description": "这是位于猎德大桥南西侧的广州夜景\n第一次放开手画广州的天际线。\n多少个日子，我总是在夕阳西沉，万家灯火阑珊，品味她的美好。用手机相机拍了千万遍，总想有一天自己也可以将它画下来。\n既然喜欢一个城市，应该要用画笔把它记录下来。", "extraInfo": "", "collectionInfo": "艺活画廊藏品", "collectionRecord": "", "mainImage": "image27.jpg", "qrImage": "image29.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州"], "seriesRaw": "珠江风华--珠江畔的广州"}, {"serial": 43, "leoNo": "202106.3", "flag": "", "year": "2020", "series": "肖像人体系列，临摹习作", "title": "邻家女孩（临摹）", "sizeInfo": "40*30㎝ 丙烯\n\nYe20210603", "description": "邻家女子 （临摹）\n取材自国内写实派画家李贵军的人物画，已经走出美院列宾写实派的压抑感， 充满了现代女性风格和色彩。向大师致敬的方式之一，就是临摹他的作品。（节录部分，并重新取了名字）", "extraInfo": "", "collectionInfo": "艺活画廊藏品习作", "collectionRecord": "", "mainImage": "image78.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "肖像人体", "subtags": ["临摹"], "seriesRaw": "肖像人体系列，临摹习作"}, {"serial": 42, "leoNo": "202106.2", "flag": "", "year": "2020", "series": "肖像人体系列，临摹习作", "title": "美丽与哀愁（临摹Konstantin Razumov）", "sizeInfo": "40*30㎝ \n丙烯布面\nye20210602", "description": "美丽与哀愁\n 节录临摹当代俄罗斯画家Konstantin Razumov的作品，画中女子的神态是我想掌握的", "extraInfo": "", "collectionInfo": "艺活画廊藏品习作", "collectionRecord": "", "mainImage": "image74.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "肖像人体", "subtags": ["临摹"], "seriesRaw": "肖像人体系列，临摹习作"}, {"serial": 41, "leoNo": "202106.1", "flag": "", "year": "2020", "series": "肖像人体系列，临摹习作", "title": "奥斯曼帝国的宫女", "sizeInfo": "（临摹Konstantin Razumov）\n60*40cm\n丙烯布面", "description": "端午节前后。疫情反复，最适合宅在家里画画。\n在14世纪的时候，灭亡了东罗马帝国，继续在迷人的伊斯坦布尔建都。一个伊斯兰帝国可以延续700年，把地中海当作内海。，雄踞古丝路的所有财富。\n几年前两度游历了伊斯坦布尔，今日土耳其的最大城市。对这个经历2000年历史的城市，那时拥有2000年历史的索菲亚大教堂，也从回教堂恢复了部分基督教的原貌，并被改为博物馆。", "extraInfo": "", "collectionInfo": "艺活画廊藏品习作", "collectionRecord": "", "mainImage": "image73.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "肖像人体", "subtags": ["临摹"], "seriesRaw": "肖像人体系列，临摹习作"}, {"serial": 40, "leoNo": "202105.2", "flag": "", "year": "2020", "series": "肖像人体系列，临摹习作", "title": "DANAE 女神", "sizeInfo": "临摹作品\n40*40cm\n布面丙烯\n202105.2", "description": "DANAE  女神\n古希腊神话的女神。\n克里姆特1907年 著名的作品，原画77*83cm ，私人收藏。\n向大师致敬的方式之一，就是临摹他的作品。张大千之癖也。", "extraInfo": "", "collectionInfo": "艺活画廊藏品习作", "collectionRecord": "", "mainImage": "image75.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "肖像人体", "subtags": ["临摹"], "seriesRaw": "肖像人体系列，临摹习作"}, {"serial": 39, "leoNo": "202105.1", "flag": "", "year": "2020", "series": "肖像人体系列", "title": "盐洲渡仙记之鱼妖", "sizeInfo": "60*40cm \n丙烯布面\nye202105.1", "description": "盐洲渡仙记之鱼妖\n2021年的51假期，多云时晴偶阵雨。迷人极了。\n从拍了100多张照片里构思绘画出想要的邻家女孩模样，精致的复古服饰，仿佛那美好的唐宋时光，依旧穿越到今时。\n悠闲时光，还是在自家阳台上，俯瞰天鹅湖，风吹帘动，波光潋滟。在躺椅上打个盹儿，继续梦游我的“盐洲岛渡仙”，不亦快哉。", "extraInfo": "", "collectionInfo": "2024年多次群展获奖，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image80.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "肖像人体", "subtags": [], "seriesRaw": "肖像人体系列"}, {"serial": 38, "leoNo": "202103.4", "flag": "", "year": "2020", "series": "珠江风华，广州麓湖", "title": "麓湖春晓", "sizeInfo": "50*40㎝ \n丙烯布面\nye202103.5", "description": "麓湖的春，可以有全广州最柔情的宫粉紫荆花围绕，适合环湖漫步，在惊蛰时候，听听花开和绿芽，是老广的雅事。\n2021年三月，原先想画个人儿在湖边的 ，\n\n2021年九月，将人物去掉 后，多加了几颗石头，于是这幅画被朋友收藏了。", "extraInfo": "", "collectionInfo": "私人收藏", "collectionRecord": "广州私人收藏", "mainImage": "image51.jpg", "qrImage": "image52.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州", "麓湖"], "seriesRaw": "珠江风华，广州麓湖"}, {"serial": 37, "leoNo": "202103.3", "flag": "", "year": "2020", "series": "珠江风华，新会花卉", "title": "盛开的紫花风铃木", "sizeInfo": "40*50㎝ 丙烯，\n2021年三月\nye202103.4", "description": "紫花风铃木\n二月初时候，在广州，以为只有梅花正盛开。其实还有花儿在绽放。\n离广州不到100公里处，我突然发现，自己仿佛置身在一个紫粉色的童话世界里。甚至会怀疑这花儿是否是真的？", "extraInfo": "", "collectionInfo": "南沙展厅藏品", "collectionRecord": "", "mainImage": "image43.jpg", "qrImage": "image44.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["新会"], "seriesRaw": "珠江风华，新会花卉"}, {"serial": 35, "leoNo": "202103.2", "flag": "", "year": "2020", "series": "珠江风华，广州麓湖", "title": "麓湖三月", "sizeInfo": "40*50㎝ 丙烯 2021年三月", "description": "麓湖三月\n虽说，烟波三月，尽是春愁。\n麓湖的春，可以有全广州最柔情的宫粉紫荆花围绕，适合环湖漫步，在惊蛰时候，听听花开和绿芽，是老广的雅事。", "extraInfo": "", "collectionInfo": "台北私人收藏", "collectionRecord": "台北叶董收藏", "mainImage": "image50.jpg", "qrImage": "image52.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["广州", "麓湖"], "seriesRaw": "珠江风华，广州麓湖"}, {"serial": 36, "leoNo": "202103.2", "flag": "", "year": "2020", "series": "肖像人体系列", "title": "春凝", "sizeInfo": "40*60㎝ 丙烯\n\n2021年三月15日", "description": "春凝\n三月的南沙海滨公园，芳草萋萋，绿意春浓。\n\n几个朋友悠哉的漫步在湖畔。她特地换上一席宝蓝色长裙，宽大的草帽，是简约的法式风情。", "extraInfo": "", "collectionInfo": "南沙展厅藏品", "collectionRecord": "", "mainImage": "image79.jpg", "qrImage": "", "otherImages": ["image3.jpg"], "category": "肖像人体", "subtags": [], "seriesRaw": "肖像人体系列"}, {"serial": 34, "leoNo": "202103.1", "flag": "", "year": "2020", "series": "山河岁月，漠河金秋", "title": "北极村的元宝山麓", "sizeInfo": "40*50㎝ \n油画混合丙烯\n完成于2021年", "description": "北极村的元宝山是当地的最高峰，约300多公尺。 那天下午我们刻意去攀登， 为了先看看河对岸的俄罗斯小村落。没想到山脚的小溪和木桥在午后的阳光辉映下会如此的美丽。我留恋的不断用相机拍照， 我知道我要画一幅这瑰丽的时光，记住中国的最北疆。", "extraInfo": "", "collectionInfo": "广州私人收藏", "collectionRecord": "2023台北叶桐收藏", "mainImage": "image12.jpg", "qrImage": "image18.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠河"], "seriesRaw": "山河岁月，漠河金秋"}, {"serial": 33, "leoNo": "202102.1", "flag": "", "year": "2020", "series": "山河岁月，绍兴", "title": "越过古桥", "sizeInfo": "80*60㎝，\n丙烯布面\nye0200201", "description": "浙江绍兴东湖。\n是古采石场东湖的写生系列。背景是殷桥和半城书店，更远处的白色建筑，是清朝末民初所归规划建造的围墙。\n        清晰记得那天将近中午时候，我走过孙中山祭拜过的陶社，轻轻的跨过老石桥，经过湖畔的“半城书店”，再悠然回首，留下了一系列的写生摄影，带回广州，再慢慢选景构图。", "extraInfo": "", "collectionInfo": "广州私人收藏", "collectionRecord": "广州杨阿姨私人收藏", "mainImage": "image82.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["绍兴"], "seriesRaw": "山河岁月，绍兴"}, {"serial": 32, "leoNo": "202101.2", "flag": "", "year": "2020", "series": "山河岁月，漠河金秋", "title": "漠河的弯弯岁月", "sizeInfo": "40*50㎝， \n丙烯油画综合\n完成于2021年一月。", "description": "从哈尔滨飞越1100多公里到漠河市的迷你小机场后，立刻驱车前往，在眺望塔上，初遇北国2020年的金秋。我不仅拍了好多照片，也写了游记。\n2022年私人收藏", "extraInfo": "", "collectionInfo": "广州私人收藏", "collectionRecord": "广州藏家荀建群收藏", "mainImage": "image14.jpg", "qrImage": "image18.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠河"], "seriesRaw": "山河岁月，漠河金秋"}, {"serial": 31, "leoNo": "202101.1", "flag": "", "year": "2020", "series": "风景/山河岁月，绍兴", "title": "绍兴古采石场的乌篷船", "sizeInfo": "60x80㎝ \n丙烯布面\nYe20210101", "description": "绍兴东湖的乌篷船\n这是第2幅类似的题材，只缘青绿， 色系源自于宋朝的王希孟的中国画。我喜欢用当代油画方式来展现中国特色。\n第一幅画被喜欢的朋友收藏了，因为自己喜欢，这是系列的作品。\n画面上刻意对比了一来一回的两艘船。去的时候载满了客人，回来的时候通常是空船。历经2000多年采石后，留下特有深邃而乌黑的水面，倒印着石山和用脚踩踏的乌篷船兴东湖的乌篷船", "extraInfo": "", "collectionInfo": "原画已被机构收藏。作品入选2023年3月上海名家线上美展", "collectionRecord": "原画已被机构收藏。作品入选2023年4月上海名家线上美展", "mainImage": "image83.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["绍兴"], "seriesRaw": "风景/山河岁月，绍兴"}, {"serial": 30, "leoNo": "202012.3", "flag": "", "year": "2020", "series": "珠江风华，南沙的海滨", "title": "南沙滨海公园", "sizeInfo": "40*30CM， \n丙烯布面\nye202012.3", "description": "南沙滨海公园\n独居的时候，总喜欢下午近傍晚时候，开车到户外散步，蓝天下，南沙滨海公园里的三棵树，还有树下的情侣。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image81.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "珠江风华", "subtags": ["南沙"], "seriesRaw": "珠江风华，南沙的海滨"}, {"serial": 29, "leoNo": "202012.2", "flag": "", "year": "2020", "series": "山河岁月，漠河金秋", "title": "红村的黑龙江", "sizeInfo": "60*80㎝ \n丙烯布面\nye20201202", "description": "北红村的黑龙江\n那天的浓雾一直到上午9点多之后才突然散去。我们开着四驱车，沿着江边的泥石路前进。然后可以清清楚楚的看到对岸俄罗斯的领土。\n江的彼岸是陡峭的小高地，我总是想着当年，这可是我们中国的内河。我无言的走到河边，深情的用镜头拍下了好几张照片。再不舍的缓缓离开。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image11.jpg", "qrImage": "image18.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠河"], "seriesRaw": "山河岁月，漠河金秋"}, {"serial": 28, "leoNo": "202012.1", "flag": "", "year": "2020", "series": "山河岁月，漠河金秋", "title": "大兴安岭的秋日", "sizeInfo": "70*110CM，\n丙烯布面\nye20201201", "description": "大兴安岭的秋日\n2020年的漠北旅游，经过大兴安岭，这山林太美，本身就是一副美好的瑰丽大画，我将车子停下，用长焦镜头的压缩视界记录下来，回广州后将美好山河布满在我的画面上。不亦快哉！", "extraInfo": "", "collectionInfo": "入选2023年3月上海名家线上美展,南沙展厅藏品", "collectionRecord": "", "mainImage": "image10.jpg", "qrImage": "image29.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠河"], "seriesRaw": "山河岁月，漠河金秋"}, {"serial": 27, "leoNo": "202011", "flag": "", "year": "2020", "series": "山河岁月，漠河金秋", "title": "夕阳鎏金的白桦林", "sizeInfo": "70*90cm \n丙烯作品      \nye20201101", "description": "夕阳鎏金的白桦林\n北国林相， 我最喜欢白桦秋色。一年之中只有那么10几天，金黄的树叶，开始短暂的替代了夏日绿意，挂在树梢\n依然记得那个场景，夕阳依旧洒金在林稍，步道渐暗时候。这样的画面，要如何表现？印象派式的写意？笔触在写实和写意之间徘徊良久，重复改了好几次。", "extraInfo": "", "collectionInfo": "南沙展厅藏品", "collectionRecord": "", "mainImage": "image15.jpg", "qrImage": "image18.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠河"], "seriesRaw": "山河岁月，漠河金秋"}, {"serial": 26, "leoNo": "202010.2", "flag": "", "year": "2020", "series": "山河岁月", "title": "绍兴汉采石.鎏金岁月", "sizeInfo": "40*60cm\n\nYE202010.1", "description": "绍兴东湖，是个好地方。\n秦始皇留下系马的秦桥，汉代开始采石，清末才子将崖壁、岩洞、石桥、湖面巧妙结合，经过100多年的润色，成为著名园林\n那天金色桂花香扑而来，绿叶透射着迷人的斑斓，乌篷船缓缓渡过。我在小径和石桥上走走停停，想用镜头捕抓每一个醉爱的美景。", "extraInfo": "", "collectionInfo": "广州私人收藏", "collectionRecord": "广州私人收藏", "mainImage": "image97.jpg", "qrImage": "", "otherImages": [], "category": "山河岁月", "subtags": [], "seriesRaw": "山河岁月"}, {"serial": 25, "leoNo": "202009.1", "flag": "", "year": "2020", "series": "山河岁月，漠河金秋", "title": "金秋白桦林", "sizeInfo": "50*60CM \n丙烯布面\n202009.1", "description": "金秋白桦林 60*50CM 丙烯\n\n从大兴安岭漠北的北极村归来，相机里留存的都是白桦林的美景，在澳热的广州，特别想将我心中的白桦时光画出来了", "extraInfo": "", "collectionInfo": "广州私人收藏", "collectionRecord": "私人收藏", "mainImage": "image16.jpg", "qrImage": "image17.jpg", "otherImages": [], "category": "山河岁月", "subtags": ["漠河"], "seriesRaw": "山河岁月，漠河金秋"}, {"serial": 24, "leoNo": "202008.1", "flag": "", "year": "2020", "series": "花卉系列-荷花", "title": "复瓣荷花", "sizeInfo": "60*50cm \n丙烯作品", "description": "复瓣荷花\n8月初在云南和友人一起拍的复瓣荷花。\n如今，花在人儿远，人在花儿远！日子留痕除了照片，还可以用一幅画表达。不亦快哉", "extraInfo": "", "collectionInfo": "南沙展厅藏品", "collectionRecord": "", "mainImage": "image98.jpg", "qrImage": "", "otherImages": [], "category": "花卉系列", "subtags": ["荷花"], "seriesRaw": "花卉系列-荷花"}, {"serial": 23, "leoNo": "202007.1", "flag": "", "year": "2020", "series": "", "title": "心里的喜悦", "sizeInfo": "30x40cm\n202007.2 \n 油画布面", "description": "喜悦\n 油画布面\n连续临摹了当代不同大师的几张中外少女当做习作。其实是现实中不容易找到合适的模特儿。", "extraInfo": "", "collectionInfo": "南沙展厅藏品", "collectionRecord": "习作", "mainImage": "image100.jpg", "qrImage": "", "otherImages": [], "category": "肖像人体", "subtags": [], "seriesRaw": ""}, {"serial": 22, "leoNo": "202006.1", "flag": "", "year": "2020", "series": "", "title": "茶花女", "sizeInfo": "（临摹Konstantin Razumov）\n40x30\n油画布面，\n2020年", "description": "茶花女（临摹）\n\n初次用画笔补捉穿着艳丽，珠光宝色欧洲精致女子的娇媚，的确有点吃力，来回修改了几次。\n烟花女子，无论古今中外，属于野花，都必须能够在瞬间吸引贵公子和多情才子的眼球。临摹当代60后俄罗斯画家", "extraInfo": "", "collectionInfo": "南沙展厅藏品", "collectionRecord": "习作", "mainImage": "image99.jpg", "qrImage": "", "otherImages": [], "category": "肖像人体", "subtags": [], "seriesRaw": ""}, {"serial": 21, "leoNo": "202005.2", "flag": "", "year": "2020", "series": "荷花系列", "title": "我心若莲", "sizeInfo": "70*110㎝ \n油画布面\n    ye202005.2", "description": "我心若莲\n在五月天，画了第二幅莲花。这样的尺寸，适合挂在度假房的客厅里避避暑气。不知为何，总觉得今年特别潮热。会想起莲花池里的荷叶如憩，迎风翻绿飞舞。然后，一两朵莹洁的荷花，出污而不染。于是，古今多少文人醉爱莲花，只为”我心若莲”。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image84.jpg", "qrImage": "image116.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["荷花"], "seriesRaw": "荷花系列"}, {"serial": 20, "leoNo": "202005.1", "flag": "", "year": "2020", "series": "荷花系列", "title": "202005.1", "sizeInfo": "睡莲\n70X110㎝\n油画布面", "description": "睡莲\n学生时代的台北流行歌曲，文青们的最爱之一。多年后，我特地找出来播放，陪我挥毫。\n你是朵莹洁的睡莲，我是如此如此地羞见你，羞见你醉人的笑黶，羞见你滑落碧波间。\n这幅画，一画好之后，就挂在我的南沙客厅。", "extraInfo": "", "collectionInfo": "2024年多次群展，一次个展。\n2025广州个展，美篇加精推荐", "collectionRecord": "", "mainImage": "image85.jpg", "qrImage": "image116.jpg", "otherImages": [], "category": "花卉系列", "subtags": ["荷花"], "seriesRaw": "荷花系列"}, {"serial": 19, "leoNo": "202004.3", "flag": "", "year": "2020", "series": "", "title": "202004.3德国滴滴湖之恋 50X60cm油画布面", "sizeInfo": "", "description": "德国滴滴湖之恋\n位于德国南部的黑森林边缘的湖，海拔约670公尺。在2013年初遇之后，于2016年又刻意再来一次，为了在滴滴湖面畅快的划船享受。那时，她斜坐在船的另一头，听我轻轻唱着歌。多年以前，在台北南郊的碧潭，少年时代的我们，也曾恣意的泛舟抒怀。记忆可以不断的跳跃时空，可以用一幅画停驻留痕，不亦快哉！", "extraInfo": "", "collectionInfo": "南沙展厅藏品", "collectionRecord": "私人收藏", "mainImage": "image102.jpg", "qrImage": "", "otherImages": [], "category": "肖像人体", "subtags": [], "seriesRaw": ""}, {"serial": 18, "leoNo": "202004.1", "flag": "", "year": "2020", "series": "肖像人体系列-- 临摹优化", "title": "202004.1有位佳人60x50cm", "sizeInfo": "油画布面", "description": "有位佳人\n海鸥是候鸟，总是随季节飞越千万里，带来远方的梦想。伫立在水一方的佳人，总是千年以来，骚人墨客在淡然独处回忆和憧憬时心灵里的籍慰。喜欢这种意境的结合。特地画在我的画面里。\n想到宋代文人诗词，和歌伎美好的乐曲结合，可以流传千年，在当下中国，吸引了如此多的粉丝。\n（模特身体取材参考画家谢楚余）", "extraInfo": "", "collectionInfo": "艺活画廊藏品", "collectionRecord": "", "mainImage": "image211.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "肖像人体", "subtags": ["临摹"], "seriesRaw": "肖像人体系列-- 临摹优化"}, {"serial": 17, "leoNo": "202003.3", "flag": "", "year": "2020", "series": "柔情系列， 超现实系列，\n人与马,", "title": "梦的远方，", "sizeInfo": "60*50㎝\n油画布面\nye20200301", "description": "梦的远方\n匆匆三亚归来，总想再画一幅系列作品。于是有了“梦的远方”每个女子或许都有个寻找白马王子的梦，绮丽而斑斓。\n\n这两幅画的灵感是取材于享誉西班牙的华裔画家梁君武的画风", "extraInfo": "18《梦的远方》\n宝子们别错过！《梦的远方》藏着少女心事💖 借鉴知名华裔画家画风，斑斓色彩勾勒白马王子的梦想，温柔又浪漫。适配卧室、茶室，小众有艺术感，送女生、轻收藏都合适，颜值与质感双在线\nB.各位线上藏家、艺术爱好者，《梦的远方》借鉴华裔画家梁君武画风，以斑斓色彩勾勒白马王子的绮丽梦境。少女的憧憬融入笔触，温柔浪漫且艺术辨识度高，曾为画廊藏品，小众精致，值得珍藏。", "collectionInfo": "艺活画廊藏品", "collectionRecord": "", "mainImage": "image48.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情", "马"], "seriesRaw": "柔情系列， 超现实系列，\n人与马,"}, {"serial": 16, "leoNo": "202003.1", "flag": "", "year": "2020", "series": "柔情系列，", "title": "2020-0326", "sizeInfo": "海鸥飞处\n  60x50㎝ \n油画布面", "description": "海鸥飞处\n”海鸥飞在蓝蓝的海上，飞得越高，看得越远，它在寻找理想吗？”\n年轻时的一首歌，一直将歌词和旋律记忆到现在。只是当年的少年，鬓已星星。那理想还在吗？\n（女子身体取材于谢楚余作品）", "extraInfo": "", "collectionInfo": "艺活画廊藏品", "collectionRecord": "", "mainImage": "image101.jpg", "qrImage": "", "otherImages": ["image3.jpg"], "category": "柔情系列", "subtags": [], "seriesRaw": "柔情系列，"}, {"serial": 15, "leoNo": "201912.3", "flag": "", "year": "2020", "series": "肖像人体系列-", "title": "扬州三江红丝桥记忆", "sizeInfo": "60*50cm\n丙烯布面\n201912.3", "description": "扬州三江运河的红色记忆，20191230\n前年，同样的日子里，突然有机会从上海开车游荡几个一直想去的历史名城。进出扬州时，找到了改建为运动公园的三江古运河，留下的红色大桥背景印象", "extraInfo": "", "collectionInfo": "南沙展厅藏品", "collectionRecord": "私人收藏", "mainImage": "image72.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "肖像人体", "subtags": [], "seriesRaw": "肖像人体系列-"}, {"serial": 14, "leoNo": "201912.2", "flag": "", "year": "2020", "series": "柔情系列，超现实风格", "title": "梦里白马", "sizeInfo": "50*50㎝\nye20191202\n布面 油画", "description": "那年三亚乐东度假区时候，和几位北方来的漂亮多才芳邻聚餐后，在阳台上画的一幅画。也留在乐东龙栖湾的度假屋里。蓝天白云，沙滩涛声，还有愉快的度假心情，忘了年华。\n那时候就想着应该要继续画一下这样的作品。", "extraInfo": "", "collectionInfo": "三亚私人收藏", "collectionRecord": "", "mainImage": "image119.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "超现实主义系列", "subtags": ["柔情"], "seriesRaw": "柔情系列，超现实风格"}, {"serial": 13, "leoNo": "201912.1", "flag": "", "year": "2020", "series": "肖像人体系列", "title": "中国娃娃", "sizeInfo": "20191205\n60X50cm\n油画布面", "description": "中国娃娃\n北京度假时候，得以彻底悠闲的重访自辽金元的历史斑痕，归来时候，觉得需要画一幅画纪念这感觉。于是有了“中国娃娃”，\n京剧脸谱的女子，将我喜欢的几个元素都安排在一起。我还是喜欢营造比较超现实一点的画面。会希望继续探索这类题材", "extraInfo": "", "collectionInfo": "南沙展厅藏品", "collectionRecord": "", "mainImage": "image71.jpg", "qrImage": "image3.jpg", "otherImages": [], "category": "肖像人体", "subtags": [], "seriesRaw": "肖像人体系列"}];</script>

<style>
  :root {
    --bg: #0f0f0f;
    --bg-card: #1a1a1a;
    --bg-hover: #242424;
    --text: #e0e0e0;
    --text-secondary: #999;
    --accent: #c9a96e;
    --accent-dim: #8b7355;
    --accent-glow: rgba(201,169,110,.15);
    --border: #333;
    --shadow: 0 2px 12px rgba(0,0,0,.4);
    /* 大类颜色 */
    --cat-art: #c084fc;      /* 艺术流派 紫 */
    --cat-emotion: #fbbf24;  /* 情感&人物 金 */
    --cat-nature: #60a5fa;   /* 地域&自然 蓝 */
    --cat-theme: #4ade80;    /* 题材 绿 */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    line-height: 1.6;
  }

  /* ── Nav ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,15,.95); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  nav .logo { font-size: 18px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  nav .count { font-size: 13px; color: var(--text-secondary); }
  .search-box { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .search-box input {
    background: var(--bg-card); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 14px; width: 200px; outline: none;
    transition: border-color .2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box select {
    background: var(--bg-card); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 8px; font-size: 14px; cursor: pointer; outline: none;
  }
  .btn-all {
    background: var(--accent); color: #000; border: none;
    border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background .2s; white-space: nowrap;
  }
  .btn-all:hover { background: #d4b87a; }

  /* ── Container ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* ── Section title ── */
  .section-title {
    font-size: 20px; font-weight: 700; color: var(--accent);
    margin-bottom: 20px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);

// ═══════════════ Artworks data (loaded async) ═══════════════
let artworks = [];
let currentFiltered = [];

async function loadArtworks() {
  try {
    const resp = await fetch('data/artworks.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    artworks = await resp.json();
  } catch (e) {
    console.warn('[gallery] 远程数据加载失败，改用内嵌兜底数据:', e && e.message);
    if (window.__ARTWORKS__ && Array.isArray(window.__ARTWORKS__)) {
      artworks = window.__ARTWORKS__;
    } else {
      console.error('[gallery] 作品数据加载失败:', e);
      const g = document.getElementById('grid');
      if (g) g.innerHTML = '<div class="no-results">作品数据加载失败，请通过 http(s) 链接访问本页面，或刷新重试</div>';
      return;
    }
  }
  currentFiltered = artworks;
  updateCount(artworks.length);
  populateFilter();
}

function updateCount(n) {
  document.getElementById('countLabel').textContent = `共 ${n} 件作品`;
}

function populateFilter() {
  const sel = document.getElementById('seriesFilter');
  // Add category groups as optgroups
  CATEGORY_GROUPS.forEach(g => {
    const visibleSeries = g.series.filter(s => SERIES_DATA[s] && SERIES_DATA[s].count >= 2);
    if (visibleSeries.length === 0) return;
    const groupEl = document.createElement('optgroup');
    groupEl.label = g.name;
    visibleSeries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = `${c} (${SERIES_DATA[c].count})`;
      groupEl.appendChild(opt);
    });
    sel.appendChild(groupEl);
  });
}

// ═══════════════ Build Featured Awards Carousel ═══════════════
function buildFeatured() {
  if (!FEATURED_ARTWORKS || FEATURED_ARTWORKS.length === 0) return;
  const carousel = document.getElementById('featuredCarousel');
  let html = '';
  FEATURED_ARTWORKS.forEach(a => {
    const imgHTML = a.mainImage
      ? `<img class="feat-card-img" src="images/${a.mainImage}" alt="${a.title}" loading="lazy" onerror="this.parentElement.querySelector('.feat-card-img').style.display='none'" />`
      : '';
    const awardBadges = [];
    const h = a.highlight || '';
    if (h.includes('国际') || h.includes('美国') || h.includes('纽约') || h.includes('CAAA')) awardBadges.push('国际奖项');
    if (h.includes('雅昌') || h.includes('拍卖')) awardBadges.push('雅昌拍卖');
    if (h.includes('收藏') || h.includes('收藏')) awardBadges.push('机构收藏');
    if (h.includes('个展')) awardBadges.push('个展');
    if (!awardBadges.length) awardBadges.push('获奖/参展');
    const badge = awardBadges[0];
    html += `
      <div class="feat-card" onclick="openLightboxBySerial(${a.serial})">
        ${imgHTML}
        <div class="feat-card-body">
          <span class="feat-card-award">🏆 ${badge}</span>
          <div class="feat-card-title">${a.title || ('作品 #' + a.serial)}</div>
          <div class="feat-card-series">${a.category}</div>
          <div class="feat-card-highlight">${h}</div>
        </div>
      </div>`;
  });
  carousel.innerHTML = html;
}

// ═══════════════ Build Relationship Map ═══════════════
function buildRelMap() {
  const container = document.getElementById('relMapContainer');
  let html = '';
  CATEGORY_GROUPS.forEach(g => {
    const totalCount = g.series.reduce((sum, s) => sum + (SERIES_DATA[s] ? SERIES_DATA[s].count : 0), 0);
    html += `<div class="cat-group ${g.class}">
      <div class="cat-group-header">
        <span class="cat-dot"></span>
        <span class="cat-label">${g.name}</span>
        <span class="cat-count">${totalCount} 件</span>
      </div>`;
    g.series.forEach(name => {
      const info = SERIES_DATA[name];
      if (!info || info.count < 2) return;
      const tags = Object.entries(info.subtags).sort((a,b) => b[1]-a[1]);
      const tagHTML = tags.map(([t,n]) =>
        `<span class="rel-tag" onclick="filterBySubtag('${t.replace(/'/g,"\\'")}');event.stopPropagation();">${t}<span class="tag-count">${n}</span></span>`
      ).join('');
      html += `
        <div class="rel-row">
          <div class="rel-series" onclick="scrollToSeriesCard('${name.replace(/'/g,"\\'")}')">
            <div class="rel-series-name">${name}</div>
            <div class="rel-series-count">${info.count} 件作品</div>
          </div>
          <div class="rel-tags">${tagHTML || '<span style="color:#555;font-size:12px;">暂无子标签</span>'}</div>
        </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function buildSeriesCards() {
  const grid = document.getElementById('seriesGrid');

  // We need to wrap the whole thing differently
  html = buildSeriesCardsHTML();

function buildSeriesCardsHTML() {
  let html = '';
  CATEGORY_GROUPS.forEach(g => {
    const visibleSeries = g.series.filter(s => SERIES_DATA[s] && SERIES_DATA[s].count >= 2);
    if (visibleSeries.length === 0) return;
    const totalCount = visibleSeries.reduce((sum, s) => sum + SERIES_DATA[s].count, 0);
    html += `<div class="cat-group ${g.class}">
      <div class="cat-group-header">
        <span class="cat-dot"></span>
        <span class="cat-label">${g.name}</span>
        <span class="cat-count">${totalCount} 件</span>
      </div>
      <div class="series-cards-row">`;
    visibleSeries.forEach(name => {
      const info = SERIES_DATA[name];
      const previews = info.previews;
      const previewHTML = previews.map((p, i) => {
        const label = p.title || (p.leoNo ? `No.${p.leoNo}` : `#${p.serial}`);
        if (p.mainImage) {
          return `<div class="sc-preview-item" onclick="event.stopPropagation();openLightboxBySerial(${p.serial})">
            <img src="images/${p.mainImage}" alt="${label}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=sc-preview-placeholder>暂无图片</div>'" />
            <div class="sc-preview-label">${label}</div>
          </div>`;
        } else {
          return `<div class="sc-preview-item"><div class="sc-preview-placeholder">暂无图片</div></div>`;
        }
      }).join('');

      const tags = Object.keys(info.subtags).sort((a,b) => info.subtags[b]-info.subtags[a]);
      const tagHTML = tags.slice(0, 8).map(t => `<span class="sc-tag" onclick="event.stopPropagation();filterBySubtag('${t.replace(/'/g,"\\'")}')">${t}</span>`).join('');
      const more = tags.length > 8 ? `<span class="sc-tag sc-tag-more">+${tags.length-8}</span>` : '';

      const safeId = name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_');
      html += `
        <div class="series-card" id="sc-${safeId}">
          <div class="sc-header">
            <span class="sc-name" onclick="filterBySeries('${name.replace(/'/g,"\\'")}')">${name}</span>
            <span class="sc-count">${info.count} 件</span>
          </div>
          <div class="sc-preview-grid">${previewHTML}</div>
          <div class="sc-tags">${tagHTML}${more}</div>
          <div class="sc-action">
            <a onclick="filterBySeries('${name.replace(/'/g,"\\'")}')">查看全部 ${info.count} 件 →</a>
          </div>
        </div>`;
    });
    html += '</div></div>';
  });
  return html;
}

// ═══════════════ View switching ═══════════════
function showOverview() {
  document.getElementById('overviewSection').style.display = 'block';
  document.getElementById('fullGridSection').style.display = 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('seriesFilter').value = '';
  updateCount(TOTAL_ARTWORKS);
}

function filterBySeries(seriesName) {
  document.getElementById('overviewSection').style.display = 'none';
  document.getElementById('fullGridSection').style.display = 'block';
  document.getElementById('seriesFilter').value = seriesName;
  document.getElementById('searchInput').value = '';
  applyFilter();
  // Scroll to grid
  document.getElementById('fullGridSection').scrollIntoView({ behavior: 'smooth' });
}

function filterBySubtag(subtag) {
  document.getElementById('overviewSection').style.display = 'none';
  document.getElementById('fullGridSection').style.display = 'block';
  document.getElementById('seriesFilter').value = '';
  document.getElementById('searchInput').value = subtag;
  applyFilter();
  document.getElementById('fullGridSection').scrollIntoView({ behavior: 'smooth' });
}

function scrollToSeriesCard(seriesName) {
  const safeId = seriesName.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_');
  const card = document.getElementById('sc-' + safeId);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Brief highlight
    card.style.boxShadow = '0 0 20px rgba(201,169,110,.4)';
    setTimeout(() => { card.style.boxShadow = ''; }, 1500);
  }
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const s = document.getElementById('seriesFilter').value;

  let filtered = artworks.filter(a => {
    if (s && a.category !== s) return false;
    if (q) {
      const haystack = [
        a.title, a.leoNo, a.category, (a.subtags||[]).join(' '),
        a.seriesRaw, a.description, a.sizeInfo, a.extraInfo, String(a.serial||'')
      ].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  currentFiltered = filtered;
  updateCount(filtered.length);
  renderGrid(filtered);

  // If no filter active, go back to overview
  if (!s && !q) {
    showOverview();
  }
}

function renderGrid(filtered) {
  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">没有找到匹配的作品</div>';
    return;
  }
  grid.innerHTML = filtered.map((a, i) => {
    // Badge indicators
    const badges = [];
    if (a.collectionInfo && a.collectionInfo.trim()) badges.push(`<span class="badge-icon badge-award">🏆 获奖/展览</span>`);
    if (a.qrImage && a.qrImage.trim()) badges.push(`<span class="badge-icon badge-qr">📱 二维码</span>`);
    if (a.description && a.description.trim()) badges.push(`<span class="badge-icon badge-desc">📝 详情</span>`);
    const badgesHTML = badges.length ? `<div class="badge-bar">${badges.join('')}</div>` : '';

    const imgHTML = a.mainImage
      ? `<div class="card-img-wrap"><img class="card-img" src="images/${a.mainImage}" alt="${a.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-no-img>暂无图片</div>'" />${badgesHTML}</div>`
      : '<div class="card-no-img">暂无图片</div>';

    const title = a.title || a.leoNo || `作品 #${a.serial}`;
    const meta = [];
    if (a.leoNo) meta.push(`<span>No.${a.leoNo}</span>`);
    if (a.year) meta.push(`<span>${a.year}</span>`);
    if (a.sizeInfo) {
      const firstLine = a.sizeInfo.split('\n')[0];
      if (firstLine) meta.push(`<span>${firstLine}</span>`);
    }

    let seriesHTML = '';
    if (a.category && a.category !== '未分类') {
      const group = SERIES_TO_GROUP[a.category];
      if (group) {
        seriesHTML += `<div class="card-group" style="color:${group.color}">${group.name}</div>`;
      }
      seriesHTML += `<div class="card-series">${a.category}</div>`;
      if (a.subtags && a.subtags.length > 0) {
        const chips = a.subtags.slice(0, 4).map(t => `<span class="card-subtag">${t}</span>`).join('');
        seriesHTML += `<div class="card-subtags">${chips}</div>`;
      }
    }

    return `
      <div class="card" onclick="openLightboxBySerial(${a.serial})" data-serial="${a.serial}">
        ${imgHTML}
        <div class="card-body">
          ${seriesHTML}
          <div class="card-title">${title}</div>
          <div class="card-meta">${meta.join('')}</div>
        </div>
      </div>`;
  }).join('');
}

// ═══════════════ Lightbox ═══════════════
window.openLightboxBySerial = function(serial) {
  let a = artworks.find(x => x.serial === serial);
  if (!a) {
    // 兜底：数据尚未就绪时从 SERIES_DATA 预览图匹配，避免点击无反应
    for (const k in SERIES_DATA) {
      const p = (SERIES_DATA[k].previews || []).find(pp => pp.serial === serial);
      if (p) { a = p; break; }
    }
  }
  if (!a) { console.warn('[gallery] 未找到作品 serial=', serial); return; }
  const lb = document.getElementById('lightbox');

  // Image
  document.getElementById('lightboxImg').src = a.mainImage ? `images/${a.mainImage}` : '';

  // Side panel
  let sideHTML = '';

  // Title & category
  sideHTML += `<div class="lb-section"><div class="lb-title">${a.title || '无标题'}</div>`;
  if (a.category || a.year || a.leoNo) {
    sideHTML += `<div class="lb-meta-row" style="margin-top:8px;">`;
    if (a.year) sideHTML += `<span class="lb-tag">${a.year}</span>`;
    if (a.leoNo) sideHTML += `<span class="lb-tag">No.${a.leoNo}</span>`;
    if (a.category) {
      const group = SERIES_TO_GROUP[a.category];
      if (group) sideHTML += `<span class="lb-tag lb-group">${group.name}</span>`;
      sideHTML += `<span class="lb-tag">${a.category}</span>`;
    }
    if (a.subtags && a.subtags.length) {
      a.subtags.forEach(t => { sideHTML += `<span class="lb-tag">${t}</span>`; });
    }
    sideHTML += `</div>`;
  }
  if (a.sizeInfo) {
    sideHTML += `<div class="lb-size" style="margin-top:8px;">${a.sizeInfo}</div>`;
  }
  sideHTML += `</div>`;

  // Description
  if (a.description && a.description.trim()) {
    const desc = a.description.length > 300
      ? a.description.substring(0, 300) + '...' : a.description;
    sideHTML += `<div class="lb-section"><div class="lb-desc">${desc}</div></div>`;
  }

  // Collection / Award
  if (a.collectionInfo && a.collectionInfo.trim()) {
    sideHTML += `<div class="lb-section"><div class="lb-award"><span class="lb-award-icon">🏆</span>${a.collectionInfo}</div></div>`;
  }
  if (a.collectionRecord && a.collectionRecord.trim()) {
    sideHTML += `<div class="lb-section"><div class="lb-collection"><span class="lb-coll-label">📍 收藏记录</span>${a.collectionRecord}</div></div>`;
  }

  // QR Code
  if (a.qrImage && a.qrImage.trim()) {
    const qrDesc = a.extraInfo && a.extraInfo.trim()
      ? a.extraInfo.split('\n')[0].substring(0, 40)
      : (a.collectionInfo && a.collectionInfo.includes('美篇') ? '美篇详情' : '扫码查看详情');
    sideHTML += `<div class="lb-section"><div class="lb-qr">
      <img src="images/${a.qrImage}" alt="二维码" loading="lazy" onerror="this.parentElement.style.display='none'" />
      <div class="lb-qr-label">${qrDesc}</div>
    </div></div>`;
  }

  document.getElementById('lightboxSide').innerHTML = sideHTML;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
};

window.openLightbox = function(idx) {
  const a = currentFiltered[idx];
  if (!a) return;
  openLightboxBySerial(a.serial);
};

window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
};

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});

// ═══════════════ Event bindings ═══════════════
document.getElementById('searchInput').addEventListener('input', function() {
  if (this.value.trim()) {
    document.getElementById('overviewSection').style.display = 'none';
    document.getElementById('fullGridSection').style.display = 'block';
  }
  applyFilter();
});

document.getElementById('seriesFilter').addEventListener('change', function() {
  if (this.value) {
    document.getElementById('overviewSection').style.display = 'none';
    document.getElementById('fullGridSection').style.display = 'block';
  }
  applyFilter();
});

document.getElementById('btnOverview').addEventListener('click', showOverview);

// ═══════════════ Init ═══════════════
(async function init() {
  buildFeatured();
  buildRelMap();
  buildSeriesCards();
  await loadArtworks();
  // 扫码直达单作品: ?art=<serial>
  const params = new URLSearchParams(window.location.search);
  const artParam = params.get('art');
  if (artParam) {
    openLightboxBySerial(Number(artParam));
  }
  // If URL hash matches a series, filter directly
  const hash = window.location.hash.replace('#', '');
  if (hash && SERIES_DATA[hash]) {
    filterBySeries(hash);
  }
})();
</script>
